  {
    id: 'l2-fiber-cleaning',
    title: 'Optical Fiber Cleaning',
    level: 2,
    objectives: [
      'Clean LC and MPO connectors using the proper tools',
      'Use the EXFO scope and Owl tester to verify cleanliness and link health',
      'Resolve dirty-fiber tickets end-to-end'
    ],
    body: `
      <p>Dirty fiber is the #1 cause of intermittent and degraded links in the data hall. A single speck of dust between ferrules can attenuate a signal enough to fail a link. Cleaning is unglamorous, repetitive, and absolutely critical.</p>
      <h3>The golden rule</h3>
      <div class="panel warn">
        <div class="panel-title">Always cap, always clean, always inspect</div>
        <p>If a fiber end is exposed to air, treat it as dirty. Cap any unused end. Clean any end before insertion. Inspect any suspect end with a scope.</p>
      </div>

      <div class="panel info">
        <div class="panel-title">Clean before replacing — every time</div>
        <p>When a Sheriff/Jira ticket auto-opens for a flapping link, the bot\'s instructions explicitly say "<b>Do not replace optics/transceivers yet</b>." Cleaning resolves the majority of link issues. Network engineering doesn\'t want you swapping optics on attempt one — they\'re expensive, the swap creates more variables, and most "bad optic" suspicions turn out to be dirty connectors. The bot tracks "Cleaning Attempt X of 2" before escalating; only after that does optic replacement come into play.</p>
      </div>

      <p>Bot-generated tickets refer to the LC click cleaner specifically as a "<b>one-click pen</b>" — that\'s the term you\'ll see in ticket descriptions and chat.</p>
      <h3>Tools</h3>
      <ul>
        <li><b>LC cleaner ("click pen")</b> — push-to-click cleaner for LC connectors. One click per cleaning.</li>
        <li><b>MPO cleaner</b> — same principle, larger cassette. Different tool than LC — don\'t confuse them.</li>
        <li><b>MPO puller</b> — pulls MPO connectors out without finger pressure on the ferrule.</li>
        <li><b>Fibre scope</b> — handheld microscope to visually inspect connector end-faces. Pass/fail reading.</li>
        <li><b>EXFO meter</b> — power meter to verify link signal level after cleaning.</li>
        <li><b>Owl fiber tester</b> — alternative tester used at some sites.</li>
        <li><b>Lint-free wipes + IPA</b> (used carefully — wet-cleaning is a fallback when click cleaners can\'t resolve contamination).</li>
      </ul>
      <h3>The "Clean Fiber" workflow (per Confluence SOP)</h3>
      <p>Standard "clean fiber" tickets cover both ends of a link. Always do both sides:</p>
      <ol>
        <li><b>A side</b>
          <ol type="a">
            <li>Unplug the fiber from the port</li>
            <li>Check for light on the fiber end and on the optic with the scope (don\'t look directly!)</li>
            <li>Pull the optic if it needs cleaning too</li>
            <li>Scope the connector → assess</li>
            <li>Clean ×2 (two cleaning cycles, scope between each if needed)</li>
            <li>Reconnect</li>
          </ol>
        </li>
        <li><b>B side</b> — same procedure on the other end of the link</li>
        <li><b>Meter test</b> — use EXFO/Owl to confirm signal is in spec</li>
        <li><b>Replace optics</b> if cleaning didn\'t resolve and the optic itself is suspect</li>
      </ol>
      <h3>Cleaning specific connector types</h3>
      <h4>LC</h4>
      <p>Single-port click pen. Insert pen into bulkhead or onto connector tip, push until you feel/hear a click. One click = one clean. Don\'t reuse a click cleaner past its rated cycle count (printed on the body — usually ~525 cleans).</p>
      <h4>MPO (APC vs UPC)</h4>
      <p>Use the MPO-specific cleaner. <b>The cleaner has a polarity</b> — it must be oriented to the connector key correctly or you\'ll grind the cleaning fabric across the angle of an APC ferrule the wrong way. Read the cleaner\'s arrow/key indicator.</p>
      <h4>Cassettes</h4>
      <p>Both the MPO trunk side AND each LC port on the cassette can get dirty. Don\'t assume cleaning the trunk side resolves a single-port issue — clean both halves of the path.</p>
      <h4>Wet-clean (last resort)</h4>
      <p>If repeated dry click-cleaning won\'t bring the connector to spec, dampen a lint-free wipe with reagent-grade IPA, draw the connector across once in a single direction, then immediately dry-clean again. Never re-use a wet wipe on the same connector.</p>
      <h3>Reading the fibre scope</h3>
      <p>The scope shows the polished end-face at high magnification. You\'re looking for:</p>
      <ul>
        <li><b>Pass</b> — clean core, no debris in the contact zone, clean cladding</li>
        <li><b>Particle / dust</b> — usually fixed by another click clean</li>
        <li><b>Smudge / oil</b> — finger contamination; wet-clean if dry doesn\'t fix</li>
        <li><b>Pit / scratch in core</b> — connector or ferrule damaged; replace the patch cord or optic</li>
      </ul>
      <h3>Reading the EXFO / Owl meter</h3>
      <p>You\'re measuring optical power in dBm or attenuation in dB. The exact in-spec range depends on the link type — check the SOP for the link in question. After cleaning, the reading should improve to within spec. If it doesn\'t, optic or fiber pair is the issue, not contamination.</p>
      <div class="panel info">
        <div class="panel-title">Eye safety — single-mode IR</div>
        <p>Single-mode systems use 1310/1550 nm — invisible to the human eye but fully capable of damaging your retina. Use the scope, never your eye. A camera (cell phone) can sometimes pick up the IR if you\'re unsure if a port is hot, but the scope is the right answer.</p>
      </div>
    `,

      <h3>What\'s a rack PDU?</h3>
      <p>The vertical power strip(s) inside each cabinet. Also called "Rack PDU", "PDU strip", or "vertical PDU." Each rack typically has TWO — fed from separate upstream RPPs for redundancy. Devices in the rack should have <b>both PSUs plugged into different rack PDUs</b> so a single PDU loss doesn\'t take down the host.</p>
      <h3>Common brands</h3>
      <ul>
        <li><b>APC (Schneider)</b> — the most common at CW sites</li>
        <li><b>Pulse RP6361</b> — also seen, requires a serial-cable + rollover adapter for first-time IP config</li>
        <li><b>Vertiv / Geist</b> — at some sites</li>
      </ul>
      <h3>Reading voltage</h3>
      <div class="panel warn">
        <div class="panel-title">Expected reading: 237–240V</div>
        <p>If a rack PDU is reading materially below or above this, communicate to DCM and Switch / Facility staff. Don\'t silently note it.</p>
      </div>

        <li>Open the rack and locate both PDUs (typically left and right rear)</li>
        <li>The PDU has a small LCD or web interface — find it</li>
        <li>Read the line voltage. On a 3-phase PDU, you may see L1-L2, L2-L3, L1-L3 readings</li>
        <li>Read the load amperage</li>
        <li>Compare to the device\'s expected draw and the breaker rating</li>
      </ol>
      <h3>Configuring a Pulse RP6361 web interface</h3>
      <p>The Pulse PDU often arrives without a usable IP. To set one:</p>

        <li>Run the network config commands to set IP, mask, gateway</li>
        <li>Verify by browsing to the new IP from a workstation on the management VLAN</li>
      </ol>
      <h3>Power label printing</h3>

    body: `
      <p>Fans and PSUs are the most commonly-replaced parts in any data center. The good news: they\'re typically hot-swappable. The bad news: there are many ways to make this go wrong if you skip steps.</p>
      <h3>Initial safety check</h3>
      <div class="panel danger">
        <div class="panel-title">Before touching anything</div>
        <ul>
          <li>Burnt smell, scorching, or visible heat damage → STOP and escalate as a safety issue</li>
          <li>Don\'t pull plugs willy-nilly. If a power cord is involved in the fault, judgement matters — a hot-running PSU on a redundant pair can be safely unplugged; one feeding a non-redundant device cannot</li>
          <li>Photograph before, during, and after</li>
        </ul>
      </div>
      <h3>Testing a suspect fan</h3>
      <ol>
        <li>Identify the unit from the ticket (host, RU, fan number)</li>
        <li>At the rack: confirm via the chassis fan LED, or via BMC if you have access</li>
        <li>Listen — failing fans often grind, whine, or stop completely</li>
        <li>Check airflow at the rear vent with the back of your hand</li>
        <li>If the chassis is hot-swap rated and the unit is redundant, proceed to replace</li>
      </ol>
      <h3>Replacing a fan</h3>
      <ol>
        <li>Pull the LOIS Locker spare fan that matches the part number</li>
        <li>Squeeze the latch / press the release</li>
        <li>Pull the failed fan straight out — fans often have an internal friction fit</li>
        <li>Slide the new fan in until it clicks/seats</li>
        <li>Confirm chassis fan LED returns to green</li>
        <li>Update Snipe / inventory with the swap (serial out, serial in)</li>
        <li>Ticket the failed unit for return / disposal per SOP</li>
      </ol>
      <h3>Replacing a PSU</h3>
      <p>PSUs are nearly identical in process, but with extra care because they\'re energized:</p>
      <ol>
        <li>Verify the partner PSU is healthy (don\'t pull the only working one)</li>
        <li>Trace the power cord — verify which one feeds the failed PSU. Use the labels you printed earlier!</li>
        <li>Unplug the cord from the PDU side, then from the PSU</li>
        <li>Press release latch, slide PSU out</li>
        <li>Slide the new one in, plug power in (PSU side first, then PDU)</li>
        <li>Verify both PSU LEDs are green and the device sees 2x power supplies in BMC</li>
        <li>Update Snipe / inventory; RMA the failed unit</li>
      </ol>
      <h3>LOIS Locker</h3>
      <p>LOIS = the on-site secured cabinet of pre-staged Dell parts (mostly PSUs and fans) we\'re authorized to use under self-maintenance. Pulling parts from LOIS requires logging the swap so the locker can be replenished. <b>Only use LOIS for parts you\'re trained on</b> — Dell vendor training is required for some parts.</p>

    body: `
      <p>NVMe SSDs are one of the most common DCT-replaceable hardware items, alongside fans and PSUs. The replacement itself is mechanical and quick — what matters is the workflow around it: parts approval, ticket movement, customer verification, and proper DBD disposal.</p>

      <h3>Approval first</h3>
      <p>You don\'t pull a drive on your own authority. The standard sequence:</p>
      <ol>
        <li>Pull the matching part from inventory and record the new drive\'s serial number.</li>
        <li>Create a <b>Parts Approval Request</b> ticket (e.g., "Albatross parts exception" type at Big Bird sites). Include all required details — failed serial, replacement serial, location, link to the SDA ticket.</li>
        <li>Auto-approval usually flows through within minutes. Check the dedicated approval Slack channel (e.g., <code>#albatross-exception-parts-approval</code>) if it stalls.</li>
        <li>Reference the original SDA-XXXXX in the linked work items field of the approval ticket.</li>
      </ol>

      <h3>Physical handling</h3>
      <ol>
        <li>At the rack, identify the failed drive — either by the missing serial number on the slot label, or by physical inspection (status LED red/amber, LED off when neighbors are green).</li>
        <li><b>Power down the device</b> per the SOP — coordinate with FRO/FROps if it\'s in production. NVMe hot-swap depends on the chassis and OS configuration; don\'t assume.</li>
        <li>Move the SDA ticket to <b>RMA — Self maintenance</b>. Fill in old drive serial, slot, model, and the new drive\'s details.</li>
        <li>Pull the <b>blue release latch</b> on the caddy. The drive should slide out smoothly.</li>
        <li>Insert the new drive. Push until the latch clicks home.</li>
        <li>Power on the device. Wait for boot and watch for status LEDs to go green.</li>
        <li>Confirm the customer login screen / OS comes up cleanly. Submit for <b>Customer Verification</b>.</li>
      </ol>

      <h3>Disposal — DBD rules apply</h3>
      <div class="panel danger">
        <div class="panel-title">Failed NVMe drives are Data Bearing Devices</div>
        <p>Customer data lives on these. Drop the failed SSD in the <b>data-hall DBD destruction bin</b>. Do <b>not</b> ship it back to the vendor, do not recycle it through general e-waste, do not store it loose in your kit.</p>
      </div>

      <h3>Documentation</h3>
      <ul>
        <li>Update the site\'s NVMe replacement tracking sheet — slot, old serial, new serial, date</li>
        <li>Photo the failed drive serial label clearly (vendor RMA / DBD audit requirement)</li>
        <li>Close the SDA / Parts Approval ticket once Customer Verification is back</li>
        <li>Update Snipe inventory if it\'s tracked there</li>
      </ul>

      <p>If the OS doesn\'t see the new drive after replacement, escalate to FROps before pulling it again — it may be a BIOS-level boot priority or a tray-level issue rather than the drive itself.</p>
    `,

    ],
    body: `
      <p>When a network team installs a large group of fibers and copper runs, some always have problems on day one — bad cleans, swapped pairs, bad fibers, mislabels, occasional defective patch cords. The networking teams hand the DCT team a <b>burndown spreadsheet</b> listing every flagged link.</p>
      <h3>The burndown loop</h3>
      <ol>
        <li>Network team identifies the issues from link tests and packet drops</li>
        <li>Spreadsheet drops in (often with one row per link)</li>
        <li>DCT team divides the work — by aisle, by switch, by row</li>
        <li>For each link: go to the location, diagnose, fix, retest, mark resolved</li>
        <li>Network team re-validates the link end-to-end</li>
      </ol>
      <h3>What you\'ll do per row</h3>
      <p>Most burndown work is one of:</p>
      <ul>
        <li><b>Clean the fiber</b> — both ends, scope, EXFO test (see L2 Optical Fiber Cleaning module)</li>
        <li><b>Reseat the optic</b> — pull, scope, clean, reinsert</li>
        <li><b>Swap the patch cord</b> for a known-good</li>
        <li><b>Fix swapped pairs</b> — TX/RX reversed at one end</li>
        <li><b>Fix labels</b> — physical label doesn\'t match logical port</li>
        <li><b>Replace the optic</b> — last resort once cabling is ruled out</li>
      </ul>
      <h3>Tips that save time</h3>
      <ul>
        <li>Work the spreadsheet by physical proximity, not by row order — minimize travel</li>
        <li>Bring a full kit of spare optics, cleaners, and patch cords on the cart</li>
        <li>Take a photo of every fix in case it gets disputed later</li>
        <li>Update the spreadsheet in real-time — don\'t batch at end of shift</li>
      </ul>
      <p>Burndowns can occupy the full team for hours to weeks during a buildout. They\'re the test that says "the install is done."</p>
    `,

        <li><b>You (DCT)</b> — pull parts as needed, log swaps, hand off MRB items, fill in for ICS when they\'re unavailable</li>
      </ul>
      <h3>Snipe — the asset system</h3>
      <p>Snipe-IT tracks every primary production asset by serial number: switches, servers, optics, PDUs. Sheriff integrates with Snipe so when you check out a part for a swap, it can update both systems.</p>
      <h4>Common Snipe operations</h4>
      <ul>
        <li>Search by service tag / serial / asset tag → find a device\'s current rack/RU</li>
        <li>Check out a part for use</li>
        <li>Check in a returned/replaced part</li>
        <li>Update asset location after a move</li>
      </ul>
      <h3>Receiving deliveries (when ICS is unavailable)</h3>
      <p>If ICS isn\'t available and a delivery arrives, the DCT covers it:</p>
      <ol>
        <li>Verify quantity and packaging against the BOL/packing slip</li>
        <li>Note any visible damage on the BOL <b>before</b> signing</li>
        <li>Photograph anything questionable</li>
        <li>Sign for delivery</li>
        <li>Log into the receiving workflow (per SOP)</li>
        <li>Either store at the dock per ICS\'s instructions or move to staging</li>
        <li>Update ICS in Slack / ticket so they can finish the receive</li>
      </ol>
      <h3>MRB — when something\'s wrong</h3>
      <p>An item is MRB-eligible if it\'s damaged, the wrong part, excess, or otherwise can\'t go straight into production:</p>
      <ol>
        <li>Quarantine the part — don\'t mix it with good inventory</li>
        <li>Log the issue (photos, serial, what\'s wrong)</li>
        <li>File the MRB intake</li>
        <li>MRB team decides: RMA, scrap, restock, or return-to-vendor</li>
      </ol>
    `,
    refs: [
      { title: 'How to send and receive deliveries when ICS is not available', url: 'https://coreweave.atlassian.net/wiki/spaces/DCTEMP/pages/630849556/How+to+send+and+receive+deliveries+when+ICS+is+not+available' },

    title: 'Linux Essentials for DCTs',

    objectives: [

      'Use ssh to reach BMCs, switches, and jump hosts',

    body: `
      <p>Most CoreWeave servers run Linux. As a DCT you don\'t need to be a sysadmin, but you do need to be comfortable in a shell when you\'re on a console cart, looking at iDRAC SSH, or troubleshooting from a jumphost.</p>
      <h3>Navigation</h3>
      <table>
        <tr><th>Command</th><th>What it does</th></tr>
        <tr><td><code>pwd</code></td><td>Print working directory (where am I)</td></tr>
        <tr><td><code>ls</code></td><td>List files. <code>ls -la</code> for details + hidden</td></tr>
        <tr><td><code>cd /path</code></td><td>Change directory. <code>cd ..</code> goes up one</td></tr>
        <tr><td><code>cat file</code></td><td>Print a file</td></tr>
        <tr><td><code>less file</code></td><td>Page through a file. <code>q</code> to quit</td></tr>
        <tr><td><code>tail -f file</code></td><td>Follow the end of a log live</td></tr>
        <tr><td><code>grep pattern file</code></td><td>Search for text in a file</td></tr>
        <tr><td><code>find . -name "*.log"</code></td><td>Find files by pattern</td></tr>
      </table>
      <h3>System info</h3>
      <table>
        <tr><th>Command</th><th>Use</th></tr>
        <tr><td><code>uname -a</code></td><td>Kernel and host info</td></tr>
        <tr><td><code>hostname</code></td><td>This host\'s name</td></tr>
        <tr><td><code>uptime</code></td><td>How long up + load avg</td></tr>
        <tr><td><code>df -h</code></td><td>Disk space</td></tr>
        <tr><td><code>free -h</code></td><td>Memory</td></tr>
        <tr><td><code>top</code> / <code>htop</code></td><td>Live process view (q to quit)</td></tr>
        <tr><td><code>dmesg | tail</code></td><td>Recent kernel messages — great for finding hardware errors</td></tr>
        <tr><td><code>journalctl -xe</code></td><td>Most recent system logs (systemd)</td></tr>
      </table>
      <h3>Networking commands</h3>
      <table>
        <tr><th>Command</th><th>Use</th></tr>
        <tr><td><code>ip a</code></td><td>List network interfaces and IPs</td></tr>
        <tr><td><code>ip link show</code></td><td>Link state (UP/DOWN) per NIC</td></tr>
        <tr><td><code>ip route</code></td><td>Routing table (default gateway, etc.)</td></tr>
        <tr><td><code>ping host</code></td><td>Reachability + latency</td></tr>
        <tr><td><code>traceroute host</code> / <code>tracepath host</code></td><td>Path to host</td></tr>
        <tr><td><code>ss -tulpn</code></td><td>Listening sockets (modern netstat)</td></tr>
        <tr><td><code>ethtool eth0</code></td><td>Link speed, duplex, driver — vital for switch port debugging</td></tr>
        <tr><td><code>mst status</code></td><td>Mellanox/NVIDIA InfiniBand device list</td></tr>
        <tr><td><code>ibstat</code></td><td>InfiniBand port status (LinkUp / Active / Down)</td></tr>
      </table>
      <h3>SSH</h3>
      <p>SSH = secure shell. You\'ll use it constantly to reach BMCs, switches, and other hosts.</p>
      <pre style="background:var(--bg-elev-2);padding:12px;border-radius:6px;overflow-x:auto;font-family:ui-monospace,monospace;font-size:.85rem;">ssh user@hostname
ssh -p 2222 user@hostname    <span style="color:var(--text-dim)"># non-default port</span>
ssh -i ~/.ssh/key user@host  <span style="color:var(--text-dim)"># with a specific key</span>
ssh -o ServerAliveInterval=30 user@host  <span style="color:var(--text-dim)"># keep idle session alive</span></pre>
      <p>To exit a stuck SSH session: press <code>~</code> then <code>.</code> (tilde-dot). This is the kill-it-now escape sequence — useful when the remote end has frozen.</p>
      <h3>Screen / tmux — surviving disconnects</h3>
      <p>Console-cart sessions over SSH die when the cart loses Wi-Fi. <code>tmux</code> (or <code>screen</code>) keeps your session alive on the remote side and lets you reattach.</p>
      <pre style="background:var(--bg-elev-2);padding:12px;border-radius:6px;font-family:ui-monospace,monospace;font-size:.85rem;">tmux new -s work    <span style="color:var(--text-dim)"># start new session named "work"</span>
<span style="color:var(--text-dim)"># Ctrl-b then d to detach</span>
tmux ls             <span style="color:var(--text-dim)"># list sessions</span>
tmux attach -t work <span style="color:var(--text-dim)"># reattach</span></pre>
      <h3>Editing files</h3>
      <p><code>nano</code> is the friendly editor — arrow keys, <code>Ctrl-O</code> save, <code>Ctrl-X</code> exit. <code>vi</code> / <code>vim</code> is the universal editor (every Linux box has it). Bare minimum: <code>i</code> to insert, <code>Esc</code> to leave insert mode, <code>:wq</code> to save and quit, <code>:q!</code> to quit without saving.</p>
      <h3>Permissions and sudo</h3>
      <p>Most diagnostic commands need <code>sudo</code> on production hosts. Don\'t casually run sudo commands you don\'t understand — and never <code>sudo rm -rf</code> anything in a customer environment without explicit authorization.</p>
      <h3>Practice — risk-free</h3>
      <p>The Confluence "Basic Linux Commands and Simulator" page links to <a href="https://www.terminaltemple.com/" target="_blank">terminaltemple.com</a>, an in-browser terminal you can break safely.</p>
    `,

  {
    id: 'l3-bmc',
    title: 'BMC, iDRAC, iLO & DPU Access',
    level: 3,
    objectives: [
      'Connect to a server\'s out-of-band management interface',
      'Use BMC to identify hardware faults without disrupting workloads',
      'Distinguish baseband (BMC) from DPU console paths'
    ],
    body: `
      <h3>What is a BMC?</h3>
      <p>The <b>Baseboard Management Controller</b> is a tiny independent computer inside the server. It runs even when the main CPU/OS is off. You reach it via its own dedicated IP (the baseband port — usually a copper RJ-45 on the back). Vendors call it different names:</p>
      <ul>
        <li><b>BMC</b> — generic term, also Supermicro\'s name (BMC IPMI)</li>
        <li><b>iDRAC</b> — Dell\'s BMC</li>
        <li><b>iLO</b> — HPE\'s BMC (you\'ll see this less at CW)</li>
      </ul>
      <p>From the BMC you can:</p>
      <ul>
        <li>Check power, thermal, fan, PSU status</li>
        <li>Power-cycle the host remotely</li>
        <li>Mount virtual media for OS reinstall</li>
        <li>Open a virtual console (KVM-over-IP) — see what\'s on the host\'s monitor without touching the rack</li>
        <li>Read the System Event Log (SEL) — gold for fault diagnosis</li>
      </ul>
      <h3>Connecting</h3>
      <p>Three ways, in order of preference:</p>
      <ol>
        <li><b>Web UI from a jumphost</b> — browse to <code>https://&lt;BMC-IP&gt;</code>. Requires being on the right management network.</li>
        <li><b>SSH</b> — <code>ssh root@&lt;BMC-IP&gt;</code>, drops you into the BMC shell. Useful for scripted IPMI commands.</li>
        <li><b>Crash cart locally</b> — when the BMC itself is unreachable. Plug the cart\'s VGA + USB into the rear of the host.</li>
      </ol>
      <h3>Reading a fault from the SEL</h3>
      <p>System Event Log lists every fault the BMC has logged. Common patterns:</p>
      <ul>
        <li><code>PS1 Status — Failure detected</code> → PSU 1 failed, replace</li>
        <li><code>FAN A1 — Lower critical going low</code> → fan failing, replace</li>
        <li><code>ECC uncorrectable</code> → bad DIMM, escalate to vendor</li>
        <li><code>Thermal: CPU 1 over temp</code> → cooling issue, check airflow + heatsink</li>
      </ul>
      <h3>DPU vs. BMC</h3>
      <p>NVIDIA-based GPU hosts often have BOTH a traditional BMC <b>and</b> a DPU (Data Processing Unit) — a separate management subsystem with its own network access. Sysadmins use the DPU for higher-level orchestration, while BMC handles low-level hardware. Tickets will tell you which one to touch.</p>

      <h3>Connecting a MacBook directly to a Supermicro IPMI</h3>
      <p>When the management network can\'t reach a host but you can get to the rack, you can drop on the host\'s IPMI directly with a laptop:</p>
      <ol>
        <li>USB-C/Thunderbolt → Ethernet adapter on the MacBook.</li>
        <li>Patch cable from the adapter to the host\'s rear <b>MGMT</b> / <b>IPMI</b> port.</li>
        <li><b>System Preferences → Network → Ethernet</b>. Configure IPv4:
          <ul>
            <li>If the IPMI is on DHCP, set the Mac to DHCP and let it auto-assign — then scan for the IPMI IP using a tool like <i>Angry IP Scanner</i> or <i>LanScan</i>.</li>
            <li>If the IPMI has a known static IP, set the Mac to <b>Manually</b> with an IP in the same /24 (e.g., IPMI <code>192.168.1.100</code> → Mac <code>192.168.1.50</code>, mask <code>255.255.255.0</code>).</li>
          </ul>
        </li>
        <li>Browse to <code>http://&lt;IPMI-IP&gt;</code>. Default Supermicro creds are typically <code>ADMIN</code>/<code>ADMIN</code> until changed (per site security policy).</li>
        <li>Once in: open KVM-over-IP, check SEL, view sensor readings, or power-cycle remotely.</li>
      </ol>
      <p>If the connection won\'t come up: confirm the Mac\'s IP is in the right subnet, then disable any local firewall, then bounce the Ethernet adapter in System Preferences.</p>

      <h3>Dell H100/H200 unresponsive node — power-drain procedure</h3>
      <p>Sometimes a Dell node won\'t respond to either the iDRAC graceful power-down or a physical power button press. The standard fix is a full power drain:</p>
      <ol>
        <li>Confirm the request from FROps and the diagnosis (powered, but not responding).</li>
        <li>Get explicit approval from FROps to perform a power drain.</li>
        <li>At the rear of the unit, <b>disconnect all 6 power cords</b>.</li>
        <li>At the front, <b>hold the power button down for 30-60 seconds</b> (Dell\'s recommendation is 1 minute; 30 seconds is usually enough).</li>
        <li>Reconnect all 6 power cords.</li>
        <li>The node typically takes up to 5 minutes to complete initialization and power on.</li>
        <li>If it comes up, notify FROps the issue is resolved. If still unresponsive after the drain, ask FROps to begin an RMA.</li>
      </ol>
      <div class="panel info">
        <div class="panel-title">PPE: hearing protection</div>
        <p>Power-cycling a GPU host means the chassis fans will spin to 100% during boot. In a dense hall, that\'s loud enough to require hearing protection.</p>
      </div>
    `,
    refs: [
      { title: 'BMC H200 Access guide (using BMC to identify faults)', url: 'https://coreweave.atlassian.net/wiki/spaces/DCOPS/pages/564822112/BMC+H200+Access+guide+using+BMC+to+identify+faults' },

  {
    id: 'l3-network-topology',
    title: 'Network Topology: The Grid + Backend Fabrics',
    level: 3,
    objectives: [
      'Understand "The Grid" — CW\'s Ethernet CLOS fabric',
      'Identify the three parallel networks at every site (Grid / MGMT Grid / Backend GPU)',
      'Know when InfiniBand vs RoCE is used and what hardware backs each'
    ],
    body: `
      <h3>"The Grid" — CW\'s Ethernet CLOS fabric</h3>
      <p>CoreWeave\'s core datacenter fabric is internally called <b>The Grid</b>. It\'s a multi-tiered, multi-planed <b>Ethernet CLOS topology</b> running on NVIDIA Spectrum switches. Every site has a Grid; everything else (storage, management, GPU backend) is layered on top of or alongside it.</p>
      <p>Tier hierarchy: <code>T0 → T1 → T2 → T3 → FBS</code> (Fabric Border Switch). Routing is BGP unnumbered between tiers. The Grid is a <b>pure underlay</b> — DPUs handle tenant isolation via EVPN/VxLAN overlay.</p>
      <h4>Grid versions you\'ll see in the wild</h4>
      <table>
        <tr><th>Version</th><th>What changed</th><th>Where it runs</th></tr>
        <tr><td>v0.5</td><td>Initial Spectrum-3 fabric; DPUs in "dumb NIC" L2 mode; 8 Gbps/GPU target</td><td>All Albatross (Big Bird) sites, DFW</td></tr>
        <tr><td>v1.0</td><td>DPUs in "smart NIC" mode speaking BGP with T0; pure underlay; EVPN overlay</td><td>RNO, RDU, US-WEST-03</td></tr>
        <tr><td><b>v1.5 (most common today)</b></td><td>T2/T3 meshed between Grid Groups; 12-20 Gbps per GPU bandwidth target</td><td>Most current multi-tenant builds (US-EAST-08, US-EAST-06, US-WEST-01, US-EAST-03)</td></tr>
        <tr><td>v2.0</td><td>GB200 era; drops GG1/GG2 distinction; more spine planes; new switch roles</td><td>Newer GB200 sites</td></tr>
      </table>
      <p><b>Grid Groups (UoS — Unit of Scale):</b> in v0.5 → v1.5, the fabric splits into <b>GG1</b> (GPU) and <b>GG2</b> (CPU + storage). v2.0 collapses everything into a single Grid Group.</p>

      <h3>Three parallel networks at every site</h3>
      <p>You\'ll hear these names in tickets and tags. They run on different physical hardware and serve different traffic.</p>
      <ol>
        <li><b>The Grid (frontend Ethernet underlay)</b> — what was described above. Customer traffic, control-plane, tenant overlay all ride on this. NVIDIA Spectrum-3 (older) and Spectrum-4 (newer) switches.</li>
        <li><b>The MGMT Grid (out-of-band management)</b> — separate physical hardware. Carries BMC/IPMI access, DPU management, and switch management. SN2201 / SN3700 typically. Two flavors: MGMT v1.0 keeps net-mgmt and compute-mgmt physically separate; MGMT v2.0 (GB200 era) collapses them into one set of switches with multiple VRFs.</li>
        <li><b>Backend GPU fabric (HPC traffic)</b> — the high-bandwidth GPU-to-GPU fabric. <b>This is where IB vs RoCE lives.</b> Either InfiniBand or RoCE depending on site (see next section).</li>
      </ol>
      <div class="panel info">
        <div class="panel-title">Why three networks?</div>
        <p>Splitting tenant data, management access, and HPC GPU traffic onto separate physical fabrics means a problem on one doesn\'t cascade to the others. If the customer-facing Grid has an issue, you can still BMC into a host over the MGMT Grid to diagnose. If the IB backend goes down, you don\'t lose your management plane.</p>
      </div>

      <h3>Backend GPU fabric — InfiniBand or RoCE</h3>
      <p>This is the highest-bandwidth fabric in the building, and CW runs <b>two different technologies</b> in production today depending on the site:</p>

      <h4>InfiniBand (most CW sites)</h4>
      <ul>
        <li>NVIDIA proprietary HPC interconnect — not Ethernet-compatible</li>
        <li>Physical switch: <b>NVIDIA QM9790</b>, deployed at Leaf, Spine, and Core tiers</li>
        <li>Optics: dual-port multimode MPO 800G at the QM9790 (the big distinctive ones)</li>
        <li>OSFP usage: <b>one port per OSFP</b> at 800G × 4 node interfaces = 3,200 Gb per node</li>
        <li>Mature, lowest latency, proven for AI workloads at scale</li>
        <li>UFM (Unified Fabric Manager) appliances monitor and orchestrate the IB fabric, deployed in pairs in the FCR (Fabric Control Rack)</li>
      </ul>

      <h4>RoCE on NVIDIA Spectrum-X (newer sites)</h4>
      <ul>
        <li><b>RoCE = RDMA over Converged Ethernet</b> — same RDMA semantics, but runs on Ethernet</li>
        <li>Physical switch: <b>NVIDIA SN5600 / SN5610</b> with the lane-select button (covered in Link Troubleshooting)</li>
        <li>Optics: 400G ports broken into two via dual-MPO OSFP optics</li>
        <li>OSFP usage: <b>both ports per OSFP</b> at 400G × 8 node interfaces = 3,200 Gb per node — same total bandwidth as IB, different physical layout</li>
        <li>Shares cabling/management/monitoring with the rest of the Ethernet Grid — operationally simpler at scale</li>
        <li>Logical interfaces appear as <code>ibsX</code> with <code>p0..p3</code> ports mapping to C1/C2 connectors per OSFP (see L3 RoCE module)</li>
      </ul>

      <h4>Where each is deployed today</h4>
      <table>
        <tr><th>Backend tech</th><th>Sites</th></tr>
        <tr><td>InfiniBand (default for most current builds)</td><td>Vast majority of CW sites — Hopper-era H100/H200, most GB200 deployments</td></tr>
        <tr><td>RoCE (Spectrum-X)</td><td>US-CENTRAL-03 (Denton), US-CENTRAL-08 (Ellendale), US-EAST-12 (Dalton)</td></tr>
      </table>
      <p>If you\'re working at one of the RoCE sites, your backend troubleshooting workflow uses opcodes and the misconnects dashboard (see L3 RoCE module). At all other sites, the backend is IB and you\'re working with QM9790 + standard fiber cleaning / link troubleshooting.</p>

      <h3>Ethernet tiers (for the Grid)</h3>
      <ul>
        <li><b>T0</b> — switches connected directly to the nodes (top-of-rack). <b>SN2201</b> for 1G management. <b>SN3700</b> (200G) or <b>SN4700</b> (400G) for higher-speed.</li>
        <li><b>T1</b> — aggregates multiple T0s. End-of-row.</li>
        <li><b>T2</b> — aggregates T1s. In v1.5 these mesh across Grid Groups.</li>
        <li><b>T3</b> — site-level spine.</li>
        <li><b>FBS (Fabric Border Switch)</b> — egress to the backbone / WAN.</li>
      </ul>

      <h3>InfiniBand tiers (for IB backend)</h3>
      <ul>
        <li><b>Leaf</b> — connects to GPU node HCAs (think IB equivalent of T0)</li>
        <li><b>Spine</b> — connects leaves within a pod</li>
        <li><b>Core</b> — connects spines across pods / data halls</li>
        <li>QM9790 at every tier; configuration differs.</li>
      </ul>
      <div class="panel info">
        <div class="panel-title">Leaf-port-to-node mapping isn\'t universal</div>
        <p>Leaf switch port 5 does NOT always connect to node HCA5 — the mapping depends on the site\'s physical install. Always check the site\'s topology doc, never assume.</p>
      </div>

      <h3>The technology stack that makes it all work</h3>
      <ul>
        <li><b>NVIDIA Spectrum switches</b> (Spectrum-3 / Spectrum-4) running <b>Cumulus Linux</b> — the Grid</li>
        <li><b>NVIDIA QM9790</b> — InfiniBand backend at most sites</li>
        <li><b>NVIDIA SN5600 / SN5610 (Spectrum-X family)</b> — RoCE backend at Denton/Ellendale/Dalton</li>
        <li><b>NVIDIA BlueField DPUs</b> — every node; in smart-NIC mode (v1.0+) they speak BGP with T0 and provide tenant overlay via EVPN/VxLAN</li>
        <li><b>BGP unnumbered</b> for fabric routing</li>
        <li><b>EVPN + VxLAN</b> for tenant overlay (since Grid v1.0)</li>
        <li><b>RDMA</b> as the underlying primitive — both IB and RoCE deliver RDMA semantics, just over different transports</li>
        <li><b>UFM</b> — fabric manager for IB; <b>NVIDIA NetQ / Spectrum-X telemetry</b> for the Ethernet side</li>
      </ul>

      <h3>The backbone — how sites connect to each other</h3>
      <p>Beyond your site, CW operates a global backbone connecting every site to every other site (and to the public internet). Owned by the Backbone Network Engineering team. DCT work occasionally touches it during physical handoffs (carrier circuits, cross-connects, leased lines).</p>
      <p>Most US traffic transits through the central hub at <b>350 E Cermak in Chicago</b>. Edge sites (like EVI01 Elk Grove) light up high-bandwidth circuits to Chicago, where they meet the rest of the global fabric. Carriers: <b>Lumen, Zayo, Arelion, Verizon</b>. DCT activities on the backbone:</p>
      <ul>
        <li><b>Cross-connects</b> — fiber between CW gear and a carrier\'s gear inside the colo building, patched at a Meet-Me Room (MMR) by a colo tech</li>
        <li><b>Leased lines / lit services</b> — carrier-provided dedicated bandwidth between two sites</li>
        <li><b>Internet (DIA) circuits</b> and <b>ZTN DIA circuits</b> at customer-sensitive sites</li>
        <li>On turn-ups: coordinate carrier visit, locate demarc, run patch from demarc to CW edge router, provide light readings + photos to remote engineering, document in ticket</li>
      </ul>

      <h3>OpenGear (serial console)</h3>
      <p>OpenGear devices give you out-of-band serial console access to network gear. When the management network is down, OpenGear is how you reach the switch.</p>
      <h4>Console procedure (Mac/Linux)</h4>
      <ol>
        <li>Connect to the OpenGear with either a Micro USB Type-B cable or an Ethernet-to-Serial cable.</li>
        <li>Open Terminal. Find the USB serial path:
          <pre style="background:var(--bg-elev-2);padding:8px 12px;border-radius:6px;font-family:ui-monospace,monospace;font-size:.85rem;margin:6px 0">ls /dev | grep -i \'usb\'</pre>
        </li>
        <li>Connect using <code>screen</code> at the right baud rate. <b>115200</b> for most OpenGear models, <b>9600</b> for the 8100 series (8148, etc.):
          <pre style="background:var(--bg-elev-2);padding:8px 12px;border-radius:6px;font-family:ui-monospace,monospace;font-size:.85rem;margin:6px 0">screen /dev/tty.usbserial-120 115200</pre>
        </li>
        <li>Terminal will go blank. Wait 20-30 seconds, hit Enter — login prompt appears.</li>
        <li>To detach without killing the session: <code>Ctrl-A</code> then <code>D</code>. To exit: <code>Ctrl-A</code> then <code>K</code>, confirm.</li>
      </ol>
    `,

  {
    id: 'l3-roce',
    title: 'RoCE Physical Layer Troubleshooting',
    level: 3,
    objectives: [
      'Understand RoCE basics — how it differs from InfiniBand at the physical layer',
      'Read shuffle cable labeling (A1/A2 ↔ B1/B2, C1/C2)',
      'Diagnose by opcode and apply the right clean / reseat / swap / replace action'
    ],
    body: `
      <p><b>RoCE</b> (RDMA over Converged Ethernet) provides RDMA semantics over Ethernet — increasingly used at CW alongside InfiniBand for GPU backend traffic. The physical layer is different from IB: optics break out into <b>two logical connectors (C1 and C2)</b> per OSFP, and shuffle cables connect 2 nodes to 2 switches at once with strict polarity rules.</p>

      <h3>Shuffle cable & labeling primer</h3>
      <p>Each OSFP module exposes two logical connectors (C1 and C2). Shuffle cables are <b>directional</b>:</p>
      <ul>
        <li><b>Node side:</b> labeled <code>A1</code> and <code>A2</code></li>
        <li><b>Leaf side:</b> labeled <code>B1</code> and <code>B2</code></li>
        <li>One shuffle cable connects 2 nodes to 2 switches</li>
        <li>The cable only goes in one way — A side on the node, B side on the leaf</li>
      </ul>
      <p>On the node, interfaces appear as <code>ibsX</code> with ports <code>ibsXp0..ibsXp3</code>:</p>
      <ul>
        <li><code>ibsXp0</code> and <code>ibsXp2</code> route to the <b>B1</b> leg (leaf side)</li>
        <li><code>ibsXp1</code> and <code>ibsXp3</code> route to the <b>B2</b> leg (leaf side)</li>
      </ul>
      <div class="panel warn">
        <div class="panel-title">Optic orientation matters</div>
        <p>Dual MPO optics installed <b>upside down</b> have flipped logical connections. Right-side up: <code>| C1 | C2 |</code>. Upside down: <code>| C2 | C1 |</code>. If a fresh install shows misconnects on every link, suspect orientation.</p>
      </div>

      <h3>Reading the OSFP node LED</h3>
      <p>Only the <b>left OSFP link LED</b> turns green when both C1 and C2 are up. If <b>either</b> C1 or C2 is down, the LED may not light. <b>Amber LEDs are not reliable</b> indicators of health — they\'ve been observed during firmware transitions and on otherwise-fine links. Trust Grafana / Sheriff over the LED for RoCE.</p>

      <h3>Opcode-driven diagnosis</h3>
      <p>Sheriff and Grafana surface opcodes for each impacted link. Each opcode points you to a specific class of fault.</p>

      <h4>Opcode 0 — "No Issue Was Observed"</h4>
      <p>In RoCE, treat Opcode 0 as a <b>wiring / mismatch indicator</b>. The link is up, but the Current vs Expected mapping is wrong. Common patterns:</p>
      <ul>
        <li><b>C1 / C2 flipped at the leaf switch (B2 leg):</b> The Current port indices are shifted by 2 from Expected on the B2 side. Resolution — swap C1/C2 at the switch on the B2 leg.</li>
        <li><b>C1 / C2 flipped at the node:</b> All 4 connections of one GPU group show Type Leaf mismatch (e.g., expected <code>t0a</code> shows up as <code>t0c</code>). Resolution — flip C1/C2 at the node OSFP.</li>
        <li><b>Whole shuffle cable installed backward:</b> B side on the node and A side on the leaf. Resolution — recable the run, or escalate to cabling contractor.</li>
        <li><b>Node BMC cables flipped between two nodes:</b> Both nodes\' dashboards show mirrored Current/Expected inversions across <em>all</em> backends. Fix the BMC management cables first — don\'t touch backend optics until node identity matches physical location.</li>
        <li><b>Optics flipped between two GPUs on the same node:</b> Rail paths are swapped between adapter groups (e.g., <code>ibs2*</code> lands on rail 4 instead of rail 3 and vice-versa). Resolution — swap the optics between the two GPU groups.</li>
      </ul>

      <h4>Opcode 1 — "Closed By Command"</h4>
      <p>Connection deliberately closed by software. Not a physical fault — coordinate with networking before reseating.</p>

      <h4>Opcode 2 — "Negotiation Failure"</h4>
      <p>Often a node-side issue. RoCE wasn\'t run yet, optics unplugged, or the cable / optic is loose. Start with cleaning the node-side optic and cable, then try a new optic (don\'t leave it in if it doesn\'t fix the issue — they\'re expensive), then rerun the cable.</p>

      <h4>Opcode 15 / 57 — "Bad Signal Integrity" / "Signal Not Detected"</h4>
      <p>Physical-layer issues — broken or dirty cable, bad optic, loose seat. Procedure:</p>
      <ol>
        <li>Clean the node-side optic and cable. <b>Verify the correct A1/A2 ↔ B1/B2 leg first</b> — cleaning the wrong leg can introduce new misconnects.</li>
        <li>Reseat all four legs on the impacted breakout, confirm latch engagement.</li>
        <li>If still down: try a known-good optic, then a known-good cable.</li>
      </ol>

      <h4>Opcode 1024 — "Cable Is Unplugged"</h4>
      <p>Optic isn\'t seated, optic is broken, or the port itself is broken. Reseat first, then clean, then replace the optic before concluding the port is dead.</p>
      <div class="panel info">
        <div class="panel-title">Bad OSFP NIC pattern</div>
        <p>If <b>two GPUs on the same node</b> (either ibs0+ibs1 OR ibs2+ibs3) both show Opcode 1024 / 1027 / 1031 / 1048, and reseating + replacing the optics doesn\'t resolve, the <b>CX8 OSFP network card is likely fried</b>. Escalate to FROps for a node-level RMA.</p>
      </div>

      <h4>Opcode 1027 — "Bad / Unsupported EEPROM"</h4>
      <p>Bad node or bad node-side optic. If all connections on one GPU on a node fail this way, narrow it down by swapping the optic. If the optic is good, the node is suspect — escalate.</p>

      <h4>Opcode 1031 — "Shorted Cable"</h4>
      <p>Often what the network sees when the switch port itself dies. Rule out a bad optic by replacing with a known-good optic on this connection first. If the issue follows, escalate the switch port.</p>

      <h4>Opcode 1048 — "Modules DataPath FSM Fault"</h4>
      <p>Try cleaning, then replacing the optic, then swap the optic with another on the same node. Try moving cables between two nodes (<code>ibs0</code> ↔ <code>ibs1</code>) to see if the fault follows. If it doesn\'t move, escalate to FROps for Dell to look at the node.</p>

      <h4>Opcode 128 — "Other Issues"</h4>
      <p>Run through the standard troubleshooting and then ping <code>@network-datacenter</code>.</p>

      <h3>Validation flow</h3>
      <ol>
        <li>Use the <b>RoCE misconnects dashboard</b> in Grafana, filtered to the affected node(s).</li>
        <li>If <i>Current</i> is blank — prioritize seating and cleaning. The metric takes time to populate after the link comes up.</li>
        <li>If <i>Current</i> is populated but mismatched with <i>Expected</i> — figure out whether it\'s a <b>Leaf misconnect</b> (wrong switch entirely) or a <b>Port misconnect</b> (right switch, wrong port). Verify both node-side and switch-side mapping per labels.</li>
        <li><b>Always change one variable at a time.</b> RoCE info tools take time to update — making multiple changes makes attribution impossible.</li>
      </ol>

      <h3>Isolation steps when standard flow doesn\'t resolve</h3>
      <ul>
        <li>Move the cable + optic to an empty switch port, keeping the node side constant — rules out switch port issues.</li>
        <li>Misconnect the leaf side intentionally to test whether the problem follows the node or stays with the leaf.</li>
        <li>Swap with a known-good link on the same node (same OSFP, different port) — isolates cable / optic vs NIC / OSFP cage.</li>
      </ul>

      <h3>When to escalate</h3>
      <ul>
        <li>Any Opcode 1031 / 1027 / 1024 that survives clean → reseat → swap → replace</li>
        <li>Two GPUs on the same node both failing with Opcode 1024/1027/1031/1048 → suspected CX8 NIC failure → <code>@frops</code></li>
        <li>Whole-cable backward installations → cabling contractor</li>
        <li>Anything that persists after exhausting opcode-specific actions → tag <code>@network-datacenter</code> in the ops channel with full troubleshooting log</li>
      </ul>
    `,
    refs: [
      { title: 'RoCE Physical Layer Troubleshooting Guide (Devin Cobert)', url: 'https://coreweave.atlassian.net/wiki/spaces/~712020ea8e262d872c4207901ea6a5b394e3d2/pages/808386577/RoCE+Physical+Layer+Troubleshooting+Guide' },

  {
    id: 'l3-link-troubleshooting',
    title: 'Network Link Troubleshooting',
    level: 3,
    visual: 'link-troubleshooting',
    objectives: [
      'Triage a flapping or dead link methodically',
      'Use the right diagnostic at the right step (BMC, scope, EXFO, switch CLI)',
      'Know when to stop and escalate to network engineering'
    ],
    body: `
      <p>A link can fail in roughly three places: the host (NIC/HCA + optic), the cable plant (fiber + connectors + cassettes), or the switch (port + optic + ASIC). Your goal is to localize fast.</p>
      <h3>The triage tree</h3>
      <ol>
        <li><b>Confirm the failure</b> — is it really down, or just degraded? Check the alert source. Check Grafana.</li>
        <li><b>Check both ends</b> — host link state (<code>ip link</code>, <code>ibstat</code>) AND switch port state (NOC team or OpenGear).</li>
        <li><b>Visual inspection</b> — at the rack, are the link LEDs lit? Color correct?</li>
        <li><b>Reseat</b> — cleanly disconnect, scope the connector, clean both ends, reconnect. Many links recover here.</li>
        <li><b>Swap optic</b> — known-good optic into the same port. If link comes up, original optic was bad.</li>
        <li><b>Swap fiber</b> — known-good patch into the same path. If link comes up, fiber was bad.</li>
        <li><b>Swap port</b> — move the cable/optic to a known-good switch port. If link comes up, switch port was bad.</li>
        <li><b>Escalate</b> — if all of the above clean and link still won\'t come up, this is a network engineering / vendor issue.</li>
      </ol>
      <h3>What "good" looks like</h3>
      <table>
        <tr><th>Tool</th><th>Healthy reading</th></tr>
        <tr><td><code>ibstat</code></td><td>State: Active, Physical state: LinkUp, Rate: at expected speed</td></tr>
        <tr><td><code>ip link</code></td><td>UP, speed and duplex correct (use <code>ethtool</code>)</td></tr>
        <tr><td>Switch port</td><td>Admin up / Link up / no errors counter incrementing</td></tr>
        <tr><td>EXFO meter</td><td>RX power within link-spec dB range</td></tr>
        <tr><td>Fiber scope</td><td>Pass — clean core, no debris in contact zone</td></tr>
      </table>
      <h3>Common gotchas</h3>
      <ul>
        <li><b>Errors but no down</b> — counter incrementing means the link is working but fragile (often a dirty fiber). Clean it before it fails.</li>
        <li><b>Asymmetric link</b> — one end shows up, the other shows down. Almost always a polarity / TX-RX issue.</li>
        <li><b>Wrong optic type</b> — SR optic on a long fiber run will fail. LR optic on a short multimode run will fail. Optic must match fiber + distance.</li>
        <li><b>APC vs UPC mismatch</b> — green-to-blue gives you a barely-working link with bad attenuation. Check ferrule colors.</li>
      </ul>
      <h3>Loopback testing — isolating port vs. cable plant</h3>
      <p>A <b>loopback</b> bends a port\'s transmit signal directly back into its own receive. If the port sees its own signal cleanly, the port and optic are healthy — the fault is somewhere in the cable plant or the far-end. This is often the fastest way to localize a stubborn link issue.</p>
      <h4>Hard loop (physical)</h4>
      <p>A physical loopback plug or fiber:</p>
      <ul>
        <li><b>RJ-45 loopback plug</b> — for 1G/10G copper management ports. Jumpers TX pins to RX pins.</li>
        <li><b>LC loopback</b> — short fiber jumper bending TX back to RX on a duplex LC port. Match SM (yellow) to a SM optic, MM (teal/aqua) to a MM optic.</li>
        <li><b>MPO loopback</b> — pre-built MPO cassette/plug that crosses TX fibers back to RX fibers within the connector. <b>Match polarity (APC green vs. UPC blue) AND key orientation</b> — wrong key gives no loopback.</li>
        <li><b>QSFP / SFP loopback module</b> — a self-contained module that plugs into the switch port itself, no fiber needed. Tests the entire SerDes path through the optic cage.</li>
      </ul>
      <h4>Soft loop (logical)</h4>
      <p>A <b>soft loop</b> is configured in software at the remote end of a circuit (commonly on carrier hand-off equipment) so the local end sees its own traffic returned. CW uses soft loops to validate backbone / leased-line circuits without sending a tech to the remote site. NOC owns soft-loop placement; DCT supports physically.</p>
      <h4>Reading a loopback test</h4>
      <ul>
        <li><b>Link comes up clean with loopback installed</b> → port and optic are healthy. Problem is in the cabling, the patch cord, the far end, or somewhere downstream.</li>
        <li><b>Link still down with loopback installed</b> → the port itself or the optic is the fault. Swap the optic with the loopback still in place; if it now comes up, the original optic was bad.</li>
        <li><b>Errors during loopback</b> → marginal optic or marginal port — replace.</li>
      </ul>
      <div class="panel warn">
        <div class="panel-title">Three rules when using fiber loopbacks</div>
        <ul>
          <li><b>Type-match</b> the loopback to the optic — SM loopback for SM optic, MM for MM. A type mismatch can show "no link" even with a healthy port.</li>
          <li><b>Polarity-match</b> for MPO — APC green-to-green, UPC blue-to-blue. Never mix.</li>
          <li><b>Cap the unused ends</b> — loopbacks live in the kit and get dirty. Scope and clean before use the same way you would any patch cord.</li>
        </ul>
      </div>
      <p>An InfiniBand link stuck in <b>"Polling"</b> with no light on the far end is a classic case where loopback testing pays off: loop the local optic and confirm it sees its own signal before you spend the next hour walking the entire cable run.</p>

      <h3>Official 8-step optic troubleshooting flow (DCT-SOP-NET-001)</h3>
      <p>This is the current authoritative procedure. Stop and escalate if anything in the field doesn\'t match — don\'t improvise.</p>
      <ol>
        <li><b>Verify the device.</b> Confirm serial number, asset tag, AND location physically match your Jira ticket. (Working on the wrong device is a hard rule violation.)</li>
        <li><b>Check port light at both ends.</b> Green / amber / no-light at the optic AND at the far end of the fiber run.
          <ul>
            <li>Green with no reported errors → confirm with requester, document, close. Don\'t reseat or replace without engineer direction.</li>
            <li>Green but throwing errors / resets → continue to step 3 anyway.</li>
            <li>Amber or dark → continue.</li>
          </ul>
        </li>
        <li><b>Clean the optic.</b> Both sides of the link. <b>Cleaning resolves the majority of optic-flagged issues.</b> Use the one-click pen, follow the Fiber Optic Cleaning Procedure (DCT-SOP-NET-001a). If it links → confirm both ends, close.</li>
        <li><b>Reseat the optic.</b> Disconnect fiber, remove optic, reseat firmly, reconnect fiber, recheck both ends. If it links → close.</li>
        <li><b>Check switchport admin down.</b> Before swapping the optic, confirm with the engineer that the switchport isn\'t administratively shut down. <b>A significant number of cases are resolved here.</b> If it was admin down and the engineer brings it up → confirm, close.</li>
        <li><b>Replace the optic.</b> Locate a spare of the <b>correct SKU</b> (see L2 Transceivers for the per-device matrix). Required before pulling:
          <ul>
            <li><b>Written authorization on the Jira ticket</b> — Slack or verbal is not sufficient</li>
            <li>Confirm with engineer if it\'s a dual-optic configuration (which side?)</li>
          </ul>
          Swap, reconnect, recheck both ends. If it links → close. If no spare on-hand → notify requester to contact Procurement / RMA, document, and stop.</li>
        <li><b>Escalate to Tier 2 (On-Call Engineer).</b> Port hasn\'t recovered after clean / reseat / admin-down check / replacement. Log timestamp + person contacted + response received in the Jira ticket.</li>
        <li><b>Validation & closeout.</b> Before closing: green at both ends, requester confirmation that connectivity is restored, all actions documented in Jira including written-authorization reference, before/after photos, any deviations from this SOP.</li>
      </ol>
      <div class="panel info">
        <div class="panel-title">Why "clean before reseat / replace"?</div>
        <p>The vast majority of "bad optic" tickets are dirty connectors. Reseating an unclean optic re-introduces the same dust. Replacing without cleaning wastes a several-thousand-dollar part. Always run the cleaning step first — and clean the partner end too.</p>
      </div>

      <h3>Loopback as a tiebreaker (when steps 1-6 don\'t resolve)</h3>
      <p>If the link still won\'t come up after the official flow, a <b>loopback</b> can localize the fault before you escalate. Place the appropriate loopback (correct fiber type — SM or MM — and APC/UPC polarity) on the suspect port:</p>
      <ul>
        <li><b>Loopback links cleanly</b> → port + optic are healthy; the cable plant or far-end is the issue. Clean / replace the cable, or escalate to the far-end site.</li>
        <li><b>Loopback does NOT link</b> → the optic is bad. Set it aside, label it, install a fresh one with the same SKU.</li>
      </ul>
      <p>Confirmed-bad optics get labeled and prepped for RMA with troubleshooting notes — never re-deployed.</p>

      <h3>Always match the optic SKU</h3>
      <p>Wrong optic family (SR on a long SMF run, DR on a multimode fiber, vendor-incompatible part) will fail to come up even on a perfectly clean link. <b>Always check the cutsheet</b> for the specific link\'s optic type before grabbing a spare. The L2 Transceivers module has the canonical CW SKU table.</p>

      <h3>The "Clean Network Link" auto-ticket workflow</h3>
      <p>When the network team detects a flapping link, an SDA ticket is opened automatically and the Glados-Overwatch Bot drops these instructions into the ticket — verbatim, the same every time:</p>
      <div class="panel info">
        <div class="panel-title">🤖 Auto-Triaged — DCT: Clean Network Link</div>
        <ol>
          <li>Enter the data hall and verify both sides of the network link reported in this ticket are valid.</li>
          <li>Thoroughly clean both sides of the network link fiber with a one-click pen. <b>Do not replace optics/transceivers yet.</b></li>
          <li>Be aware that once cleaning is completed, you may not see the link appear up immediately (light visible).</li>
          <li>Transition this Jira ticket to <b>"Cleaning Done"</b> — automation will send the ticket for customer\'s verification after.</li>
        </ol>
        <p style="margin-top:8px"><b>If you can\'t do the action</b> (no spare optic, link won\'t come up after cleaning, mechanical issue), transition to <b>"Awaiting Triage"</b> and explain in a comment.</p>
      </div>
      <p>The bot tracks "<b>Cleaning Attempt X of 2</b>" — after the second attempt fails, it auto-escalates to <b>Waiting For Support</b> for engineering review. <b>Always clean before swapping optics</b> — the network team explicitly does not want you replacing optics on attempt one.</p>

      <h4>What network engineering wants in the ticket</h4>
      <p>For IB links that don\'t recover after cleaning, engineering will ask for <code>mlxlink</code> diagnostic output. The format they expect:</p>
      <pre style="background:var(--bg-elev-2);padding:10px 14px;border-radius:6px;overflow-x:auto;font-family:ui-monospace,monospace;font-size:.82rem;line-height:1.5">mlxlink -d lid-&lt;lid&gt; -p &lt;physical_port_no&gt; -c

Operational Info
----------------
State                              : Polling
Physical state                     : ETH_AN_FSM_ENABLE
Speed                              : N/A
...
Troubleshooting Info
--------------------
Status Opcode                      : 2
Group Opcode                       : PHY FW
Recommendation                     : Negotiation failure</pre>
      <p>Paste the entire output as a comment on the ticket. The opcode (here, <code>2</code> = "Negotiation Failure") drives the next remediation — see the L3 RoCE module for the opcode-to-action mapping.</p>

      <h4>Real workflow example</h4>
      <p>Anonymized timeline of an actual InfiniBand link ticket (SDA-52977):</p>
      <ol>
        <li><b>16:21</b> — Bot auto-triages, requests mlxlink output</li>
        <li><b>16:21</b> — Bot posts Historical Ticket Summary (2 prior tickets on same hardware in past 60 days)</li>
        <li><b>16:23</b> — Engineer pastes mlxlink output, State=Polling, Opcode 2, "Negotiation Failure"</li>
        <li><b>16:52</b> — Bot triages: link clean counter is empty → moves to Waiting For Support</li>
        <li><b>17:13</b> — DCT cleans both sides → "Links up after cleaning"</li>
        <li><b>17:13</b> — Auto-transition to Customer Verification</li>
        <li><b>Next day 13:29</b> — Engineer confirms "link is up"</li>
        <li><b>13:29</b> — Closed</li>
      </ol>
      <p>Notice the rhythm: bot drives → engineer diagnoses → DCT cleans → bot transitions → customer/engineer verifies → closed. The whole loop is &lt;24 hours when it works the first time.</p>

      <h3>SN5600 / SN5610 lane select button</h3>
      <p>The SN5600 and SN5610 switches are increasingly common in CW deployments. They behave identically from a DCT perspective; the only visible difference is the supervisor processor (Epyc on 5610, Xeon on 5600) and the location of the lane-select button.</p>
      <p>Each QSFP port on these switches has <b>8 lanes</b>. Common configurations:</p>
      <ul>
        <li><b>x8</b> — single connection using all 8 lanes</li>
        <li><b>x4-A / x4-B</b> — two connections, 4 lanes each</li>
        <li><b>x2-A / x2-B / x2-C / x2-D</b> — four connections, 2 lanes each (uses splitter cables)</li>
      </ul>
      <h4>Reading the link LED</h4>
      <table>
        <tr><th>LED state</th><th>Meaning</th></tr>
        <tr><td>Off</td><td>No link</td></tr>
        <tr><td>Solid green</td><td>Link is up</td></tr>
        <tr><td>Blinking green</td><td>Traffic passing</td></tr>
        <tr><td>Solid amber</td><td>Problem with the link (only meaningful when lane-selection LED is lit)</td></tr>
      </table>
      <h4>Lane select procedure</h4>
      <p>In normal operation, leave lane selection at <b>0</b> (no LED lit) — that gives you an aggregated view of any lane being up. To diagnose a specific lane:</p>
      <ol>
        <li>Press the lane-select button to advance through lanes <b>0 → 1 → 2 → 3 → 4</b> (only 0-4 are used in current configurations).</li>
        <li>Watch the affected port\'s link LED at each lane setting.</li>
      </ol>
      <table>
        <tr><th>Lane setting</th><th>Shows</th></tr>
        <tr><td>0</td><td>Aggregated — any lane up</td></tr>
        <tr><td>1</td><td>x8 / x4-A / x2-A</td></tr>
        <tr><td>2</td><td>x8 / x4-B / x2-B</td></tr>
        <tr><td>3</td><td>x8 / x2-C</td></tr>
        <tr><td>4</td><td>x8 / x2-D</td></tr>
      </table>
      <h4>Example diagnosis</h4>
      <p>NOC says port 5 is down but its LED is blinking green at lane 0. With splitter cables, that means at least one lane is up but possibly not all. Cycle through lanes 1-4:</p>
      <ul>
        <li>Lane 1: blinking green ✓</li>
        <li>Lane 2: <b>OFF</b> ← down</li>
        <li>Lane 3: blinking green ✓</li>
        <li>Lane 4: blinking green ✓</li>
      </ul>
      <p>Lane 2 (x2-B) is down — that maps to the second connection on the first port of the dual-port optic, likely the second end of the splitter cable. You\'ve localized the fault without ever touching a fiber.</p>
    `,

      <p>Replacing a rack PDU is a textbook L3 task: it requires planning, an understanding of A/B redundancy, vendor coordination, and a non-trivial physical swap. It\'s also one of the highest-stakes routine tasks — get it wrong and you crash a rack of customer workloads.</p>
      <h3>Pre-checks (do not skip)</h3>
      <ol>
        <li><b>Verify ALL devices in the rack have redundant power</b>. Walk the rack — every server should have two PSUs, one on each rack PDU. Any single-PSU device means you cannot pull this PDU without taking it down.</li>
        <li><b>Check the partner PDU is healthy</b> — voltage in spec, no error LEDs, taking close to its expected load already.</li>
        <li><b>Confirm the replacement matches</b> — same part number, amperage rating, outlet count, network jack if it\'s a smart PDU.</li>
        <li><b>Notify</b> — Slack the ops channel, tag DCM. The blast radius of a bad swap is the whole rack.</li>
        <li><b>Photograph</b> the current cabling thoroughly. You\'ll need this to put it back exactly the same way.</li>
      </ol>
      <h3>Swap procedure (high level)</h3>
      <ol>
        <li>Trace and label every cord plugged into the doomed PDU</li>
        <li>One at a time, unplug each cord (each device falls back to its partner PSU on the other PDU)</li>
        <li>Watch the partner PDU load climb — confirm it stays within its capacity</li>
        <li>Power down and unplug the PDU\'s upstream feed at the RPP (per facility procedure)</li>
        <li>Remove the old PDU from the rack</li>
        <li>Install the new PDU mechanically</li>
        <li>Connect the upstream feed at the RPP, energize</li>
        <li>Verify voltage and ground on the new PDU before plugging anything in</li>
        <li>Plug each cord back in <b>one at a time</b>, watching for load distribution</li>
        <li>Confirm every device shows two healthy PSUs again</li>
        <li>Close the loop in the ticket with photos and meter readings</li>
      </ol>
      <h3>Things that go wrong</h3>
      <ul>
        <li>A "redundant" device turns out to be single-PSU because a vendor shipped it that way. Always verify visually.</li>
        <li>The partner PDU is closer to its capacity ceiling than expected and trips when the full rack load shifts. Pre-check the partner load.</li>
        <li>Cabling gets reconnected to wrong outlets, breaking labeled cable management. Use your photos.</li>
      </ul>

    body: `
      <p>Joining the on-call rotation isn\'t tied to a single level — <b>it depends on your site, team, and country</b>. Some sites bring DCTs in as soon as they\'re confident on the floor; others wait until you\'re deeper into diagnostic work. Your DCM and your country\'s on-call policy doc are the authority on when (and whether) you join. What\'s universal: on-call means you carry the pager outside normal hours and you\'re the first responder when production wakes up. The work itself is mostly the same diagnostics you already know — what changes is the time pressure, the communication discipline, and the need to make good calls with incomplete information at 3 AM.</p>

      <h3>What on-call means at CoreWeave</h3>
      <ul>
        <li><b>Rotation:</b> shifts vary by site and country. Check with your DCM and your country\'s on-call policy doc for the exact rotation, comp, and rules.</li>
        <li><b>Reachability:</b> you must be reachable on PagerDuty for the duration of your shift. Phone charged, signal available, and able to be at the site within the policy-defined response window.</li>
        <li><b>Sobriety + fitness for duty:</b> you\'re responsible for production hardware. Standard rules apply.</li>
        <li><b>Coverage:</b> if something comes up (illness, emergency), swap shifts via the on-call schedule and notify your DCM. Don\'t go silent.</li>
      </ul>
      <div class="panel info">
        <div class="panel-title">Where to find your country\'s policy</div>
        <p>Each region has its own on-call policy attached as a PDF in Confluence (US, UK, Norway, Sweden, etc.). These cover legally-binding details — comp time, response windows, callout pay. Read yours before your first shift.</p>
      </div>

      <h3>Response SLAs — what you\'re held to</h3>
      <p>Your shift comes with measurable response targets. These are <b>internal SLAs</b> — service-level agreements between DC Ops and the rest of CoreWeave (Bare Metal, FRO, NetDev, customer-facing teams). Hitting them is the difference between an alert that gets handled quietly and an incident that becomes a postmortem.</p>
      <p>Every region has its own SLA values codified in the on-call policy doc — read yours before your first shift. The <i>shape</i> of the SLAs is the same everywhere; the numbers vary by region, severity, and whether the incident is customer-impacting.</p>
      <p>The clocks you\'ll be measured against:</p>
      <ul>
        <li><b>Time to ACK</b> — from page fired to PagerDuty ACK. The clock starts the moment your phone buzzes. Miss the window and PagerDuty escalates automatically (next person on the rotation, then DCM, then leadership). ACK is not "I\'ve solved it" — ACK is "I see this and I\'m on it."</li>
        <li><b>Time to engage</b> — from ACK to your first real action against the alert (open the dashboard, post in <code>#ops</code>, walk to the rack). ACK + read = engaged.</li>
        <li><b>Time to onsite</b> — from page to physically at the affected hardware. Severity drives this: customer-impacting incidents have aggressive onsite targets; lower-severity events are more relaxed.</li>
        <li><b>Time to mitigate</b> — from page to symptom-resolved (alert clear, customer impact stopped). Different from root-cause — mitigation can be a workaround that buys time.</li>
        <li><b>Time to resolve</b> — from page to PagerDuty resolved <i>and</i> ticket closed with full documentation. The SLA isn\'t done when the alert clears; it\'s done when the record is complete.</li>
        <li><b>Escalation threshold</b> — every SLA has a hard timer that auto-pages the next responder if you don\'t ACK or make progress. Don\'t sit on a page hoping it\'ll go away.</li>
      </ul>
      <div class="panel warn">
        <div class="panel-title">If you\'ll miss an SLA, say so early</div>
        <p>Calling out "I\'m 10 minutes from site, ETA 20" beats silently missing the time-to-onsite target. The team can pull in a backup, pre-stage parts, or page the next responder. Silence forces them to assume the worst.</p>
      </div>
      <p>SLA values are <b>policy</b>, not personal targets. They\'re set by region and customer contract and reviewed in incident retros. If you find yourself routinely missing a target — bad badge access, alert routing, broken paging chains — flag it to your DCM. SLAs only work if the system supports hitting them.</p>

      <h3>The standard PagerDuty workflow</h3>
      <p>When a page fires, run this loop:</p>
      <ol>
        <li><b>ACK</b> in PagerDuty within the response window. ACK = "I see this and I\'m on it." Failing to ACK escalates to the next responder, then to your DCM, then to leadership.</li>
        <li><b>Read the alert</b> — incident summary, affected host/component, severity, and any annotations. Most CW PagerDuty alerts include a Grafana <code>dashboard_url</code> in the annotations — copy it.</li>
        <li><b>Open Grafana</b> (or whatever dashboard the alert points to). Read the metric history: when did it start, how steep, still degrading or stable?</li>
        <li><b>Post in <code>#ops</code> Slack</b> for your site. Tag the right team for the alert type (see the playbook table below). Even if you can fix it yourself, the post creates the record.</li>
        <li><b>Triage</b> — is this a known runbook scenario? If yes, follow the runbook. If no, escalate before guessing.</li>
        <li><b>Act</b> — physical walk, remediation, hardware swap, etc. Pull from your toolkit + LOIS Locker as appropriate.</li>
        <li><b>Verify</b> the alert clears and the metric returns to normal. Don\'t just close PagerDuty because you "did the thing" — confirm the system agrees.</li>
        <li><b>Resolve</b> in PagerDuty.</li>
        <li><b>Document</b> — close the loop in the ticket / runbook with what you did, what you saw, photos, and any anomalies. If the incident hit customers, an RCA / postmortem may follow.</li>
      </ol>

      <h3>Playbook by alert type</h3>
      <table>
        <tr><th>Alert</th><th>First action</th><th>Tag in Slack</th></tr>
        <tr><td>Hot GB200 / thermal</td><td>ACK, open dashboard, walk to rack with phone, check CDU + glycol level</td><td><code>@liquid-metal</code> + FRO</td></tr>
        <tr><td>Network link down / flapping</td><td>ACK, check both end states, Grafana, walk for physical (clean/reseat/swap optic — see L3 Link Troubleshooting)</td><td><code>@bare-metal-support</code> / NOC</td></tr>
        <tr><td>Node backend link fault</td><td>ACK, check the relevant runbook (NodeBackendLinkFault), correlate to leaf-port mapping</td><td>FRO + HPC-NET</td></tr>
        <tr><td>InfiniBand link in Polling state</td><td>ACK, walk to rack, scope/clean both ends, loopback test if needed</td><td>HPC-NET</td></tr>
        <tr><td>Hardware fault (fan/PSU/ECC)</td><td>ACK, BMC SEL check, remote cycle if appropriate, otherwise swap part (see L2 Fan/PSU)</td><td>Bare Metal Support</td></tr>
        <tr><td>Power event (utility, breaker, PDU)</td><td>ACK, walk hall, confirm UPS/generator behavior, escalate any device that didn\'t ride through</td><td>DCM + Facilities</td></tr>
        <tr><td>Liquid cooling alarm</td><td>ACK, do not freelance — direction comes from Liquid Metal team only</td><td><code>@liquid-metal</code></td></tr>
        <tr><td>Security alert (door, badge, camera)</td><td>ACK, check physically, escalate to DC Security Manager and DCM</td><td>DCSM</td></tr>
        <tr><td>Unknown / unfamiliar alert</td><td>ACK, post the alert text in Slack, escalate to DCM</td><td>DCM</td></tr>
      </table>

      <h3>When to escalate vs. when to act</h3>
      <p>The cheap heuristic: <i>if you don\'t know what you\'re looking at, escalate before touching anything.</i> An unfamiliar alert in production hardware is exactly the kind of moment where a confident-wrong move turns a small incident into a multi-customer outage. Specific cases that always escalate:</p>
      <ul>
        <li>Anything involving glycol, fire, smoke, water, or arcing — STOP and escalate</li>
        <li>Any tray-internal action on a GB200 (Dell-only)</li>
        <li>Any RPP / facility breaker action (Facilities-only)</li>
        <li>Any liquid cooling action without explicit Liquid Metal direction</li>
        <li>Anything you haven\'t been trained on, even if it\'s in a runbook</li>
        <li>Any incident that has visibly hit customer workloads</li>
      </ul>

      <h3>Communication during an incident</h3>
      <p>Once an incident is active, your <code>#ops</code> Slack thread becomes the live timeline. Treat it like a flight recorder:</p>
      <ul>
        <li><b>Timestamp every action.</b> "08:17 acked PD; 08:19 walked to rack 142; 08:23 PSU 1 confirmed failed, replacing from LOIS"</li>
        <li><b>State observations, not conclusions.</b> "Fan A1 lamp off, fan visibly stopped" beats "fan is bad"</li>
        <li><b>Tag the team you need next, not generic <code>@channel</code>.</b></li>
        <li><b>If a customer is impacted</b>, IMOC (Incident Manager On Call) or your DCM may take comms ownership. Don\'t guess at customer comms — that\'s deliberately delegated.</li>
      </ul>

      <h3>First-touch reporting — the WHO / WHAT / WHERE / WHEN / HOW template</h3>
      <p>For physically observable issues that <i>might</i> become incidents but haven\'t been declared yet, CW uses a standardized <b>DC First Responder</b> Slack workflow. The format is the same shape as a pre-INCI summary so DCM / SOE / CloudOps / IMOC can read it and decide quickly.</p>
      <p>Use this format whether you\'re submitting through the workflow or just typing into <code>#ops</code>:</p>
      <pre style="background:var(--bg-elev-2);padding:14px 16px;border-radius:var(--radius);overflow-x:auto;font-family:ui-monospace,monospace;font-size:.82rem;line-height:1.55;">🚨 DC First Responder report

• <b>Location (WHERE):</b> US-EAST-01A, DH2, rows 1-10, racks 5-8
• <b>Environment / platform:</b> Bare Metal — Albatross / CKS / Internal / etc.
• <b>Issue category:</b> Power | Cooling | Leak | Construction/contamination | Physical pattern | Security/safety
• <b>Potentially impacted (WHO):</b> Albatross grid, generic CKS capacity, internal only, Unknown

• <b>What is seen (WHAT):</b> physical observation only (see / hear / smell / feel)
• <b>Start time (WHEN):</b> approx local time — "today ~16:05 local" / "during AM walkthrough"
• <b>How it was found (HOW):</b> Walkthrough | Working a ticket / RMA | Called by colo | Vendor | SOE | Other

• <b>Current impact / risk:</b> what the impact actually is right now, if any
• <b>DCT priority guess:</b> P4 (no impact, just risk) | P3 (localized) | P2 (likely customer-impacting / safety)

• <b>Troubleshooting so far:</b> what you've already done (or "no actions yet, just reporting")
• <b>Recent changes:</b> any planned works, contractors, recent maintenance

• <b>Photos:</b> attach if available</pre>
      <h4>Categories the workflow covers (v1)</h4>
      <ul>
        <li>Power events</li>
        <li>Cooling / temperature</li>
        <li>Leaks / water</li>
        <li>Construction / contamination in data hall</li>
        <li>Physical server / fabric patterns (visual only)</li>
        <li>Physical security / safety</li>
      </ul>
      <p>The point of the format is to make sure first responders don\'t have to ask 7 follow-up questions to figure out what\'s happening. <b>Describe what you see, not what you think it means.</b> "Wood dust on floor and fronts of racks C1200 R1-R5" beats "I think contractors made a mess." "Multiple servers in R21 powered off with amber LEDs" beats "looks like a rack went down."</p>

      <h3>After the incident</h3>
      <ul>
        <li>Resolve PagerDuty</li>
        <li>Close out the ticket with full timeline + photos</li>
        <li>If it\'s a recurring fault pattern, file an SDA / proactive ticket so L3/L4 can drive root-cause</li>
        <li>If customer-impacting, expect a postmortem / RCA review — your timeline notes feed directly into it</li>
        <li>Sleep. The next page is coming and you need to be sharp for it.</li>
      </ul>
