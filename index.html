<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreWeave DCT Training Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* LIGHT theme (default) — CoreWeave brand: white surfaces, near-black text, electric brand blue */
  :root, [data-theme="light"] {
    --bg: #ffffff;
    --bg-elev: #fbfbfd;
    --bg-elev-2: #f5f5f7;
    --border: #e5e5ea;
    --border-strong: #86868b;
    --text: #1a1a1a;
    --text-dim: #737373;
    --accent: #2741e7;
    --accent-hover: #3c56f1;
    --accent-2: #248a3d;
    --warn: #ca6900;
    --danger: #d70015;
    --l1: #248a3d;
    --l2: #2741e7;
    --l3: #ca6900;
    --l4: #6f3ff5;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.08);
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 18px;
    --radius-pill: 980px;
  }
  /* DARK theme — CoreWeave brand: deep black surfaces, brighter blue for contrast */
  [data-theme="dark"] {
    --bg: #0a0a0a;
    --bg-elev: #161618;
    --bg-elev-2: #1f1f22;
    --border: #2d2d30;
    --border-strong: #5a5a5e;
    --text: #f5f5f7;
    --text-dim: #999999;
    --accent: #5a72ff;
    --accent-hover: #7388ff;
    --accent-2: #4fae6e;
    --warn: #d68930;
    --danger: #d65c54;
    --l1: #4fae6e;
    --l2: #5a72ff;
    --l3: #c98239;
    --l4: #9a7ad6;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
    --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.45);
    --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.5);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro", "SF Pro Display", "Helvetica Neue", "Inter", system-ui, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.47059;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  body { letter-spacing: -0.022em; }
  a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
  a:hover { text-decoration: underline; }
  code {
    background: var(--bg-elev-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    border: 1px solid var(--border);
  }
  ::selection { background: rgba(39, 65, 231, 0.20); }

  /* Smooth color transitions across theme changes */
  html, body, header, aside.sidebar, main.content, .nav-link, .nav-section-link, .level-card,
  .quiz, .quiz-option, .panel, .objectives, .ref-list, .visual, .emergency-card,
  .glossary-search, .resources-search, .nav-search input, code, .module-meta, .glossary-term, .resource-item {
    transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }

  /* Page / module entry */
  section.module.active {
    animation: moduleEnter 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes moduleEnter {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Home — stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin: 16px 0;
  }
  .stat-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 14px;
    text-align: center;
    animation: statReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .stat-card:nth-child(1) { animation-delay: 0.05s; }
  .stat-card:nth-child(2) { animation-delay: 0.10s; }
  .stat-card:nth-child(3) { animation-delay: 0.15s; }
  .stat-card:nth-child(4) { animation-delay: 0.20s; }
  .stat-card:nth-child(5) { animation-delay: 0.25s; }
  .stat-card:nth-child(6) { animation-delay: 0.30s; }
  @keyframes statReveal {
    from { opacity: 0; transform: translateY(16px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .stat-num {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.028em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    transition: color 0.3s ease;
  }
  .stat-num.success { color: var(--accent-2); }
  .stat-num.warn { color: var(--l3); }
  .stat-num.purple { color: var(--l4); }
  .stat-label {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* Home — "How a module works" rhythm grid */
  .rhythm-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    margin: 16px 0;
  }
  .rhythm-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 600px) {
    .rhythm-grid { grid-template-columns: 1fr; }
  }
  .rhythm-step-num {
    font-size: 0.7rem;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    color: var(--accent);
  }
  .rhythm-step-num.purple { color: var(--l4); }
  .rhythm-step-num.warn { color: var(--warn); }
  .rhythm-step-num.success { color: var(--accent-2); }
  .rhythm-step-num.amber { color: var(--l3); }
  .rhythm-step-detail {
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  /* Home — competency / button row helpers */
  .competency-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin: 14px 0;
  }
  .home-cta-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin: 18px 0 28px;
  }


  /* Level cards staggered + improved hover */
  .level-grid .level-card {
    animation: cardReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .level-grid .level-card:nth-child(1) { animation-delay: 0.08s; }
  .level-grid .level-card:nth-child(2) { animation-delay: 0.16s; }
  .level-grid .level-card:nth-child(3) { animation-delay: 0.24s; }
  .level-grid .level-card:nth-child(4) { animation-delay: 0.32s; }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Progress bar shimmer */
  .progress-fill {
    position: relative;
    overflow: hidden;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; left: -40%; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
    animation: shimmer 2.5s infinite;
  }
  @keyframes shimmer {
    0% { left: -40%; }
    100% { left: 110%; }
  }

  /* Quiz feedback animations */
  .quiz-option.correct {
    animation: correctPulse 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes correctPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  .quiz-option.incorrect {
    animation: incorrectShake 0.4s ease-out;
  }
  @keyframes incorrectShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }
  .quiz-explain.show {
    animation: explainSlide 0.35s ease-out;
  }
  @keyframes explainSlide {
    from { opacity: 0; transform: translateY(-4px); max-height: 0; }
    to { opacity: 1; transform: translateY(0); max-height: 200px; }
  }

  /* Mark-complete celebration */
  .complete-row .complete-status.done {
    animation: completeFlash 0.6s ease-out;
  }
  @keyframes completeFlash {
    0% { transform: scale(1); color: var(--text); }
    50% { transform: scale(1.08); color: var(--accent-2); }
    100% { transform: scale(1); color: var(--accent-2); }
  }

  /* Nav link hover refinement */
  .nav-link {
    position: relative;
  }
  .nav-link::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: var(--accent);
    opacity: 0;
    transition: width 0.2s ease, opacity 0.2s ease;
  }
  .nav-link.active::before {
    width: 2px;
    opacity: 1;
  }
  .nav-link.active { border-left-color: transparent; }

  /* Reduced motion respect */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    height: 56px;
  }
  header::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: -1px;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 28%, var(--l3) 60%, var(--l4) 78%, transparent 100%);
    opacity: 0.5;
    pointer-events: none;
  }
  [data-theme="dark"] header { background: rgba(10, 10, 10, 0.78); border-bottom-color: rgba(45, 45, 48, 0.7); }
  [data-theme="dark"] header::after { opacity: 0.6; }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-width: 0;
  }
  .sidebar-toggle {
    appearance: none;
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    display: inline-flex;
    border-radius: 9px;
    transition: transform 0.2s, opacity 0.15s;
    position: relative;
  }
  .sidebar-toggle:hover { opacity: 0.86; }
  .sidebar-toggle:active { transform: scale(0.94); }
  .sidebar-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .sidebar-toggle .brand-mark { transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1); }
  .layout.sidebar-collapsed ~ * .sidebar-toggle .brand-mark,
  .sidebar-toggle[aria-expanded="false"] .brand-mark {
    transform: rotate(-90deg);
  }
  .brand-link {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    min-width: 0;
    transition: opacity 0.15s;
  }
  .brand-link:hover { opacity: 0.82; }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    flex: 1;
    min-width: 0;
    transition: opacity 0.15s;
  }
  .brand:hover { opacity: 0.82; }
  .brand-mark {
    display: inline-flex;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(39, 65, 231, 0.22), 0 6px 16px rgba(39, 65, 231, 0.18);
    flex-shrink: 0;
  }
  [data-theme="dark"] .brand-mark {
    box-shadow: 0 1px 2px rgba(90, 114, 255, 0.32), 0 6px 18px rgba(90, 114, 255, 0.26);
  }
  .brand-text {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .brand-name {
    font-size: 0.96rem;
    font-weight: 600;
    letter-spacing: -0.018em;
    color: var(--text);
    white-space: nowrap;
  }
  .brand-divider {
    display: inline-block;
    width: 1px;
    height: 16px;
    background: var(--border-strong);
    opacity: 0.45;
  }
  .brand-title {
    font-size: 0.88rem;
    font-weight: 500;
    letter-spacing: -0.012em;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @media (max-width: 720px) {
    .brand-divider, .brand-title { display: none; }
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.78rem;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .progress-meta {
    display: inline-flex;
    align-items: baseline;
    gap: 7px;
    line-height: 1;
  }
  .progress-pct {
    font-weight: 600;
    font-size: 0.84rem;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .progress-sep { opacity: 0.35; font-size: 0.7rem; }
  .progress-count { font-weight: 500; }
  .progress-bar {
    width: 200px;
    height: 8px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  [data-theme="dark"] .progress-bar { border-color: rgba(45, 45, 48, 0.8); }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--l1), var(--l2), var(--l3), var(--l4));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 999px;
    box-shadow: 0 0 8px rgba(39, 65, 231, 0.35);
    position: relative;
    overflow: hidden;
  }
  [data-theme="dark"] .progress-fill { box-shadow: 0 0 10px rgba(90, 114, 255, 0.4); }
  .progress-fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.45), transparent);
    transform: translateX(-100%);
    animation: progress-shimmer 2.6s ease-in-out infinite;
  }
  @keyframes progress-shimmer {
    0% { transform: translateX(-100%); }
    60%, 100% { transform: translateX(220%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .progress-fill::after { animation: none; }
  }

  .icon-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 6px 12px 6px 10px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: -0.005em;
    transition: all 0.15s;
    font-family: inherit;
  }
  .icon-btn .icon { flex-shrink: 0; opacity: 0.7; transition: opacity 0.15s, transform 0.25s; }
  .icon-btn:hover {
    background: var(--bg-elev-2);
    border-color: var(--text);
  }
  .icon-btn:hover .icon { opacity: 1; }
  .icon-btn:active { transform: scale(0.97); }
  .icon-btn[data-icon="theme"]:hover .icon { transform: rotate(45deg); }
  .icon-btn[data-icon="reset"]:hover .icon { transform: rotate(-90deg); }
  .icon-btn[data-icon="resume"]:hover .icon { transform: translateX(2px); }
  .icon-btn[hidden] { display: none; }
  [data-theme="dark"] .icon-theme-sun { display: none; }
  .icon-theme-moon { display: none; }
  [data-theme="dark"] .icon-theme-moon { display: inline; }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 57px);
    transition: grid-template-columns 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .layout.sidebar-collapsed {
    grid-template-columns: 0 1fr;
  }
  aside.sidebar {
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    padding: 18px 0;
    overflow-y: auto;
    max-height: calc(100vh - 57px);
    position: sticky;
    top: 57px;
    transition: opacity 0.22s ease, transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .layout.sidebar-collapsed aside.sidebar {
    opacity: 0;
    transform: translateX(-12px);
    pointer-events: none;
    overflow: hidden;
  }
  aside.sidebar::-webkit-scrollbar { width: 8px; }
  aside.sidebar::-webkit-scrollbar-track { background: transparent; }
  aside.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  aside.sidebar::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }
  .nav-search {
    margin: 0 16px 14px;
  }
  .nav-search input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 0.88rem;
    transition: all 0.15s;
    font-family: inherit;
  }
  .nav-search input::placeholder { color: var(--text-dim); }
  .nav-search input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(39, 65, 231, 0.18);
  }
  [data-theme="dark"] .nav-search input:focus { box-shadow: 0 0 0 3px rgba(90, 114, 255, 0.22); }
  .nav-section {
    margin-bottom: 4px;
  }
  .nav-section { margin-bottom: 6px; }
  .nav-section-title {
    padding: 8px 16px;
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.07em;
    font-weight: 600;
  }
  .nav-section-title.collapsible {
    user-select: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-section-link {
    cursor: pointer;
    flex: 1;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: color 0.15s;
  }
  .nav-section-link:hover { color: var(--text); }
  .nav-section-link.active { color: var(--text); }
  .nav-section-title .chevron {
    display: inline-block;
    width: 14px;
    text-align: center;
    transition: transform 0.18s ease;
    color: var(--text-dim);
    font-size: 0.6rem;
    cursor: pointer;
    padding: 2px;
    border-radius: 3px;
  }
  .nav-section-title .chevron:hover { color: var(--text); background: var(--bg-elev-2); }
  .nav-section.collapsed .chevron { transform: rotate(-90deg); }
  .nav-section.collapsed .nav-link { display: none; }
  .nav-section-title .lvl-count {
    margin-left: auto;
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    background: var(--bg-elev-2);
    padding: 1px 8px;
    border-radius: 999px;
  }
  .nav-link {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px 7px 18px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.88rem;
    border-left: 2px solid transparent;
    transition: all 0.12s;
  }
  .nav-link:hover { background: var(--bg-elev-2); text-decoration: none; }
  .nav-link.active {
    background: var(--bg-elev-2);
    border-left-color: var(--accent);
    font-weight: 500;
    color: var(--text);
  }
  .nav-link .check {
    margin-left: auto;
    color: var(--accent-2);
    font-size: 0.9rem;
  }
  .level-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    font-size: 0.65rem;
    font-weight: 700;
    color: #ffffff;
    margin-right: 6px;
    min-width: 24px;
    text-align: center;
    letter-spacing: 0.04em;
  }
  [data-theme="dark"] .level-pill { color: #0a0d12; }
  .l1-pill { background: var(--l1); }
  .l2-pill { background: var(--l2); }
  .l3-pill { background: var(--l3); }
  .l4-pill { background: var(--l4); }

  main.content {
    padding: 48px 64px 80px;
    max-width: 980px;
    width: 100%;
  }
  section.module { display: none; }
  section.module.active { display: block; }
  .module-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .module-header h2 {
    margin: 0;
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: -0.028em;
    line-height: 1.1;
  }
  .module-meta {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 32px;
    letter-spacing: -0.022em;
  }
  h2 { letter-spacing: -0.028em; font-weight: 700; }
  .objectives {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 16px 20px;
    border-radius: var(--radius);
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }
  .objectives h4 {
    margin: 0 0 10px;
    font-size: 0.72rem;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .objectives ul { margin: 0; padding-left: 20px; }

  /* Module nav footer — minimal Prev / Next text links */

  /* Home / overview */
  .level-grid {

  .level-card {

  /* Glossary */
  .glossary-search {

  .glossary-cat {

  }
  .glossary-term dd {

  /* Resources index — mirrors glossary structure */
  .resources-search {
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    margin-bottom: 16px;
    font-family: inherit;
    transition: all 0.15s;

  .toc-chips {

    background: var(--accent);

  .resources-cat {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.022em;
    margin: 36px 0 8px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    scroll-margin-top: 70px;
    display: flex;
    align-items: baseline;
    gap: 12px;

  .resources-cat:first-of-type { margin-top: 24px; }

  .resources-section {

  /* Celebration overlay (100% complete) */
  .celebration {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 10, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    animation: celeb-fade 0.3s ease-out;
  }
  .celebration.active { display: flex; }
  @keyframes celeb-fade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .celebration-card {
    position: relative;
    width: min(520px, calc(100vw - 40px));
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 36px 32px 28px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(39, 65, 231, 0.18);
    animation: celeb-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  [data-theme="dark"] .celebration-card {
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6), 0 4px 14px rgba(90, 114, 255, 0.28);
  }
  @keyframes celeb-pop {
    0% { opacity: 0; transform: scale(0.85) translateY(18px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .celebration-trophy {
    width: 76px; height: 76px;
    margin: 0 auto 16px;

  @keyframes trophy-spin {
    0% { transform: rotate(-30deg) scale(0.5); opacity: 0; }
    100% { transform: rotate(0) scale(1); opacity: 1; }
  }
  .celebration-title {
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: -0.024em;
    margin: 0 0 8px;
    color: var(--text);
  }
  .celebration-meta {
    font-size: 0.88rem;
    color: var(--text-dim);
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  .celebration-message {
    font-size: 1rem;
    line-height: 1.55;
    color: var(--text);
    margin: 0 0 24px;
    letter-spacing: -0.012em;
    padding: 14px 16px;
    background: var(--bg-elev-2);
    border-radius: 12px;
    border: 1px solid var(--border);

  .celebration-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .celebration-close {
    position: absolute;
    top: 12px; right: 12px;

    border-radius: 50%;
    border: 1px solid var(--border);

    color: var(--text-dim);

    font-size: 16px;

  .celebration-close:hover {

    overflow: hidden;

  .confetti-piece {
    position: absolute;

    width: 10px;
    height: 16px;

    animation-name: confetti-fall;
    animation-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    animation-fill-mode: forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translate3d(0, -20px, 0) rotate(0deg); opacity: 1; }

    100% { transform: translate3d(var(--drift, 0px), 110vh, 0) rotate(var(--spin, 720deg)); opacity: 0.4; }
  }
  @media (prefers-reduced-motion: reduce) {
    .celebration-card, .celebration-trophy { animation: none; }

  /* Emergency card */
  .emergency-card {

  table {

  pre {

  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }

  @media print {

    section.module { display: block !important; page-break-after: always; }
  }
</style>

    body: `
      <p>The data center has more energy density than almost any other working environment. A single rack can pull 40-130+ kW. Liquid cooling adds glycol. Dropped tools become projectiles. PPE protects you and the equipment.</p>
      <h3>Standard PPE</h3>
      <ul>
        <li><b>Safety glasses</b> — when working with fiber, cutting zip ties, or near energized equipment.</li>
        <li><b>Closed-toe shoes</b> — always. Steel toe at most sites.</li>
        <li><b>Gloves</b> — cut-resistant for sheet metal handling; nitrile when handling glycol.</li>
        <li><b>Hearing protection</b> — fan noise in dense halls (GB200 racks especially) reaches the ear-damage threshold over a full shift.</li>
        <li><b>Hi-viz</b> — at sites where MHE (forklifts/lifts) operates.</li>
      </ul>
      <h3>Hazards to recognize early</h3>
      <div class="panel danger">
        <div class="panel-title">STOP and escalate immediately</div>
        <ul>
          <li><b>Burnt smell</b> — anywhere, ever. Unplug if safe to do so.</li>
          <li><b>Smoke or visible heat shimmer</b></li>
          <li><b>Liquid pooling</b> under a rack (could be glycol, condensate, or water leak)</li>
          <li><b>Buzzing / arcing sounds</b> from PDU, breaker panel, or busway</li>
          <li><b>Tripped breaker that won't reset</b> — there is a reason; do not force it</li>
        </ul>
      </div>
      <h3>EPO (Emergency Power Off)</h3>
      <p>Every data hall has an EPO button. It cuts all power to the floor in milliseconds. Pulling it is disruptive and expensive — reserved for life safety only (active fire, electrocution risk, structural). If you don't know whether to pull it, the answer is usually <b>get out and call</b>. Life safety always first.</p>
      <h3>Glycol handling</h3>
      <p>The colored liquid in GB-series cooling loops is ethylene glycol. It's slimy, mildly sweet-smelling, and minimally flammable. Treat it with respect: nitrile gloves, safety glasses, wash hands after. It is <b>non-conductive</b> by design — but a leak still means STOP and escalate.</p>

      <h3>Fiber optic & laser eye safety</h3>
      <p>Single-mode fiber carries invisible 1310/1550 nm infrared. You will not see it. Your eye gives you no warning before the laser damages your retina permanently. Multi-mode 850 nm is visible deep red but still bright enough to be hazardous at close range.</p>
      <ul>
        <li><b>Never look directly into a fiber end or an active optic.</b> Use a fibre scope (which filters/attenuates the light) or a power meter. A cell phone camera can sometimes pick up IR if you need a quick is-it-live check, but the scope is the right answer.</li>
        <li><b>Treat cut or exposed fiber as hazardous waste.</b> Glass shards. Don\'t sweep, don\'t blow them out with compressed air, don\'t leave them on the floor or on equipment.</li>
        <li><b>Recycle, never general waste.</b> Specialised recycling for large volumes; site DBD/e-waste bin for small amounts per local SOP.</li>
        <li><b>Don\'t pick up shards with bare hands.</b> Gloves on, dustpan, and dispose properly.</li>
        <li><b>Don\'t pull cables forcefully.</b> Use a careful push-pull. Long-nose fiber pliers are the right tool for tight LC/MPO disconnects.</li>
        <li><b>Mind the bend radius:</b> 10× cable diameter under no load (after install), 15-20× under tension (during install). Below that, you create permanent attenuation that no cleaning fixes.</li>
        <li><b>Fiber has memory.</b> If you bend it one way during a pull, it can spring back when released — keep your face out of the spring path.</li>
      </ul>
      <p><b>Required PPE for live fiber work:</b> safety glasses with side shields + nitrile or latex gloves.</p>

      <p>Every site is laid out the same conceptual way. Once you know the vocabulary, you can navigate any CoreWeave site in the world.</p>
      <h3>Hierarchy</h3>
      <ul>
        <li><b>Site</b> — the building. Has a CoreWeave 3-letter code (OBG, DTN, EVI) and a long code (US-EAST-01).</li>
        <li><b>Data Hall (DH)</b> — a single floor or large room within the site. Big sites have multiple (DH1, DH2, ...).</li>
        <li><b>Pod</b> — a group of racks sharing a common cold space. Generally one T0 switch rack per pod.</li>
        <li><b>Aisle</b> — a row of cabinets touching side-to-side. Fans blow the same direction across the row.</li>
        <li><b>Rack / Cabinet</b> — typically APC (Schneider) brand, 19" wide, square-hole.</li>
        <li><b>RU (Rack Unit)</b> — 1.75" of vertical space. Numbered <b>bottom-up</b>, RU1 at the floor.</li>
      </ul>
      <h3>Hot aisle / cold aisle</h3>
      <p>All servers in an aisle face the same direction. The <b>cold aisle</b> is in front (intake). The <b>hot aisle</b> is behind (exhaust). Pods are designed so we only cool the cold space, not the entire room — much more efficient.</p>

      <h3>Data center capacity — measured in megawatts</h3>
      <p>DC capacity is measured in <b>megawatts (MW)</b> of usable IT power, not square footage. Power is the constraining resource — you can fit more racks than you can power and cool. When you hear "a 30 MW build" or "a 200 MW campus," that\'s the IT load (not facility-total) the site can support.</p>
      <table>
        <tr><th>Scale</th><th>Typical IT load</th><th>What it looks like</th></tr>
        <tr><td>Edge / small</td><td>&lt; 5 MW</td><td>Single hall, narrow customer base</td></tr>
        <tr><td>Mid-size</td><td>5 – 30 MW</td><td>Multiple data halls, multi-tenant or single-customer build</td></tr>
        <tr><td>Hyperscale</td><td>30 – 100+ MW</td><td>Campus-style, multiple buildings, dedicated substations</td></tr>
        <tr><td>Mega-campus</td><td>100 MW – 1 GW+</td><td>Custom power infrastructure, often grid-scale generation nearby</td></tr>
      </table>
      <p>For context: a single GB200 rack draws roughly <b>120-130 kW</b>. A 30 MW data hall is in the order of 200-250 GB200 racks at full deployment. CW operates from mid-size to hyperscale.</p>

      <h3>Types of data centers you\'ll see</h3>
      <ul>
        <li><b>Owned / built</b> — CW designs and operates the building (mostly newer big-bird sites). Maximum control over design choices like liquid cooling and power distribution.</li>
        <li><b>Colocation ("colo")</b> — CW leases space and power from a landlord (DataBank, QTS, Digital Realty, Stack, CyrusOne, etc.). Landlord owns the building, generators, chillers; CW owns everything in our cages. Most CW sites work this way.</li>
        <li><b>Wholesale colocation</b> — entire data hall or building leased to one tenant (CW). Looks like an owned site but the landlord still operates the facility.</li>
        <li><b>Hyperscale partner build</b> — purpose-built sites for AI workloads with bespoke power and cooling (the GB200 / liquid-cooled deployments).</li>
      </ul>

      <h3>Site identifiers — the codes you\'ll see in tickets</h3>
      <ul>
        <li><b>3-letter short name:</b> <code>OBG</code> (Orangeburg), <code>DTN</code> (Denton), <code>EVI</code> (Elk Grove), <code>BVI</code> (Allentown). Quick chat shorthand.</li>
        <li><b>Three+ code:</b> <code>OBG-01</code>, <code>DTN-01</code>. Most common form in tickets.</li>
        <li><b>Long code:</b> <code>US-EAST-01</code>, <code>US-CENTRAL-08</code>. The customer-facing region identifier.</li>
        <li><b>Building suffix:</b> <code>OBG-01A</code>, <code>OBG-01B</code> — different buildings on the same campus, customer-facing as separate Availability Zones.</li>
        <li><b>Landlord name:</b> some sites are referred to by what the landlord calls them (DataBank\'s <code>LGA3</code> = our <code>OBG-01</code>, QTS\'s <code>NJ2</code>, etc.). You\'ll hear both during landlord coordination.</li>
        <li><b>Address:</b> occasionally a site is named for its address — <code>111 Eighth</code> in Manhattan being the canonical example.</li>
      </ul>
      <p>Tickets, Slack channels, and dashboards each use slightly different identifier styles for the same site. When in doubt, search Glean for the short name to find canonical mappings.</p>

        <tr><th>Type</th><th>Summary format</th><th>What it means</th></tr>
        <tr><td><b>Servers</b></td><td><code>Servers | Region: &lt;region&gt; | Serial: &lt;svc-tag&gt; | Priority: L3: Medium</code></td><td>A specific node has flagged a fault — fan, PSU, drive, etc.</td></tr>
        <tr><td><b>InfiniBand Link</b></td><td><code>InfiniBand Link | Region: &lt;region&gt; | A: &lt;serial&gt; &lt;port&gt; | B: &lt;serial&gt; &lt;port&gt;</code></td><td>An IB link between two devices is flapping or down — A is one end, B is the other</td></tr>
        <tr><td><b>Ethernet Link</b></td><td>Same A/B format</td><td>Same idea, on the Ethernet fabric (Grid)</td></tr>
        <tr><td><b>Network Links</b></td><td>Generic catch-all</td><td>Could be either; check the description</td></tr>
        <tr><td><b>Parts Approval Request</b></td><td><code>Parts Approval Request</code></td><td>Auto-generated when a self-maintenance part swap needs sign-off</td></tr>
      </table>

      <h3>Glados-Overwatch Bot — the auto-triage layer</h3>
      <p>The vast majority of your tickets will be auto-triaged by <code>svc-glados-overwatch-bot</code>. The bot:</p>
      <ul>
        <li>Reads the alert and adds a 🤖 <b>Auto Triaged</b> banner with specific DCT instructions</li>
        <li>For routine link issues, tells you exactly what to do (clean fiber, reseat, etc.)</li>
        <li>Tracks attempt counts (e.g., "Cleaning Attempt 1 of 2") — after the cap it auto-escalates to <b>Waiting For Support</b></li>
        <li>Auto-transitions to <b>Customer Verification</b> once you mark the work done</li>
        <li>Auto-closes after 14 days in Customer Verification if the customer doesn\'t respond</li>
        <li>Surfaces a <b>Historical Ticket Summary</b> on tickets where the same hardware has had prior issues — read it, the prior fix may apply</li>
      </ul>

      <h3>Standard status transitions</h3>
      <table>
        <tr><th>Status</th><th>Meaning</th></tr>
        <tr><td><b>Awaiting Triage</b></td><td>You can\'t do the requested action and need human review</td></tr>
        <tr><td><b>In Progress</b></td><td>You\'re actively working on it</td></tr>
        <tr><td><b>Cleaning Done</b></td><td>You finished the requested clean/reseat — automation moves it to Customer Verification</td></tr>
        <tr><td><b>Waiting For Support</b></td><td>Bot escalated because the standard fix didn\'t resolve</td></tr>
        <tr><td><b>Customer Verification</b></td><td>Customer confirms the fix</td></tr>
        <tr><td><b>Closed</b></td><td>Done</td></tr>
      </table>

  {
    id: 'l1-security',
    title: 'Security Access Controls',
    level: 1,
    objectives: [
      'Understand badge access, ZTN, and biometric controls',
      'Apply tailgating and visitor escort rules',
      'Recognize and report security violations'
    ],
    body: `
      <p>The data hall is restricted. The equipment runs customer workloads worth millions per hour. Physical security is non-negotiable.</p>
      <h3>Access layers</h3>
      <ul>
        <li><b>Site perimeter</b> — landlord-controlled. Badge in.</li>
        <li><b>Data hall door</b> — CoreWeave + landlord controls. Badge + sometimes biometric.</li>
        <li><b>ZTN (Zero Trust Network) zones</b> — for the most sensitive customer racks (Albatross, etc.). Retina scanners, locked racks, no CW staff access without specific approval.</li>
      </ul>
      <h3>Tailgating</h3>
      <div class="panel danger">
        <div class="panel-title">Never let anyone tailgate you in</div>
        <p>Even if you recognize them. Even if they say "I forgot my badge." They badge in themselves, or they don't come in. This is the #1 security violation reported industry-wide.</p>
      </div>
      <h3>Visitors</h3>
      <p>All visitors (vendors, auditors, customer reps) must be:</p>
      <ol>
        <li>Pre-registered with site security and the landlord</li>
        <li>Signed in at the front desk</li>
        <li>Escorted at all times within secure areas</li>
        <li>Signed out when they leave</li>
      </ol>
      <h3>Vendor escort ticket workflow</h3>
      <p>Every vendor escort gets its own Jira ticket so the escort window is documented and auditable. Standard fields per the SOP:</p>
      <ul>
        <li><b>Project / Space:</b> <code>dct-ops (DO)</code></li>
        <li><b>Work Type:</b> General Request (purple <code>?</code> icon)</li>
        <li><b>Request Type:</b> No Request type</li>
        <li><b>Summary:</b> Vendor name + "Escort" (e.g., <code>"John D (Company Name) Escort"</code>)</li>
        <li><b>CoreWeave Region:</b> the region code for the site (e.g., <code>US-EAST-14A</code>)</li>
        <li><b>CoreWeave Server Assets / Rack:</b> blank unless directly relevant</li>
        <li><b>Description:</b> action being taken (e.g., <code>"Escorting John D into DH4"</code>)</li>
        <li><b>Urgency:</b> Medium</li>
        <li><b>Reporter:</b> the person making the request</li>
        <li><b>Assignee:</b> the DCT performing the escort</li>
        <li><b>LoCode:</b> CoreWeave datacenter identifier (e.g., <code>US-PPY01</code>)</li>
      </ul>
      <p>Movement through the ticket:</p>
      <ol>
        <li>Create the ticket. Move to <b>In Progress</b> when the escort starts.</li>
        <li>Once in the data hall, add an <b>internal note</b> capturing the node being worked on — name, serial number, and rack location:<br><code>John Doe<br>S/N: SXXXXXXXXXXX<br>US-XX01.DH4.R142.RU34</code></li>
        <li>When the vendor leaves (lunch break, end of day), escort them out of the secure area, then <b>close the ticket AFTER they are no longer being escorted</b>. Do not pre-close.</li>
      </ol>
      <h3>What to report immediately</h3>
      <ul>
        <li>Doors that don't latch / close</li>
        <li>Damaged or tampered locks, badge readers, or cameras</li>
        <li>Unknown people in the data hall</li>
        <li>Lost badge — report within minutes, not hours</li>
      </ul>

      <h3>Daily security processes</h3>
      <ul>
        <li><b>Badge in / badge out every transition.</b> Every door has its own badge event — "I\'m already inside, I\'ll skip this one" defeats the audit log.</li>
        <li><b>Sign-in sheets at the front desk</b> — fill them out, even when the landlord knows you. The sheet is a legal record.</li>
        <li><b>Visitor log + escort log</b> — every visitor entry / exit gets timestamped. Don\'t batch entries at end of day.</li>
        <li><b>Camera coverage check</b> — during walkthrough, glance at each camera bubble. A taped-over or rotated camera is a flag.</li>
        <li><b>Door-prop check</b> — anything wedged into a secured door (foot, kit case, broom, prop) is a violation. If you see it, fix it and report it.</li>
        <li><b>Key / spare-badge handling</b> — physical keys for rack locks, ZTN cages, and crash-cart cabinets stay in the secured key cabinet, signed in / out. Never on a personal keychain overnight.</li>
      </ul>

      <h3>What NOT to do — the high-cost mistakes</h3>
      <div class="panel danger">
        <div class="panel-title">Will get you walked out the door</div>
        <ul>
          <li><b>Don\'t share badge or credentials</b> with anyone — including coworkers, including "just for a second." Each badge is tied to a specific person for compliance.</li>
          <li><b>Don\'t tailgate or let anyone tailgate you.</b> Even people you know. (See above.)</li>
          <li><b>Don\'t prop doors open</b>, ever. Move equipment in stages instead.</li>
          <li><b>Don\'t take photos in the data hall</b> without explicit work-related reason and authorization. Customer hardware imagery is contractually sensitive. Never post DC photos to social media.</li>
          <li><b>Don\'t bring personal storage devices</b> (USB drives, external SSDs, personal laptops) into the data hall. Customer data on a personal device is a data-security incident.</li>
          <li><b>Don\'t share site addresses</b> with non-employees. Big Bird sites are confidential — exact location matters.</li>
          <li><b>Don\'t discuss customer names</b> on personal channels, in public spaces, or with friends/family. The big-bird code names exist for a reason — use them externally.</li>
          <li><b>Don\'t bring weapons, recording devices, or hazardous materials</b> into the data hall.</li>
        </ul>
      </div>
      <div class="panel warn">
        <div class="panel-title">Standard hall-floor "don\'ts"</div>
        <ul>
          <li><b>Don\'t bring food or drinks</b> into the data hall. Spills + electronics + airflow = bad day.</li>
          <li><b>Don\'t wear loose clothing, dangling jewelry, or open-toed shoes</b> near energized equipment.</li>
          <li><b>Don\'t move equipment without authorization</b> — even between racks. Inventory and customer agreements depend on accurate location.</li>
          <li><b>Don\'t perform unauthorized work on customer hardware</b> — no work without a ticket, especially in ZTN zones.</li>
          <li><b>Don\'t use wireless devices in restricted areas</b> where it\'s prohibited (some customer cages have RF restrictions).</li>
          <li><b>Don\'t leave tools or carts unattended</b> in customer cages or shared spaces overnight.</li>
          <li><b>Don\'t cross customer cage boundaries</b> without explicit authorization, even if a door is unlocked.</li>
          <li><b>Don\'t throw away DBDs (drives, NVMe, VAST)</b> in regular trash — they go in the data-hall destruction bin.</li>
        </ul>
      </div>

      <h3>If you\'re unsure</h3>
      <p>Security policy is one place where "ask first" beats "assume." Slack your DCM or DC Security Manager (DCSM) before doing anything that touches access, visitor handling, or cage boundaries. Compliance violations follow you and the company even if the underlying intent was fine.</p>
    `,
    refs: [

      { title: 'ZTN DIA Circuits at GB-CWY01 (LON50)', url: 'https://coreweave.atlassian.net/wiki/spaces/DCTEMP/pages/988086273/ZTN+DIA+Circuits+at+GB-CWY01+LON50' }

  {
    id: 'l1-walkthrough',
    title: 'The Daily Walkthrough',
    level: 1,
    objectives: [
      'Conduct a thorough data hall walkthrough',
      'Spot anomalies by sound, smell, and sight',
      'Document and ticket findings correctly'
    ],
    body: `
      <p>The walkthrough is the single highest-leverage thing a DCT does. Sensors and dashboards miss things — eyes, ears, and nose don't. Repeat often. Learn the normal sounds and smells so you instantly notice when they change.</p>
      <h3>Walkthrough checklist</h3>
      <ol>
        <li><b>Security</b> — all doors latch, no signs of tampering, no unauthorized people</li>
        <li><b>Environmental</b> — temperature feels normal, no hot spots, no humidity weirdness</li>
        <li><b>Smells</b> — burnt plastic, ozone, glycol, moisture. Any unusual smell = stop and find the source</li>
        <li><b>Sounds</b> — uniform fan noise. Any clicking, grinding, whining, or sudden silence is a flag</li>
        <li><b>Lights</b> — every PSU green, every fan green, every link light correct color</li>
        <li><b>Cabling</b> — no draped cables, no kinks, no unsecured runs</li>
        <li><b>Floor</b> — no liquid pooling, no missing floor tiles, no debris</li>
        <li><b>PDUs / breakers</b> — all green, none tripped</li>
      </ol>
      <h3>Special walkthrough notes (CoreWeave-specific)</h3>
      <div class="panel info">
        <div class="panel-title">SN3700 fan lamps</div>
        <p>The 3700 series end-of-row switches have a known firmware issue that can show fan lamps OFF even though fans are running. <b>Ignore</b> those lamps until further notice. As long as the fan is running, it's fine.</p>
      </div>
      <h3>Documenting findings</h3>
      <p>Every anomaly you find becomes either: a self-resolved fix (close the loop in the ticket), a new SDA/proactive ticket, or an escalation. <b>Photograph everything.</b> Your ticket should let the next person walk straight to the rack with no extra context.</p>

      <h3>The Amberlamps process (per CW walkthrough SOP)</h3>
      <p>Beyond the ticket queue, sites maintain a shared <b>Amberlamps spreadsheet</b> for tracking issues that aren\'t resolved on the spot. The flow:</p>
      <ol>
        <li><b>Bring your laptop</b> on the walkthrough so you can log in real time.</li>
        <li>If you find something <b>easily fixable</b>: fix it on the spot, log it in the Slack workflow.</li>
        <li>For <b>critical issues</b> (smells, smoke, heat, abnormal noise): escalate to DCM and Facilities <b>immediately</b> — don\'t wait until end of walkthrough.</li>
        <li>For other issues: <b>check the Amberlamps sheet first</b>. If the issue is already there, move on — it\'s already tracked.</li>
        <li>If genuinely new, log it on the appropriate Amberlamps tab AND report it in the Slack workflow.</li>
        <li>The DCM trims items off Amberlamps as they\'re resolved. Resolved items that <b>recur</b> are treated as new findings.</li>
      </ol>

      <h3>Specific things to look for</h3>
      <ul>
        <li>Smoke, fire, smells, exceptional sounds, "something feels bad"</li>
        <li>Alert / warning lamps lit on Dell, Supermicro, switches, PDUs</li>
        <li>Indicator lamps that are <b>off when they should not be</b></li>
        <li>Floor tiles out of place or raised</li>
        <li>Overhead lights out or dim</li>
        <li>Cold doors / handles (can indicate airflow leaks)</li>
        <li>Velcro, trash, or debris on the floor</li>
        <li>Foreign / unknown items in the data hall</li>
        <li>Overhead items in the cold aisles that shouldn\'t be there</li>
        <li>Issues on the ladder trays (cabling stress, sagging, debris)</li>
        <li>Water or stains on the floor</li>
        <li>Issues between or behind PDUs / CRACs</li>
        <li>Items missing from crash carts</li>
        <li>Displayed errors on CRACs and PDUs (red/green LED alerts)</li>
        <li>Anything that just "ain\'t right" or "could be better"</li>
      </ul>

      <h3>Walkthrough non-issues — don\'t flag these</h3>
      <ul>
        <li><b>Powered-off systems</b> with <b>blue tape</b> applied at the time of power-off — this is the standard CW marker that the system is intentionally down. Skip it.</li>
        <li><b>Uncabled systems</b> with <b>blue tape</b> — same: intentional, already tracked.</li>
      </ul>
      <div class="panel info">
        <div class="panel-title">Blue tape = "this is intentional"</div>
        <p>If you see blue tape on a unit, someone already documented its state. Don\'t re-flag it. If you see a powered-off / uncabled system <b>without</b> blue tape, that\'s a real finding — flag it.</p>
      </div>

      <h3>The Turnover Log</h3>
      <p>End of shift: log everything non-trivial from the day in the site\'s Turnover Log. The afternoon team gathers anything turned over from the morning team between noon and 4. This document feeds the weekly/monthly DCM report — it\'s also where your major accomplishments get visibility, so document well.</p>
    `,

    body: `
      <h3>NVIDIA architecture cheat sheet</h3>
      <p>Think of these like CPU generations — each newer one is more powerful:</p>
      <table>
        <tr><th>Architecture</th><th>Era</th><th>You\'ll see it in...</th></tr>
        <tr><td>Hopper</td><td>2025 leading-edge</td><td>H100, H200</td></tr>
        <tr><td>Blackwell</td><td>2026 leading-edge</td><td>GB200, GB300, B40</td></tr>
        <tr><td>Rubin</td><td>2027 (expected)</td><td>Future racks</td></tr>
        <tr><td>Feynman</td><td>2028 (expected)</td><td>Future racks</td></tr>
      </table>
      <h3>Server platforms you'll touch</h3>
      <h4>H100 / H200</h4>
      <p>Hopper-based servers in standard rackmount frames. <b>8 GPUs per node.</b> Networking: Infiniband for the GPU/HCA links, LC SM fiber for the DPU, copper for baseband. <b>H200</b> = second generation, ours are made by Dell.</p>
      <h4>GB200 / GB300</h4>
      <p>Blackwell-based, very dense, <b>liquid-cooled</b> rack with NVL72 copper backplane interconnecting all nodes. One rack runs an entire modern AI model. <b>18 nodes per rack in 2 groups</b>, with NVLink switches between them. Nodes numbered <b>top-down</b> (the exception to RU-bottom-up rule).</p>
      <h4>B40</h4>
      <p>Blackwell in a standard rackmount frame (8 cards). Think of them as "GB200 in a normal box" or "H200 with much more oomph." Made by Supermicro.</p>
      <h4>CPU nodes</h4>
      <p>Traditional servers without GPUs — used for non-AI workloads. Compute, storage, control plane.</p>
      <h3>Storage</h3>
      <ul>
        <li><b>VAST</b> — high-performance AI storage. <b>Drives must NOT be returned to VAST</b> when failed; they go in the DBD destruction bin.</li>
        <li><b>Pure</b> — general-purpose enterprise storage.</li>
      </ul>
      <h3>Vendor matters</h3>
      <p>Dell vs. Supermicro hardware looks similar but the rails, chassis layouts, and self-maintenance procedures differ. Knowing which vendor you're working on tells you which SOP to follow and which vendor training you need (Dell, Supermicro, NVIDIA).</p>

  {
    id: 'l2-cooling',
    title: 'Cooling: Air vs Liquid',
    level: 2,
    objectives: [
      'Understand why GPU density forces a shift from air to liquid cooling',
      'Identify the major air-cooling systems (CRAC, CRAH, chiller) and their roles',
      'Identify the major liquid-cooling systems (CDU, primary water loop, glycol secondary, XDM) and your DCT-level role with each'
    ],
    body: `
      <p>Cooling is the second-most expensive thing in the data hall after power, and it\'s the constraint that forces the architecture decisions you see on the floor. Hopper-class servers (H100/H200) live in air-cooled racks. Blackwell GB200/GB300 racks are too thermally dense for air alone and require liquid. As a DCT you\'ll work with both.</p>

      <h3>Why GPU density forces liquid cooling</h3>
      <p>Air can carry only so much heat per cubic meter. A typical air-cooled rack at CW handles ~20 kW of heat load. A GB200 rack draws <b>120-130 kW</b> — six times what air can practically remove without bizarre airflow engineering. Liquid carries roughly 1000× more heat per unit volume than air, so direct-to-chip liquid cooling becomes the only viable answer at GPU density.</p>

      <h3>Air cooling — the systems you\'ll see</h3>
      <h4>CRAC (Computer Room Air Conditioner)</h4>
      <p>A self-contained refrigeration unit, like a giant split A/C. Its own compressor, condenser, evaporator. Pulls hot return air from the hot aisle, cools it, returns cold air to the cold aisle (or under-floor plenum). Older / smaller halls use CRACs.</p>
      <h4>CRAH (Computer Room Air Handler)</h4>
      <p>No internal refrigeration. Just a fan + cold-water coil. The cold water comes from a central <b>chiller plant</b>, usually elsewhere on the campus. CRAHs are more efficient at scale because the chiller plant is centralized and can be tuned globally.</p>
      <h4>Chiller</h4>
      <p>The central refrigeration plant that produces chilled water. Runs glycol or water through huge compressors and heat exchangers. Outputs cold water to the CRAH supply. Owned and operated by Facilities — not a DCT touchpoint, but if the chiller goes down, your CRAHs warm up fast.</p>
      <h4>Hot / cold aisle containment</h4>
      <p>Physical barriers (clear plastic curtains, doors, end-of-aisle panels) that prevent hot exhaust air from mixing with cold supply. A breach in containment (door propped open, missing panel, broken curtain) causes hot air to recirculate and drives temperatures up across the row. Fix containment problems on walkthrough.</p>

      <h3>Liquid cooling — the systems you\'ll see (GB200 / GB300)</h3>
      <h4>Three thermal stages</h4>
      <ol>
        <li><b>Glycol secondary loop</b> (in-rack) — colored ethylene glycol mix flowing through cold plates on each compute tray, absorbing heat directly from the chip surfaces.</li>
        <li><b>CDU (Coolant Distribution Unit)</b> — the heat exchanger at the bottom of the rack. Transfers heat from the glycol secondary loop into the primary water loop. Vertiv-built, with its own UI, alarms, and Grafana dashboards.</li>
        <li><b>Primary water loop</b> — chilled water in pipes under the data hall floor, pumped between CDUs and the XDM chillers.</li>
        <li><b>XDM chiller</b> — the central facility chiller that cools the primary water loop and pushes heat up to the rooftop air-cooled or evaporative condensers.</li>
      </ol>
      <h4>Direct-to-chip vs immersion</h4>
      <p>CW uses <b>direct-to-chip (D2C) liquid cooling</b> — cold plates bolted onto each GPU and CPU, glycol flowing through them. The servers themselves are sealed; you don\'t see the liquid in normal operation. <b>Immersion cooling</b> (where servers are submerged in a dielectric fluid) is a different architecture used by some other operators but is not used at CW today.</p>

      <h3>What\'s the DCT role with cooling?</h3>
      <table>
        <tr><th>System</th><th>DCT-approved</th><th>Coordination required</th></tr>
        <tr><td>CRAC / CRAH</td><td>Read displays, report faults</td><td>Facilities owns service</td></tr>
        <tr><td>Chiller plant</td><td>Nothing — observation only</td><td>Facilities owns end-to-end</td></tr>
        <tr><td>Hot/cold containment</td><td>Fix breaches (close doors, replace panels)</td><td>Walkthrough finding</td></tr>
        <tr><td>CDU front panel</td><td>Read status, report alarms</td><td>Liquid Metal owns operation</td></tr>
        <tr><td>CDU powercycle / drain / fill</td><td>Yes — only at direction of FRO or Liquid Metal team</td><td>Direction required</td></tr>
        <tr><td>GB200 fluid bag (PCG fill)</td><td>Yes — DCT-owned</td><td>Standard SOP</td></tr>
        <tr><td>Tray cold plate work</td><td>No — vendor only (Dell)</td><td>Tray internals = Dell</td></tr>
      </table>

      <h3>Glycol — the practical reminders</h3>
      <ul>
        <li><b>Color tells you it\'s a leak.</b> Glycol is dyed (usually blue or pink) so a single drop on a white tile is unmistakable.</li>
        <li><b>Slimy, mildly sweet.</b> Don\'t taste it (yes, this is a real warning — ethylene glycol is toxic if ingested).</li>
        <li><b>Non-conductive by design.</b> A small leak isn\'t an immediate electrical hazard, but it IS a coolant-loop integrity issue.</li>
        <li><b>Chemical waste, not regular trash.</b> Spilled or drained glycol goes into the site\'s chemical-waste container, never down a regular drain.</li>
        <li><b>Nitrile gloves, safety glasses</b> any time you handle glycol.</li>
        <li><b>Replacement trays come dry.</b> When you swap a GB200 compute tray, the new one needs the loop refilled from the hanging fluid bag.</li>
      </ul>

      <h3>Reading a CDU panel</h3>
      <p>Most CW deployments use the Vertiv <b>CoolChip CDU100kW</b> family. The front-panel touchscreen shows:</p>
      <ul>
        <li><b>Secondary supply / return temperatures</b> — the glycol going to and coming from the trays</li>
        <li><b>Primary supply / return temperatures</b> — the facility water entering and leaving the CDU</li>
        <li><b>Flow rates</b> on each loop</li>
        <li><b>Pump status</b> — running, alarm, or off</li>
        <li><b>Reservoir level</b> — should sit in the green band</li>
        <li><b>Active alarms</b></li>
      </ul>
      <p>A normal panel is mostly green. Yellow or red is the signal — read the active alarms list, photograph it, and ping <code>@liquid-metal</code>. <b>Don\'t enter the engineering / service menu</b> unless you\'ve been trained on that specific model and explicitly directed to.</p>

      <h3>Recognizing cooling problems on walkthrough</h3>
      <ul>
        <li><b>Air systems:</b> noticeably warmer aisle, condensation on a CRAH unit, strange airflow direction (cold air coming from where it shouldn\'t), CRAC red LED.</li>
        <li><b>Liquid systems:</b> any colored fluid on the floor, CDU front panel showing amber/red, audible CDU pump issues (whining, irregular cycle), GB200 rack temperature alerts in Grafana.</li>
        <li><b>Containment:</b> propped doors, missing panels, curtain damage — fix or escalate.</li>
      </ul>

      <h3>Connector types</h3>
      <h4>LC (Lucent / Local Connector)</h4>
      <p>Small single-fiber connector, almost always used as a duplex pair. Common for SM fiber on H200 DPU links and within Tier-style racks.</p>
      <h4>MPO (Multi-fiber Push-On)</h4>

      <p>An <b>optic</b> (or <b>transceiver</b>) is the small pluggable module that converts electrical signals from the switch / NIC / DPU into light pulses on a fiber — and back again at the other end. Without optics, fiber doesn\'t do anything. They\'re also one of the most expensive consumable items in the data hall (an 800G OSFP can run several thousand dollars), so handle them like the precision instruments they are.</p>

      <h3>What\'s actually inside</h3>
      <p>Each optic contains:</p>
      <ul>
        <li><b>Lasers</b> (or VCSELs for short-reach) — the light sources, one per lane</li>
        <li><b>Photodiodes</b> — the receivers that convert returning light back to electrical</li>
        <li><b>DSP / gearbox</b> on the higher-speed parts — does PAM4 modulation, FEC, lane splitting</li>
        <li><b>Heatsink</b> — integrated for high-power modern modules; OSFP heatsinks are exposed on top</li>
        <li><b>EEPROM</b> — stores vendor info, part number, and DOM (Digital Optical Monitoring) data</li>
      </ul>

      <p><b>OSFP</b> is the workhorse for modern fabrics. It has 8 electrical lanes between the host and the module, supports 400G (8×50G PAM4) or 800G (8×100G PAM4), and runs hot — typical power envelope <b>15-18 W per module</b> with an integrated heatsink. Two physical variants:</p>

      <h3>OSFP C1 / C2 logical connectors</h3>
      <p>Most modern OSFP optics expose <b>two MPO connectors per module</b> — labeled <b>C1</b> and <b>C2</b>. Each connector carries 4 lanes:</p>

      </ul>
      <p>For the link to come up, <b>both C1 and C2 must be installed correctly</b>. If either is loose, dirty, mis-keyed, or unplugged, the entire optic shows down. The single LED on the OSFP only indicates "all lanes up" — there\'s no per-connector LED, so always verify both halves physically.</p>

      <h3>Handling rules</h3>
      <ul>
        <li><b>ESD strap or grounded contact</b> before pulling an optic from a chassis</li>
        <li><b>Eye safety:</b> never look directly into an active port or optic — IR is invisible and damaging</li>

        <li><b>MPO puller tool</b> for tight spaces — never use your fingers on the ferrule</li>
        <li><b>Match the airflow direction</b> — finned heatsinks face the airflow on switch ports; orientation is fixed by the cage</li>
        <li><b>Cool the rack first</b> if you\'re inserting a brand-new spare optic and the empty cage has been hot for hours</li>
      </ul>

      <h3>Reading optic health — DOM & per-lane power</h3>
      <p>Every optic has <b>DOM (Digital Optical Monitoring)</b> data accessible via <code>mlxlink</code> (NVIDIA / IB) or <code>ethtool -m</code> (Linux Ethernet). What to look for:</p>
      <ul>
        <li><b>TX power (dBm)</b> — what your end is sending. In spec range = optic transmitter healthy.</li>
        <li><b>RX power (dBm)</b> — what your end is receiving. Below spec = dirty connector, bad fiber, or far-end TX dying.</li>
        <li><b>Per-lane symmetry</b> — all 4 (or 8) lanes should show similar RX power. One outlier = single-lane fault.</li>
        <li><b>Temperature</b> — exceeding ~70°C is bad. Trips alarms. Often means airflow is wrong or rack is too hot.</li>
        <li><b>FEC counters</b> — pre/post-FEC error rates. Rising = link is degrading. Network engineering watches these.</li>
      </ul>
      <p>Most of this surfaces in Grafana for managed switches. For ad-hoc checks, network engineering will paste <code>mlxlink</code> output in the ticket — see L3 Link Troubleshooting for the format.</p>

      <h3>Common optic failure modes</h3>
      <ul>
        <li><b>Dirty connector</b> — by far the most common. Cleaning resolves the majority of "bad optic" tickets. Always clean first.</li>
        <li><b>Loose seat</b> — module not fully clicked in, or MPO not fully home</li>
        <li><b>Wrong type installed</b> — DR optic on a multimode fiber will show poor / no link; SR optic on long fiber run will fail</li>
        <li><b>APC vs UPC mismatch</b> on the MPO connector — ferrules damage each other</li>
        <li><b>Single dead lane</b> — one of 4 or 8 lanes shows no RX power; replace optic</li>
        <li><b>Thermal failure</b> — chronic high temp eventually kills the laser; also see Spectrum-X NetQ alarms for thermal events</li>
        <li><b>EEPROM / DSP fault</b> — module powers on but the host can\'t identify it; replace</li>
        <li><b>Bent pins</b> on the cage — physical damage if module was forced or inserted upside down (rare with OSFP\'s keyed design)</li>
      </ul>

      <p>If no spare is on-hand, the requester contacts Procurement for inventory or initiates RMA — that\'s not a DCT-initiated step.</p>

  {
    id: 'l2-cable-runs',
    title: 'Running & Replacing Cables',
    level: 2,
    objectives: [
      'Pre-stage and physically run a new fiber or copper cable correctly',
      'Replace an existing cable without disturbing neighbors',
      'Follow CoreWeave\'s cabling order standards and document the work'
    ],
    body: `
      <p>Pulling a new cable is one of the most physically obvious things a DCT does — and one of the most common ways to accidentally break neighboring links. The work is half mechanical, half disciplined documentation. Done right, the cable plant stays clean and predictable for years. Done wrong, you create the burndown rows you\'ll be fixing next quarter.</p>

      <h3>Before you touch anything: pre-checks</h3>
      <ol>
        <li><b>Read the cutsheet.</b> The cutsheet tells you A-side LOC:CAB:RU + port → Z-side LOC:CAB:RU + port. If you don\'t have a cutsheet, you don\'t have a cable to run.</li>
        <li><b>Match the cable type</b> to the link spec — SM (yellow) vs MM (teal/aqua), LC vs MPO, APC (green) vs UPC (blue), correct length with slack but not excess (typically 10-20% extra).</li>
        <li><b>Verify both end ports are the right type</b> — optic in place, correct speed, key orientation correct for MPO.</li>
        <li><b>Confirm path is clean</b> — your route through the ladder/underfloor isn\'t blocked, doesn\'t cross a hot exhaust grate, and doesn\'t require crossing a different customer\'s cage.</li>
        <li><b>Photograph the starting state</b> at both ends before you begin.</li>
      </ol>

      <h3>The cutsheet — your source of truth</h3>
      <p>CoreWeave cutsheets follow a standard format. Real example from the Cabling Standards:</p>
      <pre style="background:var(--bg-elev-2);padding:12px;border-radius:6px;overflow-x:auto;font-family:ui-monospace,monospace;font-size:.8rem;">A-LOC:CAB:RU  A-SIDE-DNS-NAME                 A-PORT  ---&gt;   Z-LOC:CAB:RU  Z-SIDE-DNS-NAME                Z-PORT
------------  ---------------                 ------  -----  ------------  ---------------                ------
dc7:001:10    t1b-gg1-a1-01-r001-us-east-03a  swp1    ---&gt;   dc7:001:44    t0-gg1-a1-01-r001-us-east-03a  swp30</pre>
      <p>Each row is one link. <b>LOC:CAB:RU</b> tells you site:rack:RU. The DNS name tells you the device. The port tells you the exact interface. <b>If you can\'t identify all six fields at both ends with certainty, stop and ask.</b></p>

      <h3>CoreWeave cabling order standards</h3>
      <p>These exist so the next person walking the rack can predict where any cable goes:</p>
      <ul>
        <li><b>EoR (End of Row) racks:</b> cables to devices in EoR racks start with the lowest rack and go in <b>descending</b> per-U order. (e.g. racks 241, 242, 243...)</li>
        <li><b>ToR (Top of Rack):</b> for a given device, start cabling at the <b>highest U</b> and go down.</li>
        <li><b>Port sides:</b> left-side ports = downlinks, right-side ports = uplinks.</li>
        <li><b>Within a rack:</b> devices are numbered top to bottom, right to left, descending.</li>
        <li><b>Nodes:</b> cabled from <b>highest rack U to lowest</b> (U40, U38, U36...). Rack-to-rack: <b>lowest rack number first, ascending</b> (rack 101, 102, 103...).</li>
        <li><b>GB200 BMC switch exception:</b> cable the nodes first, then follow highest-U standard for in-rack devices. This keeps node-data consistent.</li>
      </ul>
      <h4>Standard node port nomenclature</h4>
      <ul>
        <li>T0 connections → node ports <code>p0</code> / <code>p1</code> (100G)</li>
        <li>IPMI/BMC switches → the <code>ipmi</code> / <code>BMC</code> port on the node</li>
        <li>DPU switches → the <code>DPU</code> port (newer Grid-v2: <code>dpup0</code> / <code>dpup1</code>)</li>
        <li>Bare-metal: <code>eth0</code> / <code>eth1</code></li>
      </ul>

      <h3>Running a new cable — step by step</h3>
      <ol>
        <li><b>Stage at the A-side.</b> Cap both ends until the moment you connect. Bring scope + cleaner.</li>
        <li><b>Plan the route</b> — overhead ladder vs underfloor, which tray, where it joins existing bundles. Don\'t freelance new paths.</li>
        <li><b>Pull, don\'t push.</b> Always feed cable from one end and pull from the other; pushing creates kinks.</li>
        <li><b>Mind the bend radius.</b> Standard rule: <b>10× the cable diameter</b> for fiber, never tighter. Sharp bends cause permanent attenuation that no cleaning will fix.</li>
        <li><b>Leave service slack</b> at both ends — usually a small loop in the cable management arm — but don\'t leave huge piles in the tray.</li>
        <li><b>Secure with velcro, never zip ties on fiber.</b> Velcro is reusable and won\'t crush the cladding. Zip ties are OK on copper bundles when used loosely; over-tightened ties on fiber create micro-bends.</li>
        <li><b>Label both ends</b> before you connect — A-side label shows the Z-side destination, Z-side label shows the A-side. Use the Panduit TDP43ME printer with the standard template.</li>
        <li><b>Scope and clean both ends</b> right before connection. Even brand-new cables come dirty from the factory.</li>
        <li><b>Connect A-side, then Z-side.</b> Watch for link LEDs.</li>
        <li><b>Verify</b> with the network team or via switch CLI — link up, no errors, correct speed.</li>
        <li><b>Update inventory</b> (Snipe / NetBox), close the ticket with photos of both ends, the cable run, and the link-up confirmation.</li>
      </ol>
      <div class="panel info">
        <div class="panel-title">Velcro vs zip ties</div>
        <p>Default to velcro for any bundle containing fiber. Zip ties are acceptable on pure-copper bundles, but only finger-tight — if it deforms the cable jacket, it\'s too tight. Never use zip ties to secure fiber to a ladder rail.</p>
      </div>

      <h3>Replacing an existing cable</h3>
      <p>The risk in a replacement isn\'t the new cable — it\'s damaging the cables you\'re <b>not</b> touching. Every adjacent link in the same bundle is one careless tug away from disconnection.</p>
      <ol>
        <li><b>Identify and verify both ends</b> of the cable being replaced. Trace it physically end-to-end if there\'s any doubt — do not assume the label is correct.</li>
        <li><b>Photograph the bundle</b> before disturbing it. You\'ll re-dress to match.</li>
        <li><b>Pre-stage the replacement</b> next to the old cable, capped, scoped, cleaned.</li>
        <li><b>Open the cable management</b> (velcro wraps, manager doors) gently along only the section you need.</li>
        <li><b>Disconnect the old cable</b> at one end, cap it immediately. Then disconnect the other end.</li>
        <li><b>Pull the old cable out</b> slowly, watching for snags. If it catches, stop and find the cause — do not yank.</li>
        <li><b>Run the new cable along the same path</b> (this is the moment to fix any prior pathing mistakes if appropriate, but don\'t reinvent unrelated routes).</li>
        <li><b>Re-dress the bundle</b> to match your starting photo. Velcro back tight enough to hold, loose enough to add to.</li>
        <li><b>Connect, verify, document</b> — same as a new run.</li>
      </ol>
      <div class="panel danger">
        <div class="panel-title">Top failure mode in cable replacements</div>
        <p>Tugging a cable hard enough to dislodge optics or unseat connectors on neighboring ports. If the cable doesn\'t come out smoothly, STOP, find the snag, free it. The minute you save by yanking is worth less than the hour spent diagnosing why three other links flapped.</p>
      </div>

      <h3>Detecting a swapped cable after the fact</h3>
      <p>If a cable is plugged into the wrong port at one end (the classic install error), the link either won\'t come up or will negotiate to the wrong device. CW has a documented procedure for DCTs to verify Ethernet fiber cables aren\'t swapped — typically by comparing what each end <i>thinks</i> it\'s connected to (LLDP / BMC reports) against the cutsheet expected mapping.</p>

      <h3>Printing labels with Easy-Mark Plus + Panduit TDP43ME</h3>
      <p>Standard CW labels:</p>
      <ul>
        <li><b>S100X125VATY</b> — small self-laminating labels, used with label cores on fiber and on power cables</li>
        <li><b>R150X150V1T</b> — breakaway labels for copper Ethernet and any cable too thick for label cores</li>
        <li><b>NWSLC-3Y</b> — label core itself (goes on the end of MPO and LC-LC fiber)</li>
        <li><b>RMEH4BL</b> — thermal ink ribbon for the printer</li>
      </ul>
      <p>Workflow for a batch of labels (typical for a build or burndown):</p>
      <ol>
        <li>Open <b>Easy-Mark Plus</b> on the label PC. Search the label format you need (e.g., <code>S100X125VATY</code> for fiber).</li>
        <li>Confirm the format. Turn <b>off</b> the "Wiremaker" option in the Home tab — it interferes with the import path.</li>
        <li>Build your label data in a spreadsheet (the Primary DCT Cutsheet template is the standard starting point). Save as <code>.xlsx</code>.</li>
        <li>In Easy-Mark Plus, Home → <b>Data Import</b>. Pick the <code>.xlsx</code>, choose the right sheet (e.g., <i>Print Sheet - Fiber</i> or <i>Print Sheet - Copper</i>), set the row range to the data you actually need.</li>
        <li>After import, right-click → <b>Select All</b>. Set font size (~7) and alignment (left for label-core fiber labels, center+bottom for copper).</li>
        <li>Print → <b>Print Document</b>. Watch the printer for jams, label exhaustion, or ribbon issues.</li>
      </ol>
      <p>Always print a 1-2 label test before committing the full batch — saves a roll if your import was off by a row.</p>
    `,

  {
    id: 'l2-copper-testing',
    title: 'Copper Cable Testing',
    level: 2,
    objectives: [
      'Diagnose copper link issues by reading port status LEDs',
      'Use a Fluke CableIQ tester to certify copper cables',
      'Decide when the cable, the port, or the NIC is the fault'
    ],
    body: `
      <p>Copper cables are simpler than fiber — they either work or they don\'t — but the failure points are spread across the cable, the RJ-45 ports on both ends, and the NIC inside the host. Knowing how to localize the fault saves you from swapping the wrong thing three times.</p>

      <h3>Step 1 — Acknowledge and verify before touching anything</h3>
      <ul>
        <li>Confirm the space, rack, RU, and serial number of the device. Working on the wrong device is a hard rule violation — happens to the best of us if we skip this.</li>
        <li>Visual inspection before you touch:
          <ul>
            <li>Does the device have power? If not, do other devices around it have power?</li>
            <li>Are there link lights on the port in question? Are other ports on the same device showing link?</li>
            <li>Are any cables visibly bent, kinked, or pinched?</li>
          </ul>
        </li>
      </ul>

      <h3>Step 2 — Read the port status LEDs</h3>
      <p>Most copper ports have one or two LEDs. The pattern is consistent across vendors:</p>
      <table>
        <tr><th>LED state</th><th>What it means</th></tr>
        <tr><td>Solid green</td><td>Connection is good</td></tr>
        <tr><td>Solid amber</td><td>Connection physical-layer good, port admin-down or some other software/networking issue — needs networking</td></tr>
        <tr><td>Flashing amber/green (activity light)</td><td>Data is moving across the port</td></tr>
        <tr><td>Dark (no LEDs at all)</td><td>Port bad, cable bad, NIC bad, or the device itself is powered off</td></tr>
      </table>
      <p>If the device is powered and other ports light up but yours is dark, the port/cable/NIC localization comes next.</p>

      <h3>Step 3 — Test the cable with a Fluke CableIQ</h3>
      <p>Don\'t use the cheap continuity-only testers as your final answer — they tell you "wires connected" but not signal performance, distance, or termination quality. Use a <b>Fluke CableIQ</b> for any link you\'re going to certify.</p>
      <ol>
        <li><b>Master + remote</b> — the tester has two pieces; one goes on each end of the cable. It doesn\'t matter which side gets which.</li>
        <li>Disconnect the cable from both devices. Plug each end into the master and remote.</li>
        <li>Set the Fluke to <b>Auto Test</b>. Power both pieces on.</li>
        <li>Press the test button. Wait for it to finish.</li>
        <li>Read the result — pass (check mark) or fail. Drill into the breakdown:
          <ul>
            <li><b>Signal performance</b> — pass/fail per pair</li>
            <li><b>Cable length</b> — distance per pair (mismatched lengths between pairs = bad termination)</li>
            <li><b>Termination</b> — wires correctly mapped end-to-end</li>
          </ul>
        </li>
      </ol>
      <p>A common failure: two of the eight wires in the cable show no continuity to the remote — usually a cut or a bad crimp. The cable is dead, replace it.</p>

      <h3>Step 4 — If the cable passes but the link is still dark</h3>
      <ol>
        <li><b>Move the cable to a different port</b> on the same device. If link comes up, the original port is bad — escalate to network engineering for port remediation.</li>
        <li><b>Run a known-good "test cable"</b> in place of the suspect cable. If link comes up, you\'ve confirmed the suspect cable is the issue (even if Fluke didn\'t catch it).</li>
        <li><b>If both ports and both cables are confirmed good and link is still down</b>, the NIC inside the host or the device itself is the suspect — escalate.</li>
      </ol>
      <div class="panel info">
        <div class="panel-title">When to use a basic tester vs the Fluke</div>
        <p>Basic continuity testers are fine for a quick sanity check after terminating a fresh cable, before certifying with the Fluke. They\'re not enough on their own — they pass cables that the Fluke would flag for signal performance, length mismatch, or cross-pair errors.</p>
      </div>
    `,
    visual: 'port-leds',
    refs: [
