      'Capture and re-apply config / labeling',
      'Coordinate with NOC and customer comms'
    ],
    body: `
      <p>Switches don\'t fail often, but when they do, an entire pod is offline. Emergency switch replacement is a high-judgement L4 task — the SOP is fixed, but your speed and accuracy directly affect the customer outage timeline. The work is half cabling discipline, half coordination.</p>

      <h3>Coordinate before you cut anything</h3>
      <p>An emergency replacement is never a solo job. Before you touch a single cable, run the alignment loop:</p>
      <ul>
        <li><b>NOC / NetDev confirms diagnosis</b> — software fault, optic fault, or chassis fault. Don\'t replace a chassis when one optic is dead.</li>
        <li><b>Customer impact assessed</b> — is the pod fully down, partially degraded, or already failed-over? This dictates how aggressive the cutover is.</li>
        <li><b>Replacement is staged</b> — same model, same firmware target. Mismatched firmware is the silent killer of post-swap config pushes.</li>
        <li><b>Config is captured</b> — running config saved via NOC. If the switch is unreachable, NOC pulls the last config from the network management server.</li>
        <li><b>Site DCM aware</b> — switch swaps in customer-impacting windows are escalated automatically; your DCM owns customer comms while you own the hands-on work.</li>
        <li><b>ETA published in <code>#ops</code></b> — even if it\'s "starting now, expect 45 min." Silence triples perceived outage time.</li>
      </ul>

      <h3>Pre-conditions</h3>
      <ul>
        <li>Replacement switch is "like for like" — same model, same firmware target</li>
        <li>NOC has confirmed the diagnosis (not a config issue masquerading as hardware)</li>
        <li>Saved config available (or auto-loads via ZTP / TFTP boot)</li>
        <li>Cable management photos exist or you take them now</li>
        <li>Spare optics staged for any that won\'t survive the unmate cycle</li>
        <li>Console cable + laptop ready in case ZTP fails and you need a manual config push</li>
      </ul>

      <h3>Capture state before you start</h3>
      <p>The most common post-swap problem is "we forgot something obvious." Two minutes of capture prevents two hours of retrace:</p>
      <ul>
        <li><b>Front-face photo</b> at full LED state — shows which ports were live</li>
        <li><b>Rear-face photo</b> — power feeds, console, mgmt</li>
        <li><b>Per-port table</b>: port → cable destination → optic part number → fiber type. NOC usually has this in the cable plant; verify the live state matches.</li>
        <li><b>Cable label scan</b> — if any labels look loose or smudged, re-label before you unmate</li>
      </ul>

      <h3>The flow</h3>
      <ol>
        <li><b>Document current state</b> — photo every cable, label every connection, record optic types per port</li>
        <li><b>Power down the failed switch</b> (or confirm already dead). NOC may want a final tac-debug pull first.</li>
        <li><b>Uncable</b> systematically — bundle by destination row/rack, tag with painter\'s tape if labels are weak</li>
        <li><b>Unrack</b> — top-of-rack swaps are usually two-person; mind the rails and any retention bars</li>
        <li><b>Rack the replacement</b> at the same RU; tighten cage nuts, verify mgmt + power feeds match the original</li>
        <li><b>Optics first</b> — install optics in the same ports, matching types (don\'t mix MM/SM, don\'t mix APC/UPC). A scope-and-clean pass on every optic before insertion saves a follow-up trip.</li>
        <li><b>Recable</b> — match the photos. Verify nothing is on the wrong port.</li>
        <li><b>Power on</b> — let the switch boot, NOC validates ZTP / config push</li>
        <li><b>Link verification</b> — every port that should be up, is up. Walk the port-state table with NOC.</li>
        <li><b>Customer connectivity verification</b> — NOC confirms BFD/protocol adjacencies are reformed and traffic is flowing</li>
        <li><b>Document</b> in ticket: serials in/out, time, customer impact window, anything atypical</li>
      </ol>

      <h3>Verification — don\'t leave until this is true</h3>
      <ul>
        <li><b>All expected ports</b> show the right speed + transceiver type per the cable plant</li>
        <li><b>NOC confirms</b> protocol convergence (BGP / OSPF / BFD) and no stuck adjacencies</li>
        <li><b>MAC table looks normal</b> — no unexpected dark ports, no flapping</li>
        <li><b>Customer pings / synthetic checks</b> are clean for at least 5 minutes</li>
        <li><b>Logs are clean</b> — no recurring errors, no link-flap counters climbing</li>
      </ul>

      <h3>Post-swap monitoring</h3>
      <p>Stay on site for the first 15-30 minutes after handoff. Most post-swap issues surface as:</p>
      <ul>
        <li>Optic that looked fine but degrades under load → swap it before walking away</li>
        <li>Cable that was just barely seated → reseat and verify with NOC</li>
        <li>ZTP applied a stale config version → NOC pushes the correct one and validates</li>
      </ul>
      <p>If the switch behaves cleanly for 30 minutes, log the all-clear and close out. If anything looks off, treat it as a new diagnosis — don\'t paper over it.</p>

      <div class="panel info">
        <div class="panel-title">The single rule that saves the most time</div>
        <p>Photos before, during, and after. At every step. Cable management chaos is responsible for more post-swap issues than the actual swap.</p>
      </div>
    `,

      { title: 'SOP-NET: Link Troubleshooting', url: 'https://coreweave.atlassian.net/wiki/spaces/DCTEMP/pages/342786110/SOP-NET+Link+Troubleshooting' }

  {
    id: 'l4-ztn-circuits',
    title: 'ZTN DIA Circuit Turn-Up',
    level: 4,
    objectives: [
      'Understand the ZTN security model and your role',
      'Coordinate carrier circuit turn-up at a CW site',
      'Verify physical and logical handoff'
    ],
    body: `
      <p>ZTN (Zero Trust Network) is the secured topology used at customer-sensitive sites (Albatross / Big Bird). The ZTN equipment lives in locked racks that CW staff cannot access without specific approval. Your DCT role here is "site-local technician" supporting the carrier and remote engineering during circuit turn-up — you\'re the only person on the floor when a Lumen / Zayo / Arelion / Verizon tech walks in and the only one between a smooth handoff and a 4-hour delay.</p>

      <h3>The cast of characters</h3>
      <ul>
        <li><b>The carrier</b> (Lumen, Zayo, Arelion, Verizon, etc.) — owns the circuit up to the demarc inside the building. Sends a tech for the physical turn-up.</li>
        <li><b>The landlord / colo provider</b> — owns the meet-me-room (MMR), the riser, and the path from the demarc into CW\'s cage. Approves carrier visits.</li>
        <li><b>CoreWeave NetDev / Backbone Engineering</b> — owns the ZTN gear, configures the new circuit, validates light levels and turn-up.</li>
        <li><b>Site security</b> — gates carrier access. Some ZTN sites are compliance-restricted and require background-checked escorts.</li>
        <li><b>You</b> — the local hands. Coordinator, patch-puller, photographer, escort.</li>
      </ul>

      <h3>Understanding the demarc</h3>
      <p>"Demarc" = demarcation point. It\'s the physical port where the carrier\'s responsibility ends and CoreWeave\'s begins. Practically, it\'s a labeled fiber pair on a patch panel in the meet-me-room. Every demarc has:</p>
      <ul>
        <li>A <b>circuit ID</b> — carrier-issued (e.g., <code>OXSE/123456//ZYO</code>). This is the unique identifier; reference it in every ticket and Slack message.</li>
        <li>A <b>handoff type</b> — typically a single-mode LC pair, sometimes 10G/100G optics directly handed off.</li>
        <li>A <b>letter of authorization (LOA-CFA)</b> documenting CW\'s right to use the patch — engineering files this; you may be asked to confirm the panel/port matches.</li>
      </ul>

      <h3>Pre-cutover checklist</h3>
      <ul>
        <li><b>Visit window confirmed</b> — date, carrier tech name, SOW shared with site security in advance</li>
        <li><b>Carrier circuit ID + demarc location</b> — printed and on the work order; not "ask me when I get there"</li>
        <li><b>Patch already pre-pulled</b> if possible — running the demarc-to-ZTN patch ahead of the visit lets the carrier walk straight to test</li>
        <li><b>Spare optics staged</b> for the ZTN ingress in case the engineering-spec optic is wrong type</li>
        <li><b>Light meter / OTDR</b> available — engineering may ask for level readings</li>
        <li><b>Engineering bridge open</b> — Slack channel or call where remote NetDev can give live direction</li>
      </ul>

      <h3>During the turn-up</h3>
      <ol>
        <li><b>Verify carrier identity</b> — work order matches carrier name, badge, vehicle if possible</li>
        <li><b>Escort to the MMR / demarc</b> — never leave a vendor unescorted, especially in compliance-restricted zones</li>
        <li><b>Verify the demarc port</b> against the work order. If it doesn\'t match, stop and escalate to engineering before patching.</li>
        <li><b>Carrier completes their side</b> — light up, loop test, internal verification. Photograph the completed handoff.</li>
        <li><b>You patch demarc → ZTN ingress</b> as directed by engineering. Clean every connector before mating.</li>
        <li><b>Light readings</b> — carrier\'s Tx, your Rx, and vice versa. Log them in the ticket. Engineering compares against expected loss budget.</li>
        <li><b>Engineering brings up the logical layer</b> — link state, protocol adjacency. You confirm physical link from your side.</li>
        <li><b>Sign-off</b> — work order, carrier ticket, internal CW ticket all updated. Carrier leaves, escorted out.</li>
      </ol>

      <h3>Light level verification — the rough rules</h3>
      <p>Engineering gives the exact spec; here\'s the shape of what you\'re looking at:</p>
      <ul>
        <li><b>Tx power</b> from a typical SM transceiver: usually around 0 to -4 dBm. Below -7 dBm warrants a check.</li>
        <li><b>Rx power</b>: depends on distance / loss budget, but anything below the optic\'s spec sensitivity (typically -18 to -23 dBm depending on optic) is a problem.</li>
        <li><b>Loss</b> across the carrier circuit: the carrier publishes this on their loop test. It should be within the SOW spec.</li>
      </ul>
      <p>If readings are out of spec, the issue is on the carrier side or the patch. Don\'t accept the circuit — get it fixed during the visit, not in a follow-up ticket.</p>

      <h3>Common failure modes</h3>
      <ul>
        <li><b>Carrier no-show</b> — escalate immediately to engineering and reschedule. Document the no-show with timestamps.</li>
        <li><b>Wrong demarc port</b> — happens when the colo updates patch records out of band. Stop before patching; engineering verifies.</li>
        <li><b>Light levels out of spec on first turn-up</b> — most often a dirty connector at the demarc. Clean and retest before declaring a circuit failure.</li>
        <li><b>SOW says X, demarc actually has Y</b> — record what\'s there, don\'t freelance. Engineering decides whether to accept or push back on the carrier.</li>
      </ul>

      <h3>After the cutover</h3>
      <ul>
        <li>Update the CW ticket with: carrier sign-off, your light readings, photos of the patch and demarc state, timestamps</li>
        <li>If there are post-acceptance issues in the next 24-48 hours, you may be paged to re-verify the patch</li>
        <li>Carrier circuit turn-ups are heavily audited (compliance + customer SLA evidence) — sloppy documentation here creates real problems for the company later</li>
      </ul>

      <h3>Why this is L4</h3>
      <p>You\'re the on-the-ground coordinator across CoreWeave engineering, the carrier, the landlord, and site security. You\'ll need to make judgment calls about scheduling, escalate cleanly when the carrier doesn\'t show, and document for legal / compliance. The work itself is straightforward — what makes it L4 is the multi-stakeholder coordination and the consequences of getting it wrong.</p>
    `,

  {
    id: 'l4-power-outage',
    title: 'Utility Power Outage Response',
    level: 4,
    objectives: [
      'Know the expected behavior of UPS, generators, and STS during a utility loss',
      'Communicate clearly to internal stakeholders and customers',
      'Recognize when something didn\'t respond as designed'
    ],
    body: `
      <p>Utility outages are the single highest-risk minute in a data center\'s month. Equipment is designed to ride through them invisibly — when it works, customers see nothing. When it doesn\'t work, you\'re the first responder to a multi-customer incident at the worst possible time. Your job during the outage is observation, verification, and clean comms. The mechanical work happens in the panels and switchgear; you watch the data hall.</p>

      <h3>The cast of characters in the power chain</h3>
      <ul>
        <li><b>Utility</b> — the grid feed coming into the building. The outage starts here.</li>
        <li><b>ATS (Automatic Transfer Switch)</b> — senses the loss and starts the transition.</li>
        <li><b>Generators</b> — diesel rotaries that pick up the facility load. Take 10-30 seconds to spin up to nominal voltage and frequency.</li>
        <li><b>UPS</b> — battery bridge that carries the load during the gap between utility loss and generators online. Typical autonomy: 5-15 minutes (don\'t depend on it for longer).</li>
        <li><b>STS (Static Transfer Switch)</b> — selects between two power sources (utility/generator vs. UPS) and transfers under load with zero break.</li>
        <li><b>RPP / PDU</b> — distributes the conditioned power to racks. Don\'t expect any of these to ride through if upstream fails.</li>
      </ul>

      <h3>What\'s supposed to happen</h3>
      <ol>
        <li>Utility goes away</li>
        <li>UPS picks up the load <i>instantly</i> (sub-cycle) — racks see no break</li>
        <li>ATS senses the loss, signals generators to start</li>
        <li>Generators spin up, sync to frequency, generators-ready signal goes back to ATS</li>
        <li>ATS transfers load to generator output (typically zero break or a brief switch)</li>
        <li>Generators run until utility returns</li>
        <li>Utility return → ATS transfers back, generators cool down and shut off</li>
        <li>UPS recharges from utility</li>
        <li>No customer impact</li>
      </ol>

      <h3>Pre-event readiness</h3>
      <p>You don\'t pre-empt utility outages, but you do make them survivable:</p>
      <ul>
        <li><b>Know your site\'s power one-line</b> — which UPS feeds which RPP, which generators serve which feed (A/B), where the STS units sit in the chain</li>
        <li><b>Know your generator run-time</b> — typical sites carry 24-72 hours of fuel; a confirmed long outage triggers a fuel order well before runtime expires</li>
        <li><b>Generator + UPS test schedules</b> — site Facilities runs monthly load tests and quarterly full-transfer drills. Attend at least one — it\'s the only way to feel the noise / smell / vibration changes you\'ll need to recognize during a real event.</li>
        <li><b>BMS / Grafana power dashboards</b> bookmarked — utility status, UPS state-of-charge, generator output, ATS position, RPP-level telemetry</li>
      </ul>

      <h3>Your job during the transition (the first 60 seconds)</h3>
      <ol>
        <li><b>Note the time</b> — utility loss timestamp matters for the postmortem and for any customer SLA calculations</li>
        <li><b>Watch the dashboard</b> — UPS picking up load, generators starting, ATS transfer position</li>
        <li><b>Listen to the hall</b> — fan tone changes are normal as PDUs briefly switch sources; deep silence in a row is bad (a rack lost power)</li>
        <li><b>Look for unexpected dark gear</b> — racks where front bezels go dark, PDU LCDs that go blank instead of riding through</li>
        <li><b>Confirm with Facilities</b> — they\'re watching the switchgear; you\'re watching the load. Sync observations.</li>
        <li><b>Post in <code>#ops</code></b> — "16:42 utility loss, UPS holding, gens starting" — the timeline begins now</li>
      </ol>

      <h3>The walk during a sustained outage</h3>
      <p>Once generators are stable, walk the halls in your normal walkthrough pattern. What you\'re looking for:</p>
      <ul>
        <li><b>PDU LCDs energized</b> on every rack — any blank one is the incident</li>
        <li><b>No new amber LEDs</b> on servers / switches that weren\'t there before the event</li>
        <li><b>No abnormal fan noise</b> — fans running max because cooling temporarily dipped is normal; fans running max for an extended time is a cooling concern, not a power one</li>
        <li><b>STS units showing healthy</b> — front-panel "OK"; no fault codes; no source-mismatch alarms</li>
        <li><b>Generator room</b> (if you have access) — gens running smoothly, fuel level reading sane, no alarm conditions on the controllers</li>
      </ul>

      <h3>If something didn\'t ride through</h3>
      <p>This is the actual incident. The escalation flow:</p>
      <ol>
        <li>Note the exact RPP / PDU / rack that lost power and the time</li>
        <li>Photograph the dark gear and any controller fault codes</li>
        <li>Page Facilities + DCM immediately — utility-side root cause is theirs</li>
        <li>Do <b>not</b> reset breakers or self-heal — equipment that didn\'t ride through has a real upstream fault until proven otherwise</li>
        <li>Capture customer-impact evidence — which racks belong to which customers, what services were affected</li>
      </ol>

      <h3>After utility returns</h3>
      <ul>
        <li><b>Don\'t walk away when generators stop</b> — the transfer back to utility is the second-most-likely failure point. Watch dashboards through the return.</li>
        <li><b>Verify UPS recharge</b> — state-of-charge climbing over the next hour</li>
        <li><b>Inventory anything that needs follow-up</b> — alarms that latched on, racks that need recovery from a partial dark event, generator runtime that depleted fuel</li>
        <li><b>Walk-through documentation</b> — start time of utility loss, generators-on time, utility-return time, generators-off time, any equipment that needed intervention, photos throughout</li>
        <li><b>After-action review</b> — Facilities + DC Ops debrief within 24-48 hours of any non-clean event. Your timeline notes feed it.</li>
      </ul>

      <h3>Customer comms</h3>
      <p>Two scenarios:</p>
      <ul>
        <li><b>Successful ride-through</b> — facility absorbed it, no customer impact. Standard reassurance comms via Account Management.</li>
        <li><b>Partial impact</b> — something failed, customers may have seen a blip. Emphasis on what\'s being done, what failed, ETA on power transition back.</li>
      </ul>
      <p>The Confluence "Utility Power Outage MOP" has both comms templates. Use them — don\'t freestyle customer comms during incidents. Account Management owns the customer-facing message; you own the technical timeline that feeds it.</p>
    `,
    refs: [

  {
    id: 'l4-mentor',
    title: 'Mentoring & Authoring SOPs',
    level: 4,
    objectives: [
      'Mentor L1-L3 DCTs effectively',
      'Author SOPs / MOPs that other DCTs can actually follow',
      'Drive process improvements rather than fight the same fires'
    ],
    body: `
      <p>L4 isn\'t about doing more tasks — it\'s about scaling yourself. The official Leveling Guide describes L4 as "develops and executes the plan, optimizing efficiency, reducing risks... establishes and documents best practices" and "drives resolution of high-impact, cross-functional issues, makes data-driven process improvements, sets standard of accountability across the team, coaches peers on ownership and excellence." Practically: less time on the rack, more time making it so the team doesn\'t need you on the rack.</p>

      <h3>Mentoring fundamentals</h3>
      <ul>
        <li><b>Show, don\'t tell</b> — pair on the rack, let them drive after the second time</li>
        <li><b>Teach the why</b> — anyone can follow steps; understanding why each step exists is what makes a senior DCT</li>
        <li><b>Let them feel the consequences in safe contexts</b> — a misordered swap on lab gear is worth a hundred warnings</li>
        <li><b>Give specific, in-the-moment feedback</b> — "you cleaned the trunk side but skipped the cassette LCs" beats "be thorough"</li>
        <li><b>Promote them up</b> — you want your L1 to be your L2 next year. That\'s how the team grows.</li>
      </ul>

      <h3>The pairing loop — a concrete framework</h3>
      <p>For a new procedure, run this 3-pass pattern:</p>
      <ol>
        <li><b>Pass 1 — you drive, they observe.</b> Narrate the why, not just the what. "I\'m photographing this because if the labels smudge mid-swap, the photo is the only ground truth."</li>
        <li><b>Pass 2 — they drive, you watch.</b> Hands off unless safety. After each step, ask "what did you check before moving on?" — they verbalize the verification, you correct gaps.</li>
        <li><b>Pass 3 — they do it solo, you debrief after.</b> "Walk me through what went smoothly and what surprised you." First time you trust them on a class of work without supervision; the debrief is where calibration happens.</li>
      </ol>

      <h3>Calibrate weekly with your DCM</h3>
      <p>Mentoring without DCM alignment creates inconsistent expectations across the team. Quick weekly sync:</p>
      <ul>
        <li>Who\'s ready for what next-level work this week</li>
        <li>Anyone stuck — and what specifically (skill gap? confidence? scheduling?)</li>
        <li>Anyone slipping — early signals matter; weekly catches it before quarterly review</li>
        <li>Cross-team feedback you\'ve heard about your team\'s output</li>
      </ul>

      <h3>Common L1→L2 stuck points to watch for</h3>
      <ul>
        <li><b>Speed without verification</b> — they finish fast but skip the post-checks. Coach: "what do you check to know it actually worked?"</li>
        <li><b>Confidence on unfamiliar gear</b> — they extrapolate from familiar hardware. Coach: "if you haven\'t done X before, what\'s the rule?" (answer: stop and ask)</li>
        <li><b>Reluctance to escalate</b> — they want to figure it out alone. Coach: cheap escalation beats expensive root cause; reinforce when they make a good escalation call</li>
        <li><b>Documentation lag</b> — work happens, ticket updates trail by hours. Coach: "the work isn\'t done until the ticket is."</li>
      </ul>

      <h3>Teaching emergency response without inducing panic</h3>
      <p>You can\'t simulate a real outage, but you can rehearse the response shape:</p>
      <ul>
        <li>Walk through "what if utility dropped right now" with someone on shift — where would you look first, who would you page, what would you say in <code>#ops</code></li>
        <li>Pull up a past postmortem and have them narrate "what would I have done at this timestamp"</li>
        <li>Drill the comms format (the WHO/WHAT/WHERE/WHEN/HOW report shape) on a low-stakes ticket so the muscle memory exists when it counts</li>
        <li>Reinforce: "calm + specific + in-thread" beats "fast + reactive + all-caps"</li>
      </ul>

      <h3>Authoring SOPs and MOPs</h3>
      <p>An SOP that no one can follow is worse than no SOP. CW has a procedure template (link below). The features of a good DCT-facing SOP:</p>
      <ol>
        <li><b>Pre-checks first</b> — what must be true before starting</li>
        <li><b>Numbered steps</b>, not paragraphs</li>
        <li><b>Photos at every decision point</b> — if there\'s a choice, show what it looks like</li>
        <li><b>"Stop if you see this" callouts</b> in red</li>
        <li><b>Post-checks and verification</b> — how do you know it worked</li>
        <li><b>Rollback steps</b> — if it went sideways, how do you put it back</li>
        <li><b>Audit checklist</b> at the end — DCM countersigns on critical work</li>
      </ol>
      <p>The test for whether an SOP is good enough: a new L1 can follow it without you in the room and get it right.</p>

      <h3>Authoring incident postmortems</h3>
      <p>If you\'re writing a postmortem, the audience is six months from now — not today. Optimize for someone who didn\'t live the incident:</p>
      <ul>
        <li><b>Timeline first</b>, narrative second. Timestamped observations beat retrospective summaries.</li>
        <li><b>Separate "what happened" from "why it happened" from "what we\'ll do."</b> Mixing them muddies all three.</li>
        <li><b>Action items have owners and due dates</b> — anything else is a wishlist</li>
        <li><b>Avoid blame language</b> — "the runbook didn\'t cover this case" beats "X missed the runbook step." Systems fail before people do.</li>
      </ul>

      <h3>Driving improvement</h3>
      <p>If you\'re fixing the same issue weekly, the issue isn\'t the failure — it\'s the system that allows the failure. Examples of L4-driven improvements:</p>
      <ul>
        <li>Adding a QC check during racking that prevents a recurring miscable</li>
        <li>Proposing a label-printing standard that survives walkthroughs</li>
        <li>Working with HPC-NET to update the leaf-to-node mapping doc when it drifts</li>
        <li>Authoring a cleanup MOP that reduces an emergency to a routine ticket</li>
        <li>Filing an SDA / proactive ticket for a pattern your team keeps catching after the fact</li>
      </ul>

      <h3>Building the next L4</h3>
      <p>The team grows when L3s become L4s. Look for:</p>
      <ul>
        <li>L3s who are starting to coach L1s without being asked</li>
        <li>L3s who push back on broken processes instead of working around them</li>
        <li>L3s who write good tickets — clear, specific, photo-backed</li>
      </ul>
      <p>Pull them into your work: co-author an SOP, share a draft postmortem, bring them to a cross-team RCA. Visible scope is how the next promotion happens.</p>

  { cat: 'Cabling', term: 'Fluke CableIQ', def: 'Copper cable certifier — master + remote pair. Tests signal performance, length per pair, and termination.' },

  /* Power */
  { cat: 'Power', term: 'PDU', def: 'Two meanings: facility-level Power Distribution Unit (large breaker panel) OR rack PDU (the power strip inside each cabinet).' },
  { cat: 'Power', term: 'RPP', def: 'Remote Power Panel. Smaller PDU that breaks one feed into many circuit-protected outlets feeding individual rack PDUs.' },
  { cat: 'Power', term: 'STS', def: 'Static Transfer Switch. Picks between redundant power sources to maintain continuous supply.' },
  { cat: 'Power', term: 'UPS', def: 'Uninterruptible Power Supply. Battery system bridging utility-to-generator transitions.' },
  { cat: 'Power', term: 'EPO', def: 'Emergency Power Off. Cuts all power to a data hall. Reserved for life safety.' },
  { cat: 'Power', term: 'IEC C13/C14', def: 'House-shaped IEC power connector. Standard for servers and switches. Female (cord) / Male (device).' },
  { cat: 'Power', term: 'IEC C15/C16', def: 'House-shape with extra notch — high-temperature variant.' },
  { cat: 'Power', term: 'IEC C19/C20', def: 'Square IEC connector for higher-current devices (rack PDUs, GPU servers).' },
  { cat: 'Power', term: 'IEC C21/C22', def: 'Sideways-prong IEC connector for even higher current.' },
  { cat: 'Power', term: 'Pulse RP6361', def: 'Brand of rack PDU seen at some sites. Requires serial-cable + rollover adapter for first-time IP config.' },

  /* Cooling */
  { cat: 'Cooling', term: 'CRAC', def: 'Computer Room Air Conditioner. Big self-contained refrigeration unit for traditional data hall cooling.' },
  { cat: 'Cooling', term: 'CRAH', def: 'Computer Room Air Handler. Blows air over chilled-water pipes; refrigeration is at the central chiller.' },
  { cat: 'Cooling', term: 'CDU', def: 'Cooling Distribution Unit. Bottom of a GB200/GB300 rack. Heat exchanger between glycol secondary loop and primary water loop.' },
  { cat: 'Cooling', term: 'XDM', def: 'Vertiv chiller in primary water loop. Cools and pumps the floor water out to GB-series CDUs.' },
  { cat: 'Cooling', term: 'Glycol', def: 'Ethylene glycol — the colored liquid in GB-series secondary cooling loops. Non-conductive, mildly flammable, requires PPE. Disposed as chemical waste.' },
  { cat: 'Cooling', term: 'Direct-to-Chip (D2C)', def: 'CW\'s liquid cooling architecture — cold plates bolted to GPU/CPU, glycol loop sealed in the server. (CW does not use immersion cooling.)' },
  { cat: 'Cooling', term: 'PCG fill', def: 'Propylene-glycol fill — the DCT-owned task of replenishing a GB200 secondary loop from the hanging fluid bag.' },

  /* Tickets & Workflow */
  { cat: 'Tickets & Workflow', term: 'Sheriff', def: 'Wrapper around Jira that integrates with Snipe and other systems. Where most DCT ticket work happens.' },
  { cat: 'Tickets & Workflow', term: 'SDA', def: 'Self Diagnostic Action. Most common Jira project / ticket type for DCTs — auto-generated for hardware faults, link issues, parts approvals.' },
  { cat: 'Tickets & Workflow', term: 'Glados-Overwatch Bot', def: 'Auto-triage system on tickets (svc-glados-overwatch-bot). Adds 🤖 banners with DCT instructions, tracks "Cleaning Attempt 1 of 2" before escalating, auto-transitions to Customer Verification.' },
  { cat: 'Tickets & Workflow', term: 'Awaiting Triage', def: 'Ticket status — DCT can\'t do the requested action and needs human review.' },
  { cat: 'Tickets & Workflow', term: 'Cleaning Done', def: 'Ticket status — DCT finished the requested clean/reseat. Automation moves to Customer Verification.' },
  { cat: 'Tickets & Workflow', term: 'Customer Verification', def: 'Ticket status — customer confirms the fix. Auto-closes after 14 days if no response.' },
  { cat: 'Tickets & Workflow', term: 'Waiting For Support', def: 'Ticket status — bot escalated because the standard fix didn\'t resolve.' },
  { cat: 'Tickets & Workflow', term: 'Network Links', def: 'SDA ticket type covering IB Link, Ethernet Link, and similar physical-layer link issues.' },
  { cat: 'Tickets & Workflow', term: 'Parts Approval Request', def: 'Auto-generated SDA ticket for self-maintenance part swaps that need sign-off.' },
  { cat: 'Tickets & Workflow', term: 'Snipe', def: 'Snipe-IT. Asset inventory system tracking devices by serial number.' },

  /* Tools & Operations */
  { cat: 'Tools & Operations', term: 'Glean', def: 'In-house AI search tool indexed across Confluence and other internal sources. First stop for any question.' },
  { cat: 'Tools & Operations', term: 'Grafana', def: 'CW\'s metrics / dashboard platform. Per-host panels, link state, on-call dashboards linked from PagerDuty.' },
  { cat: 'Tools & Operations', term: 'PagerDuty', def: 'Notification platform that pages on-call staff when service-impacting alerts fire. ACK = "I see this and I\'m on it." Failing to ACK escalates.' },
  { cat: 'Tools & Operations', term: 'Amberlamps', def: 'Site-level shared spreadsheet for tracking walkthrough findings that aren\'t resolved on the spot. Updated in real time.' },
  { cat: 'Tools & Operations', term: 'Turnover Log', def: 'End-of-shift document where the afternoon team gathers all non-trivial findings from the day. Feeds the weekly DCM report.' },
  { cat: 'Tools & Operations', term: 'PPE', def: 'Personal Protective Equipment. Glasses, gloves, hearing protection, hi-viz, closed-toe.' },
  { cat: 'Tools & Operations', term: 'MHE', def: 'Material Handling Equipment. Pallet jacks, lifts, etc. Pre-use inspection log required for every use.' },
  { cat: 'Tools & Operations', term: 'LOIS Locker', def: 'On-site secured locker of pre-staged Dell parts (PSUs, fans, eventually PMC modules) authorized for DCT self-maintenance use.' },
  { cat: 'Tools & Operations', term: 'Blue tape', def: 'CW convention — applied to powered-off / uncabled gear at the time of action. Walkthrough sees blue tape = intentional, skip it.' },

  /* Security */
  { cat: 'Security', term: 'ZTN', def: 'Zero Trust Network. Locked-rack secured topology for sensitive customer infrastructure (Big Bird sites). Retina scanners; CW staff have no access without specific approval.' },
  { cat: 'Security', term: 'DCAT', def: 'Microsoft DC access account, used at Microsoft-owned colos. Requires 2FA after issuance.' },
  { cat: 'Security', term: 'Tailgating', def: 'Letting someone enter a secured space on your badge swipe. The #1 reported security violation. Never do it, even for coworkers.' },

  /* Standards & Documents */
  { cat: 'Standards & Documents', term: 'SOP / MOP', def: 'Standard Operating Procedure / Method Of Procedure. Step-by-step authority for production work.' },
  { cat: 'Standards & Documents', term: 'WO / SR', def: 'Work Order / Service Request. Vendor (Dell, Vertiv) ticket numbers used to ship and receive parts.' }
];

    <text x="50" y="176" fill="currentColor" font-size="10" text-anchor="middle" opacity="0.7">limit — measure if unsure</text>
  </g>

  <g transform="translate(440,70)">
    <path d="M 0,60 L 30,60 Q 40,60 40,50 L 40,30 Q 40,20 30,20 L 0,20" fill="none" stroke="#f85149" stroke-width="3"/>
    <line x1="35" y1="35" x2="55" y2="55" stroke="#f85149" stroke-width="2"/>
    <line x1="55" y1="35" x2="35" y2="55" stroke="#f85149" stroke-width="2"/>
    <text x="40" y="142" fill="#f85149" font-size="13" text-anchor="middle" font-weight="700">FAIL</text>
    <text x="40" y="160" fill="currentColor" font-size="10" text-anchor="middle">Sharp / kinked bend</text>
    <text x="40" y="176" fill="currentColor" font-size="10" text-anchor="middle" opacity="0.7">Permanent damage</text>

  <text x="300" y="280" fill="currentColor" font-size="10" text-anchor="middle" opacity="0.6">Use velcro (not zip ties) on fiber bundles · zip ties at finger-tightness only on copper</text>
</svg>`,

'link-troubleshooting': `
<svg viewBox="0 0 620 880" xmlns="http://www.w3.org/2000/svg">
  <text x="310" y="22" fill="currentColor" font-size="13" text-anchor="middle" font-weight="600">Link troubleshooting — the 8-step decision tree</text>
  <text x="310" y="40" fill="currentColor" font-size="10" text-anchor="middle" opacity="0.75">Run in order. If link recovers at any step, stop and document. Reaching step 8 means it\'s an engineering issue.</text>

  <g font-family="inherit">
    <!-- Step 1 -->
    <rect x="60" y="60" width="480" height="60" fill="#5a72ff" fill-opacity="0.12" stroke="#5a72ff" stroke-width="1.5" rx="8"/>
    <circle cx="92" cy="90" r="14" fill="#5a72ff"/>
    <text x="92" y="94" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">1</text>
    <text x="118" y="84" fill="currentColor" font-size="12" font-weight="700">Confirm the failure</text>
    <text x="118" y="100" fill="currentColor" font-size="10" opacity="0.8">Is it really down, or just degraded? Check the alert + Grafana.</text>

    <line x1="300" y1="120" x2="300" y2="156" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <polygon points="294,150 300,162 306,150" fill="currentColor" opacity="0.5"/>

    <!-- Step 2 -->
    <rect x="60" y="160" width="480" height="60" fill="#5a72ff" fill-opacity="0.12" stroke="#5a72ff" stroke-width="1.5" rx="8"/>
    <circle cx="92" cy="190" r="14" fill="#5a72ff"/>
    <text x="92" y="194" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">2</text>
    <text x="118" y="184" fill="currentColor" font-size="12" font-weight="700">Check both ends</text>
    <text x="118" y="200" fill="currentColor" font-size="10" opacity="0.8">Host link state + switch port state. Are both telling the same story?</text>

    <line x1="300" y1="220" x2="300" y2="256" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <polygon points="294,250 300,262 306,250" fill="currentColor" opacity="0.5"/>

    <!-- Step 3 -->
    <rect x="60" y="260" width="480" height="60" fill="#5a72ff" fill-opacity="0.12" stroke="#5a72ff" stroke-width="1.5" rx="8"/>
    <circle cx="92" cy="290" r="14" fill="#5a72ff"/>
    <text x="92" y="294" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">3</text>
    <text x="118" y="284" fill="currentColor" font-size="12" font-weight="700">Visual inspection</text>
    <text x="118" y="300" fill="currentColor" font-size="10" opacity="0.8">At the rack: link LEDs lit? Color correct? Obvious damage?</text>

    <line x1="300" y1="320" x2="300" y2="356" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <polygon points="294,350 300,362 306,350" fill="currentColor" opacity="0.5"/>

    <!-- Step 4 -->
    <rect x="60" y="360" width="480" height="60" fill="#d29922" fill-opacity="0.14" stroke="#d29922" stroke-width="1.5" rx="8"/>
    <circle cx="92" cy="390" r="14" fill="#d29922"/>
    <text x="92" y="394" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">4</text>
    <text x="118" y="384" fill="currentColor" font-size="12" font-weight="700">Reseat</text>
    <text x="118" y="400" fill="currentColor" font-size="10" opacity="0.8">Disconnect, scope, clean both ends, reconnect. Many links recover here.</text>

    <line x1="300" y1="420" x2="300" y2="456" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <polygon points="294,450 300,462 306,450" fill="currentColor" opacity="0.5"/>

    <!-- Step 5 -->
    <rect x="60" y="460" width="480" height="60" fill="#d29922" fill-opacity="0.14" stroke="#d29922" stroke-width="1.5" rx="8"/>
    <circle cx="92" cy="490" r="14" fill="#d29922"/>
    <text x="92" y="494" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">5</text>
    <text x="118" y="484" fill="currentColor" font-size="12" font-weight="700">Swap optic</text>
    <text x="118" y="500" fill="currentColor" font-size="10" opacity="0.8">Known-good optic into the same port. Recovered? Original optic was bad.</text>

    <line x1="300" y1="520" x2="300" y2="556" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <polygon points="294,550 300,562 306,550" fill="currentColor" opacity="0.5"/>

    <!-- Step 6 -->
    <rect x="60" y="560" width="480" height="60" fill="#d29922" fill-opacity="0.14" stroke="#d29922" stroke-width="1.5" rx="8"/>
    <circle cx="92" cy="590" r="14" fill="#d29922"/>
    <text x="92" y="594" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">6</text>
    <text x="118" y="584" fill="currentColor" font-size="12" font-weight="700">Swap fiber</text>
    <text x="118" y="600" fill="currentColor" font-size="10" opacity="0.8">Known-good patch on the same path. Recovered? Fiber was bad.</text>

    <line x1="300" y1="620" x2="300" y2="656" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <polygon points="294,650 300,662 306,650" fill="currentColor" opacity="0.5"/>

    <!-- Step 7 -->
    <rect x="60" y="660" width="480" height="60" fill="#d29922" fill-opacity="0.14" stroke="#d29922" stroke-width="1.5" rx="8"/>
    <circle cx="92" cy="690" r="14" fill="#d29922"/>
    <text x="92" y="694" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">7</text>
    <text x="118" y="684" fill="currentColor" font-size="12" font-weight="700">Swap port</text>
    <text x="118" y="700" fill="currentColor" font-size="10" opacity="0.8">Move cable/optic to a known-good switch port. Recovered? Port was bad.</text>

    <line x1="300" y1="720" x2="300" y2="756" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <polygon points="294,750 300,762 306,750" fill="currentColor" opacity="0.5"/>

    <!-- Step 8 — terminal escalation (red) -->
    <rect x="60" y="760" width="480" height="60" fill="#f85149" fill-opacity="0.14" stroke="#f85149" stroke-width="1.5" rx="8"/>
    <circle cx="92" cy="790" r="14" fill="#f85149"/>
    <text x="92" y="794" fill="#fff" font-size="13" text-anchor="middle" font-weight="700">8</text>
    <text x="118" y="784" fill="currentColor" font-size="12" font-weight="700">Escalate</text>
    <text x="118" y="800" fill="currentColor" font-size="10" opacity="0.85">All clean, still down → network engineering / vendor issue. Don\'t guess.</text>
  </g>

  <text x="310" y="855" fill="currentColor" font-size="9" text-anchor="middle" opacity="0.55">Steps 1-3: triage · Steps 4-7: physical layer · Step 8: above your scope</text>
</svg>`,

'osfp-twin-port': `
<svg viewBox="0 0 820 530" xmlns="http://www.w3.org/2000/svg">

const STORAGE_KEY = 'cw_dct_training_v1';
const STORAGE_THEME = 'cw_dct_training_theme';
let state = loadState();

function loadState() {
  const fresh = { completed: {}, quizScores: {}, completedAt: {}, history: [] };
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return fresh;
    const parsed = JSON.parse(raw);
    return Object.assign({}, fresh, parsed, {
      completed: parsed.completed || {},
      quizScores: parsed.quizScores || {},
      completedAt: parsed.completedAt || {},
      history: Array.isArray(parsed.history) ? parsed.history : []
    });
  } catch (e) {
    return fresh;
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function totalLearningModules() {
  return CURRICULUM.filter(m => m.level >= 1 && m.level <= 4).length;
}
function readTimeMinutes(html) {
  if (!html) return 1;
  const text = String(html).replace(/<[^>]*>/g, ' ').replace(/&[a-z#0-9]+;/gi, ' ');
  const words = text.split(/\s+/).filter(Boolean).length;
  return Math.max(1, Math.round(words / 200));
}
function formatCompletedAt(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: (new Date().getFullYear() === d.getFullYear() ? undefined : 'numeric') });
  } catch (e) { return ''; }
}
function nextLearningModule(currentId) {
  const learning = CURRICULUM.filter(m => m.level >= 1 && m.level <= 4);
  const idx = learning.findIndex(m => m.id === currentId);
  if (idx < 0 || idx >= learning.length - 1) return null;
  return learning[idx + 1];
}
function prevLearningModule(currentId) {
  const learning = CURRICULUM.filter(m => m.level >= 1 && m.level <= 4);
  const idx = learning.findIndex(m => m.id === currentId);
  if (idx <= 0) return null;
  return learning[idx - 1];
}
function completedCount() {
  return Object.values(state.completed).filter(Boolean).length;
}

function pickCelebrationMessage() {
  return CELEBRATION_MESSAGES[Math.floor(Math.random() * CELEBRATION_MESSAGES.length)];
}

function launchConfetti(count) {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  canvas.innerHTML = '';
  const colors = ['#2741e7', '#5a72ff', '#248a3d', '#4fae6e', '#ca6900', '#c98239', '#6f3ff5', '#9a7ad6', '#ff6b6b', '#ffd166'];
  const n = count || 120;
  for (let i = 0; i < n; i++) {
    const piece = document.createElement('span');
    piece.className = 'confetti-piece';
    const startX = Math.random() * 100;
    const drift = (Math.random() * 240 - 120).toFixed(0) + 'px';
    const spin = (Math.random() * 1080 - 360).toFixed(0) + 'deg';
    const duration = (2.4 + Math.random() * 2.0).toFixed(2) + 's';
    const delay = (Math.random() * 0.8).toFixed(2) + 's';
    const size = (8 + Math.random() * 8).toFixed(0);
    const w = size, h = (Number(size) * (1.2 + Math.random() * 0.6)).toFixed(0);
    const isCircle = Math.random() < 0.25;
    piece.style.left = startX + 'vw';
    piece.style.width = w + 'px';
    piece.style.height = h + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = isCircle ? '50%' : '2px';
    piece.style.setProperty('--drift', drift);
    piece.style.setProperty('--spin', spin);
    piece.style.animationDuration = duration;
    piece.style.animationDelay = delay;
    canvas.appendChild(piece);
  }
  setTimeout(() => { if (canvas) canvas.innerHTML = ''; }, 5500);
}

let _celebAudioCtx = null;
function getCelebrationAudio() {
  if (_celebAudioCtx) return _celebAudioCtx;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    _celebAudioCtx = new Ctx();
  } catch (e) { return null; }
  return _celebAudioCtx;
}

function playTone(ctx, freq, startTime, duration, type, volume) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'triangle';
  osc.frequency.setValueAtTime(freq, startTime);
  const peak = volume == null ? 0.18 : volume;
  gain.gain.setValueAtTime(0.0001, startTime);
  gain.gain.exponentialRampToValueAtTime(peak, startTime + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}

function playCelebrationSound(intensity) {
  const ctx = getCelebrationAudio();
  if (!ctx) return;
  if (ctx.state === 'suspended' && ctx.resume) {
    try { ctx.resume(); } catch (e) {}
  }
  const t0 = ctx.currentTime + 0.02;
  const big = intensity !== 'soft';
  const notes = [523.25, 659.25, 783.99, 1046.50];
  notes.forEach((f, i) => {
    playTone(ctx, f, t0 + i * 0.085, 0.28, 'triangle', big ? 0.17 : 0.11);
  });
  const sparkleCount = big ? 14 : 8;
  for (let i = 0; i < sparkleCount; i++) {
    const freq = 1500 + Math.random() * 2000;
    const start = t0 + 0.25 + Math.random() * 1.4;
    playTone(ctx, freq, start, 0.08, 'sine', big ? 0.06 : 0.04);
  }
  if (big) {
    [523.25, 659.25, 783.99, 1046.50].forEach(f => {
      playTone(ctx, f, t0 + 0.5, 0.65, 'sine', 0.09);
    });
  }
}

function triggerCelebration(replay) {
  const overlay = document.getElementById('celebration');
  const msgEl = document.getElementById('celebration-message');
  const metaEl = document.getElementById('celebration-meta');
  if (!overlay) return;
  if (msgEl) msgEl.textContent = pickCelebrationMessage();
  if (metaEl) metaEl.textContent = `All ${totalLearningModules()} modules · L1 → L4 cleared`;
  overlay.classList.add('active');
  launchConfetti(replay ? 80 : 140);
  playCelebrationSound(replay ? 'soft' : 'big');
}

function closeCelebration() {
  const overlay = document.getElementById('celebration');
  if (overlay) overlay.classList.remove('active');
  const canvas = document.getElementById('confetti-canvas');
  if (canvas) canvas.innerHTML = '';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const overlay = document.getElementById('celebration');
    if (overlay && overlay.classList.contains('active')) closeCelebration();
    const active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) active.blur();
    return;
  }
  // `/` focuses the sidebar search — only when not already typing
  if (e.key === '/' && !(e.metaKey || e.ctrlKey || e.altKey)) {
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    const search = document.querySelector('.nav-search input');
    if (search) {
      e.preventDefault();
      // Make sure the sidebar is open so the field is reachable
      const layout = document.querySelector('.layout');
      if (layout && layout.classList.contains('sidebar-collapsed')) toggleSidebar();
      search.focus();
      search.select();
    }
    return;
  }
  // Arrow-key module nav — only when no modal is open and the user isn't typing
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const t = e.target;
  if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
  const overlay = document.getElementById('celebration');
  if (overlay && overlay.classList.contains('active')) return;
  const id = (location.hash || '').replace('#', '');
  const m = CURRICULUM.find(x => x.id === id && x.level >= 1 && x.level <= 4);
  if (!m) return;
  const target = e.key === 'ArrowLeft' ? prevLearningModule(id) : nextLearningModule(id);
  if (target) {
    e.preventDefault();
    navigate(target.id);
  }
});

function updateProgress() {
  const total = totalLearningModules();
  const done = completedCount();
  const pct = total ? Math.round((done / total) * 100) : 0;
  if (pct === 100 && total > 0 && !state.celebratedComplete) {
    state.celebratedComplete = true;
    saveState();
    setTimeout(() => triggerCelebration(false), 350);
  } else if (pct < 100 && state.celebratedComplete) {
    state.celebratedComplete = false;
    saveState();
  }
  const pctEl = document.getElementById('progress-pct');
  const countEl = document.getElementById('progress-count');
  if (pctEl) pctEl.textContent = `${pct}%`;
  if (countEl) countEl.textContent = `${done}/${total}`;
  const fillEl = document.getElementById('progress-fill');
  if (fillEl) {
    fillEl.style.width = pct + '%';
    const bar = fillEl.parentElement;
    if (bar && bar.setAttribute) bar.setAttribute('aria-valuenow', String(pct));
  }
  document.querySelectorAll('.nav-link[data-module-id]').forEach(el => {
    const id = el.getAttribute('data-module-id');
    const check = el.querySelector('.check');
    const stamp = state.completedAt && state.completedAt[id];
    const tip = stamp ? `Completed ${formatCompletedAt(stamp)}` : '';
    if (state.completed[id]) {
      if (!check) {
        const span = document.createElement('span');
        span.className = 'check';
        span.textContent = '✓';
        if (tip) span.title = tip;
        el.appendChild(span);
      } else if (tip) {
        check.title = tip;
      }
    } else if (check) {
      check.remove();
    }
  });
  document.querySelectorAll('.level-card').forEach(card => {
    const lvl = parseInt(card.getAttribute('data-level'), 10);
    const modules = CURRICULUM.filter(m => m.level === lvl);
    const lvlDone = modules.filter(m => state.completed[m.id]).length;
    const lvlPct = modules.length ? Math.round((lvlDone / modules.length) * 100) : 0;
    const fill = card.querySelector('.progress-fill');
    if (fill) fill.style.width = lvlPct + '%';
    const status = card.querySelector('.lvl-status');
    if (status) status.textContent = `${lvlDone}/${modules.length} complete`;
  });
}

const STORAGE_NAV_COLLAPSED = 'cw_dct_training_nav_collapsed';
const NAV_DEFAULT_COLLAPSED = ['lvl-1', 'lvl-2', 'lvl-3', 'lvl-4'];

const STORAGE_SIDEBAR_HIDDEN = 'cw_dct_training_sidebar_hidden';
function toggleSidebar() {
  const layout = document.querySelector('.layout');
  if (!layout) return;
  const collapsed = layout.classList.toggle('sidebar-collapsed');
  try { localStorage.setItem(STORAGE_SIDEBAR_HIDDEN, JSON.stringify(collapsed)); } catch (e) {}
  const btn = document.getElementById('sidebar-toggle');
  if (btn) btn.setAttribute('aria-expanded', String(!collapsed));
}
function restoreSidebarState() {
  let collapsed = false;
  try { collapsed = JSON.parse(localStorage.getItem(STORAGE_SIDEBAR_HIDDEN) || 'false'); } catch (e) {}
  const layout = document.querySelector('.layout');
  if (layout) layout.classList.toggle('sidebar-collapsed', !!collapsed);
  const btn = document.getElementById('sidebar-toggle');
  if (btn) btn.setAttribute('aria-expanded', String(!collapsed));
}
function loadCollapsedSet() {
  try {
    const raw = localStorage.getItem(STORAGE_NAV_COLLAPSED);
    if (raw === null) return new Set(NAV_DEFAULT_COLLAPSED);
    return new Set(JSON.parse(raw));
  } catch (e) { return new Set(NAV_DEFAULT_COLLAPSED); }
}
function saveCollapsedSet(set) {
  localStorage.setItem(STORAGE_NAV_COLLAPSED, JSON.stringify([...set]));
}

function renderNav() {
  const list = document.getElementById('nav-list');
  const collapsed = loadCollapsedSet();
  let html = '';
  html += `<div class="nav-section">
    <div class="nav-link" data-module-id="home">Welcome &amp; Overview</div>
  </div>`;
  for (let lvl = 1; lvl <= 4; lvl++) {
    const labels = { 1: 'Foundations', 2: 'Routine Operations', 3: 'Advanced Diagnostics', 4: 'Senior / Expert' };
    const modules = CURRICULUM.filter(m => m.level === lvl);
    const lvlKey = `lvl-${lvl}`;
    const isCollapsed = collapsed.has(lvlKey);
    html += `<div class="nav-section ${isCollapsed ? 'collapsed' : ''}" data-section-key="${lvlKey}">
      <div class="nav-section-title collapsible">
        <span class="chevron" data-toggle="${lvlKey}">▼</span>
        <span class="nav-section-link" data-module-id="l${lvl}-overview">${levelPillHTML(lvl)} Level ${lvl} — ${labels[lvl]}</span>
        <span class="lvl-count">${modules.length}</span>
      </div>`;
    modules.forEach(m => {
      html += `<div class="nav-link" data-module-id="${m.id}">${m.title}</div>`;
    });
    html += `</div>`;
  }
  const refKey = 'ref';
  const refCollapsed = collapsed.has(refKey);
  html += `<div class="nav-section ${refCollapsed ? 'collapsed' : ''}" data-section-key="${refKey}">
    <div class="nav-section-title collapsible" data-toggle="${refKey}">
      <span class="chevron">▼</span>
      Reference
    </div>
    <div class="nav-link" data-module-id="glossary">Glossary</div>
    <div class="nav-link" data-module-id="resources">Confluence &amp; Drive Index</div>
  </div>`;
  list.innerHTML = html;
  list.querySelectorAll('.nav-link').forEach(el => {
    el.addEventListener('click', () => navigate(el.getAttribute('data-module-id')));
  });
  list.querySelectorAll('.nav-section-link').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      navigate(el.getAttribute('data-module-id'));
    });
  });
  list.querySelectorAll('.nav-section-title .chevron[data-toggle]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleNavSection(el.getAttribute('data-toggle'));
    });
  });
  // Reference section: clicking the title (no overview target) still toggles
  list.querySelectorAll('.nav-section-title.collapsible[data-toggle]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('nav-section-link') || e.target.classList.contains('chevron')) return;
      toggleNavSection(el.getAttribute('data-toggle'));
    });
  });
}

function toggleNavSection(key) {
  const collapsed = loadCollapsedSet();
  if (collapsed.has(key)) collapsed.delete(key); else collapsed.add(key);
  saveCollapsedSet(collapsed);
  const sec = document.querySelector(`.nav-section[data-section-key="${key}"]`);
  if (sec) sec.classList.toggle('collapsed');
}

function expandNavSectionForModule(moduleId) {
  let key = null;
  const overviewMatch = moduleId && moduleId.match(/^l([1-4])-overview$/);
  if (overviewMatch) {
    key = `lvl-${overviewMatch[1]}`;
  } else if (moduleId === 'glossary' || moduleId === 'resources') {
    key = 'ref';
  } else {
    const m = CURRICULUM.find(x => x.id === moduleId);
    if (m && m.level >= 1 && m.level <= 4) key = `lvl-${m.level}`;
  }
  if (!key) return;
  const collapsed = loadCollapsedSet();
  if (collapsed.has(key)) {
    collapsed.delete(key);
    saveCollapsedSet(collapsed);
    const sec = document.querySelector(`.nav-section[data-section-key="${key}"]`);
    if (sec) sec.classList.remove('collapsed');
  }
}

function getRecentModules(limit) {
  const hist = (state.history || []).filter(h => h && h.id);
  return hist
    .map(h => ({ entry: h, mod: CURRICULUM.find(m => m.id === h.id) }))
    .filter(x => x.mod && x.mod.level >= 1 && x.mod.level <= 4)
    .slice(0, limit || 3);
}

function resumeLastModule() {
  const items = getRecentModules(1);
  const currentId = (location.hash || '').replace('#', '');
  // Pick the most recent module that ISN'T the one we're already on
  const target = items.find(x => x.mod.id !== currentId) || items[0];
  if (target && target.mod) navigate(target.mod.id);
}

function updateResumeButton() {
  const btn = document.getElementById('resume-btn');
  if (!btn) return;
  const items = getRecentModules(2);
  const currentId = (location.hash || '').replace('#', '');
  const target = items.find(x => x.mod.id !== currentId) || items[0];
  if (!target || !target.mod) {
    btn.hidden = true;
    btn.removeAttribute('title');
    return;
  }
  btn.hidden = false;
  const tip = `Resume: ${target.mod.title}`;
  btn.title = tip;
  btn.setAttribute('aria-label', tip);
  btn.dataset.targetId = target.mod.id;
}

function renderModule(m) {
  const lvlClass = `l${m.level}-pill`;
  let visualHTML = '';
  if (m.visual) {
    const visualList = Array.isArray(m.visual) ? m.visual : [m.visual];
    visualHTML = visualList
      .filter(v => VISUALS[v])
      .map(v => `<div class="visual">${VISUALS[v]}<div class="visual-caption">${VISUAL_CAPTIONS[v] || ''}</div></div>`)
      .join('');
  }
  let objHTML = '';
  if (m.objectives && m.objectives.length) {
    objHTML = `<div class="objectives"><h4>Learning objectives</h4><ul>${m.objectives.map(o => '<li>' + o + '</li>').join('')}</ul></div>`;
  }
  let refsHTML = '';
  if (m.refs && m.refs.length) {
    refsHTML = `<div class="ref-list"><h4>References</h4><ul>${m.refs.map(r => `<li><a href="${r.url}" target="_blank" rel="noopener">${r.title}</a></li>`).join('')}</ul></div>`;
  }
  let quizHTML = '';
  if (m.quiz && m.quiz.length) {
    quizHTML = `<div class="quiz" id="quiz-${m.id}">
      <h3>Quick check</h3>
      ${m.quiz.map((q, i) => `
        <div class="quiz-question" data-q="${i}">
          <div class="quiz-q-text">${i + 1}. ${q.q}</div>
          ${q.options.map((opt, j) => `
            <label class="quiz-option">
              <input type="radio" name="${m.id}-q${i}" value="${j}">
              ${opt}
            </label>
          `).join('')}
          <div class="quiz-explain"></div>
        </div>
      `).join('')}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn" onclick="submitQuiz('${m.id}')">Submit answers</button>
        <button class="btn secondary" onclick="resetQuiz('${m.id}')">Reset quiz</button>
      </div>
      <div class="quiz-result" id="result-${m.id}"></div>
    </div>`;
  }
  const completed = !!state.completed[m.id];
  const prev = prevLearningModule(m.id);
  const next = nextLearningModule(m.id);
  const completeHTML = `
    <div class="complete-row">
      <button class="btn" onclick="toggleComplete('${m.id}')">${completed ? 'Mark incomplete' : 'Mark complete'}</button>
      <span class="complete-status ${completed ? 'done' : ''}">${completed ? '✓ Module complete' : 'Not yet complete'}</span>
    </div>
  `;
  const prevCardHTML = prev
    ? `<a class="mod-nav-card mod-nav-prev" href="#${prev.id}" onclick="navigate('${prev.id}'); return false;" aria-label="Previous module: ${prev.title.replace(/"/g, '&quot;')}">
        <span class="mod-nav-caption"><span class="mod-nav-arrow">←</span> Previous</span>
        <span class="mod-nav-title">${prev.title}</span>
      </a>`
    : '<span class="mod-nav-spacer" aria-hidden="true"></span>';
  const nextCardHTML = next
    ? `<a class="mod-nav-card mod-nav-next" href="#${next.id}" onclick="navigate('${next.id}'); return false;" aria-label="Next module: ${next.title.replace(/"/g, '&quot;')}">
        <span class="mod-nav-caption">Next <span class="mod-nav-arrow">→</span></span>
        <span class="mod-nav-title">${next.title}</span>
      </a>`
    : `<a class="mod-nav-card mod-nav-next mod-nav-finish" href="#home" onclick="navigate('home'); return false;" aria-label="Path complete — back to start">
        <span class="mod-nav-caption">Done <span class="mod-nav-arrow">→</span></span>
        <span class="mod-nav-title">🏁 Back to start</span>
      </a>`;
  const navFooterHTML = `<nav class="mod-nav-footer" aria-label="Module navigation">${prevCardHTML}${nextCardHTML}</nav>`;
  return `
    <section class="module active" id="mod-${m.id}">
      <div class="module-header">
        ${levelPillHTML(m.level)}
        <h2>${m.title}</h2>
      </div>
      <div class="module-meta">Level ${m.level} module · ~${readTimeMinutes(m.body)} min read${state.completedAt && state.completedAt[m.id] ? ` · <span class="completed-stamp">✓ Completed ${formatCompletedAt(state.completedAt[m.id])}</span>` : ''}</div>
      ${objHTML}
      ${m.body || ''}
      ${visualHTML}
      ${refsHTML}
      ${quizHTML}
      ${completeHTML}
      ${navFooterHTML}
    </section>
  `;
}

function renderGlossary() {
  // Group by category, preserving insertion order
  const cats = {};
  GLOSSARY.forEach(g => {
    const c = g.cat || 'Other';
    if (!cats[c]) cats[c] = [];
    cats[c].push(g);
  });
  const tocLinks = Object.keys(cats).map(c => {
    const slug = 'gl-' + c.replace(/[^a-zA-Z0-9]/g, '-');
    return `<a href="#${slug}" onclick="event.preventDefault(); document.getElementById('${slug}').scrollIntoView({behavior:'smooth', block:'start'});"><span>${c}</span><span class="toc-count">${cats[c].length}</span></a>`;
  }).join('');
  const sections = Object.keys(cats).map(c => {
    const id = 'gl-' + c.replace(/[^a-zA-Z0-9]/g, '-');
    const items = cats[c].map(g => `
      <div class="glossary-term" data-term="${(g.term + ' ' + g.def).toLowerCase()}">
        <dt>${g.term}</dt>
        <dd>${g.def}</dd>
      </div>
    `).join('');
    return `
      <h3 class="glossary-cat" id="${id}" data-cat="${c}">${c}</h3>
      <dl class="glossary-section" data-cat-section="${c}">${items}</dl>
    `;
  }).join('');
  return `
    <section class="module active" id="mod-glossary">
      <div class="module-header"><h2>Glossary</h2></div>
      <div class="module-meta">${GLOSSARY.length} terms across ${Object.keys(cats).length} categories · expanded from the CoreWeave Glossary Confluence page plus terms used throughout this guide</div>
      <input type="text" class="glossary-search" placeholder="Filter terms..." oninput="filterGlossary(this.value)">
      <div class="toc-chips">${tocLinks}</div>
      <div id="glossary-list">${sections}</div>
    </section>
  `;
}

const RESOURCE_ICON_SVG = {
  confluence: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 2h6l3 3v9h-9z"/><path d="M9.5 2v3h3"/><path d="M5.5 8.5h5M5.5 11h4"/></svg>',
  sheets: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="2.5" width="11" height="11" rx="1.5"/><path d="M2.5 6.5h11M2.5 10.5h11M6 2.5v11M10 2.5v11"/></svg>',
  slides: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="3" width="13" height="9" rx="1.2"/><path d="M5 9.5l2-2 2 1.5 2.5-3"/></svg>',
  doc: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 2h6l3 3v9h-9z"/><path d="M9.5 2v3h3"/><path d="M5.5 8.5h5M5.5 11h4M5.5 6h3"/></svg>',
  drive: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 4.5a1 1 0 0 1 1-1h3l1.5 1.5H13a1 1 0 0 1 1 1V12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/></svg>',
  lucid: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="1.5" y="2" width="5" height="3.5" rx="0.7"/><rect x="9.5" y="2" width="5" height="3.5" rx="0.7"/><rect x="5.5" y="10.5" width="5" height="3.5" rx="0.7"/><path d="M4 5.5v1.5h8V5.5M8 7v3.5"/></svg>',
  glean: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7" cy="7" r="4.2"/><path d="M10.2 10.2l3 3"/></svg>',
  link: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 2.5h4.5V7"/><path d="M13.5 2.5L7.5 8.5"/><path d="M11.5 9v3a1.5 1.5 0 0 1-1.5 1.5H4A1.5 1.5 0 0 1 2.5 12V6A1.5 1.5 0 0 1 4 4.5h3"/></svg>'
};

function detectResourceSource(url) {
  if (!url) return { label: 'Link', cls: 'link' };
  if (url.includes('coreweave.atlassian.net/wiki') || url.includes('confluence')) return { label: 'Confluence', cls: 'confluence' };
  if (url.includes('docs.google.com/spreadsheets')) return { label: 'Sheets', cls: 'sheets' };
  if (url.includes('docs.google.com/presentation')) return { label: 'Slides', cls: 'slides' };
  if (url.includes('docs.google.com/document')) return { label: 'Doc', cls: 'doc' };
  if (url.includes('drive.google.com')) return { label: 'Drive', cls: 'drive' };
  if (url.includes('lucid.app')) return { label: 'Lucid', cls: 'lucid' };
  if (url.includes('glean.com')) return { label: 'Glean', cls: 'glean' };
  return { label: 'Link', cls: 'link' };
}

function renderResources() {
  let total = 0;
  RESOURCES.forEach(s => { total += s.items.length; });
  const tocLinks = RESOURCES.map(s => {
    const id = 'res-' + s.section.replace(/[^a-zA-Z0-9]/g, '-');
    return `<a href="#${id}" onclick="event.preventDefault(); document.getElementById('${id}').scrollIntoView({behavior:'smooth', block:'start'});"><span>${s.section}</span><span class="toc-count">${s.items.length}</span></a>`;
  }).join('');
  const sections = RESOURCES.map(s => {
    const id = 'res-' + s.section.replace(/[^a-zA-Z0-9]/g, '-');
    const items = s.items.map(it => {
      const featured = it.title.startsWith('★ ');
      const title = featured ? it.title.slice(2).trim() : it.title;
      const src = detectResourceSource(it.url);
      const haystack = (title + ' ' + s.section + ' ' + src.label).toLowerCase().replace(/"/g, '&quot;');
      const safeTitle = title.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const iconSvg = RESOURCE_ICON_SVG[src.cls] || RESOURCE_ICON_SVG.link;
      return `<li class="resource-item ${featured ? 'featured' : ''}" data-resource="${haystack}"><a href="${it.url}" target="_blank" rel="noopener"><span class="resource-title">${safeTitle}</span><span class="resource-icon" title="${src.label}" aria-label="${src.label}">${iconSvg}</span><span class="resource-arrow" aria-hidden="true">→</span></a></li>`;
    }).join('');
    return `<h3 class="resources-cat" id="${id}" data-cat="${s.section}">${s.section}<span class="cat-count">${s.items.length}</span></h3><ul class="resources-section" data-cat-section="${s.section}">${items}</ul>`;
  }).join('');
  return `
    <section class="module active" id="mod-resources">
      <div class="module-header"><h2>Confluence &amp; Drive Index</h2></div>
      <div class="module-meta">${total} curated links across ${RESOURCES.length} categories · sourced from CoreWeave Confluence, Google Drive, and trusted internal docs · use Glean if a resource isn't listed</div>
      <input type="text" class="resources-search" placeholder="Filter resources..." oninput="filterResources(this.value)">
      <div class="toc-chips">${tocLinks}</div>
      <div id="resources-list">${sections}</div>
    </section>
  `;
}

function filterResources(q) {
  const ql = (q || '').toLowerCase();
  document.querySelectorAll('#resources-list .resource-item').forEach(el => {
    el.style.display = (!ql || el.getAttribute('data-resource').includes(ql)) ? '' : 'none';
  });
  document.querySelectorAll('#resources-list .resources-cat').forEach(h => {
    const ul = h.nextElementSibling;
    if (!ul) return;
    const anyVisible = Array.from(ul.querySelectorAll('.resource-item')).some(el => el.style.display !== 'none');
    h.style.display = anyVisible ? '' : 'none';
    ul.style.display = anyVisible ? '' : 'none';
  });
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function navigate(id) {
  const main = document.getElementById('main-content');
  const overviewMatch = id && id.match(/^l([1-4])-overview$/);
  if (id === 'home' || !id) {
    main.innerHTML = renderHome();
  } else if (id === 'glossary') {
    main.innerHTML = renderGlossary();
  } else if (id === 'resources') {
    main.innerHTML = renderResources();
  } else if (overviewMatch) {
    main.innerHTML = renderLevelOverview(parseInt(overviewMatch[1], 10));
  } else {
    const m = CURRICULUM.find(x => x.id === id);
    if (!m) {
      main.innerHTML = renderHome();
      id = 'home';
    } else {
      main.innerHTML = renderModule(m);
    }
  }
  document.querySelectorAll('.nav-link, .nav-section-link').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-module-id') === id);
  });
  expandNavSectionForModule(id);
  window.scrollTo({ top: 0, behavior: 'instant' });
  history.replaceState(null, '', '#' + id);
  pushModuleHistory(id);
  updateResumeButton();
  updateProgress();
  animateStatCounts();
}

function pushModuleHistory(id) {
  if (!id) return;
  const m = CURRICULUM.find(x => x.id === id);
  if (!m || m.level < 1 || m.level > 4) return; // only track learning modules
  if (!Array.isArray(state.history)) state.history = [];
  const entry = { id, ts: Date.now() };
  state.history = [entry, ...state.history.filter(h => h && h.id !== id)].slice(0, 8);
  saveState();
}

function relativeTime(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const m = Math.round(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.round(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.round(h / 24);
  if (d < 7) return `${d}d ago`;
  return formatCompletedAt(ts);
}

function animateStatCounts() {
  const els = document.querySelectorAll('.stat-num[data-target]');
  els.forEach((el, i) => {
    const target = parseInt(el.getAttribute('data-target'), 10);
    const suffix = el.getAttribute('data-suffix') || '';
    if (isNaN(target)) return;
    const duration = 900 + i * 80;
    const startDelay = 200 + i * 60;
    const startTime = performance.now() + startDelay;
    function step(now) {
      const elapsed = now - startTime;
      if (elapsed < 0) { requestAnimationFrame(step); return; }
      const progress = Math.min(elapsed / duration, 1);
      // ease-out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      const value = Math.floor(target * eased);
      el.textContent = value + (progress >= 1 ? suffix : '');
      if (progress < 1) requestAnimationFrame(step);
      else el.textContent = target + suffix;
    }
    requestAnimationFrame(step);
  });
}

function navigateToFirstOfLevel(lvl) {
  navigate('l' + lvl + '-overview');
}

/* ============================================================
   QUIZ
   ============================================================ */
function submitQuiz(moduleId) {
  const m = CURRICULUM.find(x => x.id === moduleId);
  if (!m || !m.quiz) return;
  let correct = 0;
  m.quiz.forEach((q, i) => {
    const radios = document.getElementsByName(moduleId + '-q' + i);
    let selected = -1;
    radios.forEach(r => { if (r.checked) selected = parseInt(r.value, 10); });
    radios.forEach(r => {
      const label = r.parentElement;
      label.classList.remove('correct', 'incorrect');
      const idx = parseInt(r.value, 10);
      if (idx === q.correct) label.classList.add('correct');
      else if (idx === selected && idx !== q.correct) label.classList.add('incorrect');
    });
    const qDiv = document.querySelector(`#quiz-${moduleId} .quiz-question[data-q="${i}"]`);
    const explain = qDiv.querySelector('.quiz-explain');
    explain.innerHTML = `<b>${selected === q.correct ? '✓ Correct.' : '✗ Not quite.'}</b> ${q.explain}`;
    explain.classList.add('show');
    if (selected === q.correct) correct++;
  });
  const result = document.getElementById('result-' + moduleId);
  const pct = Math.round((correct / m.quiz.length) * 100);
  result.innerHTML = `<b>${correct} / ${m.quiz.length} correct</b> — ${pct}%${pct === 100 ? ' · perfect!' : pct >= 70 ? ' · pass' : ' · review the material and try again'}`;
  result.classList.add('show');
  state.quizScores[moduleId] = pct;
  saveState();
}

function resetQuiz(moduleId) {
  const m = CURRICULUM.find(x => x.id === moduleId);
  if (!m || !m.quiz) return;
  m.quiz.forEach((q, i) => {
    const radios = document.getElementsByName(moduleId + '-q' + i);
    radios.forEach(r => {
      r.checked = false;
      r.parentElement.classList.remove('correct', 'incorrect');
    });
    const qDiv = document.querySelector(`#quiz-${moduleId} .quiz-question[data-q="${i}"]`);
    qDiv.querySelector('.quiz-explain').classList.remove('show');
  });
  document.getElementById('result-' + moduleId).classList.remove('show');
}

/* ============================================================
   COMPLETE / PROGRESS
   ============================================================ */
function toggleComplete(moduleId) {
  const wasComplete = state.completed[moduleId];
  state.completed[moduleId] = !wasComplete;
  if (!state.completedAt) state.completedAt = {};
  if (!wasComplete) {
    state.completedAt[moduleId] = Date.now();
  } else {
    delete state.completedAt[moduleId];
  }
  saveState();
  navigate(moduleId);
  // Brief celebratory glow on the global progress bar when a module flips to complete
  if (!wasComplete) {
    const fill = document.getElementById('progress-fill');
    if (fill) {
      fill.style.boxShadow = '0 0 16px var(--accent)';
      setTimeout(() => { fill.style.boxShadow = ''; }, 800);
    }
  }
}

function resetProgress() {
  if (!confirm('Reset all progress and quiz scores? This only affects your browser.')) return;
  state = { completed: {}, quizScores: {}, completedAt: {}, history: [], celebratedComplete: false };
  saveState();
  closeCelebration();
  updateProgress();
  navigate(location.hash.replace('#', '') || 'home');
}

/* ============================================================
   THEME / SEARCH
   ============================================================ */
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(STORAGE_THEME, next);
}

function filterNav() {
  const q = document.getElementById('nav-search-input').value.toLowerCase();
  document.querySelectorAll('.nav-link').forEach(el => {
    const id = el.getAttribute('data-module-id');
    const m = CURRICULUM.find(x => x.id === id);
    let hay = el.textContent.toLowerCase();
    if (m && m.body) hay += ' ' + m.body.toLowerCase();
    if (m && m.objectives) hay += ' ' + m.objectives.join(' ').toLowerCase();
    el.dataset.matched = (!q || hay.includes(q)) ? '1' : '0';
    el.style.display = (!q || hay.includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('.nav-section').forEach(sec => {
    const matchingLinks = sec.querySelectorAll('.nav-link[data-matched="1"]');
    const anyVisible = matchingLinks.length > 0;
    sec.style.display = (q && !anyVisible) ? 'none' : '';
    if (q) {
      // While searching: auto-expand any section that has matches so results are visible
      sec.classList.remove('collapsed');
    } else {
      // Search cleared: restore the user's saved collapsed state
      const key = sec.getAttribute('data-section-key');
      if (key) {
        const collapsed = loadCollapsedSet();
        if (collapsed.has(key)) sec.classList.add('collapsed');
        else sec.classList.remove('collapsed');
      }
    }
  });
}

function filterGlossary(q) {
  const ql = q.toLowerCase();
  document.querySelectorAll('#glossary-list .glossary-term').forEach(el => {
    el.style.display = (!ql || el.getAttribute('data-term').includes(ql)) ? '' : 'none';
  });
  // Hide category headers + dl when no terms in that section match
  document.querySelectorAll('#glossary-list .glossary-cat').forEach(h => {
    const dl = h.nextElementSibling;
    if (!dl) return;
    const anyVisible = Array.from(dl.querySelectorAll('.glossary-term')).some(el => el.style.display !== 'none');
    h.style.display = anyVisible ? '' : 'none';
    dl.style.display = anyVisible ? '' : 'none';
  });
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  const savedTheme = localStorage.getItem(STORAGE_THEME);
  if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  // Always reset sidebar to default-collapsed state on each load / refresh
  localStorage.removeItem(STORAGE_NAV_COLLAPSED);
  renderNav();
  restoreSidebarState();
  const initial = location.hash.replace('#', '') || 'home';
  navigate(initial);
  updateProgress();
}

document.addEventListener('DOMContentLoaded', init);
</script>
